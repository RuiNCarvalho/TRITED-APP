      <strong style="color:var(--ink);">💡 Como funciona:</strong><br>
      • Adicione os trabalhadores aqui (apenas o nome — sem salários nem dados sensíveis).<br>
      • Em cada obra, na ficha, marque <strong>quem esteve presente</strong> nesse dia.<br>
      • A app conta cada dia <strong>uma única vez</strong>, mesmo que o trabalhador tenha visitado várias obras nesse dia.<br>
      • No fim do mês, clique em <strong>"📊 Exportar Folha de Dias"</strong> para ter o ficheiro Excel/CSV com tudo.<br>
      • Os valores de salário <strong>não estão na app</strong> — calcule no Excel exportado, em privado.
    </div>
  </div>
  `;
}

// === Editar / Criar trabalhador ===
function editTrabalhador(id){
  _ensureWorkersStorage();
  const w = id ? state.workers.find(x => x.id === id) : {nome:'', notas:''};
  if(!w){ return; }
  openModal(`
    <div class="p-6">
      <div class="flex items-center justify-between mb-5">
        <h2 class="text-2xl font-bold">${id?'Editar':'Novo'} Trabalhador</h2>
        <button class="icon-btn text-xl" onclick="closeModal()">✕</button>
      </div>
      <div class="grid-2 mb-4">
        <div><label class="label">Nome *</label><input class="input" id="w-nome" value="${escapeAttr(w.nome||'')}" placeholder="ex: João Ferreira" autofocus></div>
        <div><label class="label">Notas (opcional)</label><input class="input" id="w-notas" value="${escapeAttr(w.notas||'')}" placeholder="ex: Especialista fibra"></div>
      </div>
      <div class="flex justify-between mt-6">
        ${id?`<button class="btn btn-danger" onclick="deleteTrabalhador('${id}')">Eliminar</button>`:'<div></div>'}
        <div class="flex gap-2">
          <button class="btn btn-ghost" onclick="closeModal()">Cancelar</button>
          <button class="btn btn-primary" onclick="saveTrabalhador('${id||''}')">Guardar</button>
        </div>
      </div>
    </div>
  `);
}

async function saveTrabalhador(id){
  _ensureWorkersStorage();
  const nome = document.getElementById('w-nome').value.trim();
  if(!nome){ alert('O nome é obrigatório.'); return; }
  const notas = document.getElementById('w-notas').value.trim();
  if(id){
    const i = state.workers.findIndex(x => x.id === id);
    if(i >= 0) state.workers[i] = {...state.workers[i], nome, notas};
  } else {
    state.workers.push({id: uid(), nome, notas});
  }
  await save('workers');
  if(typeof clearDirty === 'function') clearDirty();
  closeModal(true);
  renderView();
}

function deleteTrabalhador(id){
  _ensureWorkersStorage();
  const w = state.workers.find(x => x.id === id);
  if(!w) return;
  const presCount = state.presencas.filter(p => p.workerId === id).length;
  let msg = `Eliminar o trabalhador "${w.nome}"?`;
  if(presCount > 0){
    msg += `\n\n⚠️ ATENÇÃO: este trabalhador tem ${presCount} presença(s) registada(s) em obras.\n\nAs presenças serão também eliminadas e perderá esse histórico.`;
  } else {
    msg += `\n\nNão tem presenças registadas. Pode eliminar sem perder nada.`;
  }
  confirmAction(msg, async () => {
    state.workers = state.workers.filter(x => x.id !== id);
    state.presencas = state.presencas.filter(p => p.workerId !== id);
    await save('workers');
    await save('presencas');
    closeModal(true);
    renderView();
  }, { okLabel: 'Eliminar', cancelLabel: 'Cancelar' });
}

// === Presenças nas obras ===
function presencasObraHtml(obraId){
  _ensureWorkersStorage();
  const presObra = state.presencas.filter(p => p.obraId === obraId);
  // Agrupar por data DESC
  const porData = {};
  presObra.forEach(p => {
    if(!porData[p.data]) porData[p.data] = [];
    porData[p.data].push(p);
  });
  const datas = Object.keys(porData).sort().reverse();
  const hoje = today();

  const trabsDisponiveis = state.workers.filter(w => {
    return !state.presencas.some(p => p.obraId === obraId && p.data === hoje && p.workerId === w.id);
  });

  const addOpts = trabsDisponiveis.length === 0
    ? '<option value="">— todos já marcados hoje —</option>'
    : '<option value="">+ Adicionar trabalhador a hoje (' + fmtDate(hoje) + ')</option>' +
      trabsDisponiveis.map(w => `<option value="${w.id}">${escapeHtml(w.nome)}</option>`).join('');

  const semWorkers = state.workers.length === 0;

  const histHtml = datas.length === 0
    ? `<div class="text-xs" style="color:var(--muted);padding:8px 0;">Sem presenças registadas nesta obra.</div>`
    : datas.slice(0,30).map(d => {
        const list = porData[d];
        return `
          <div class="flex items-center gap-2 flex-wrap py-2" style="border-bottom:1px solid var(--line-soft);">
            <span style="font-size:12px;color:var(--ink-soft);min-width:90px;font-weight:600;">${fmtDate(d)}</span>
            <div class="flex gap-1 flex-wrap" style="flex:1;">
              ${list.map(p => {
                const w = state.workers.find(x => x.id === p.workerId);
                const nome = w ? w.nome : '(eliminado)';
                return `<span class="chip" style="background:var(--blue-soft);color:var(--blue);">
                  ${escapeHtml(nome)}
                  <button onclick="removerPresenca('${p.id}','${obraId}')" style="background:none;border:none;color:var(--blue);cursor:pointer;padding:0 2px;font-size:13px;opacity:.7;" title="Remover">✕</button>
                </span>`;
              }).join('')}
            </div>
          </div>
        `;
      }).join('');

  return `
  <div class="card p-5 mb-4">
    <div class="flex items-center justify-between mb-3">
      <h3 class="serif text-lg font-bold">👷 Presenças</h3>
      ${semWorkers
        ? `<button class="btn btn-ghost" onclick="switchTab('trabalhadores')" style="font-size:12px;">+ Adicionar trabalhadores primeiro →</button>`
        : ''
      }
    </div>
    ${semWorkers
      ? `<div class="text-xs" style="color:var(--muted);">Crie trabalhadores no separador "Trabalhadores" para começar a registar presenças.</div>`
      : `
        <div class="flex gap-2 mb-3 flex-wrap items-center">
          <select class="select" id="pres-add-${obraId}" style="flex:1;min-width:200px;" onchange="adicionarPresenca('${obraId}', this.value, '${hoje}')">
            ${addOpts}
          </select>
          <input type="date" class="input" id="pres-data-${obraId}" value="${hoje}" style="max-width:170px;" title="Data da presença">
        </div>
        ${histHtml}
      `
    }
  </div>
  `;
}

async function adicionarPresenca(obraId, workerId, dataDefault){
  if(!workerId) return;
  _ensureWorkersStorage();
  // Buscar a data escolhida no input (pode ter sido alterada)
  const dataInput = document.getElementById('pres-data-' + obraId);
  const data = dataInput ? dataInput.value : dataDefault;
  if(!data){ alert('Indique uma data.'); return; }
  // Verificar se já existe
  const exists = state.presencas.find(p => p.obraId === obraId && p.workerId === workerId && p.data === data);
  if(exists){
    // Reset select e sair
    const sel = document.getElementById('pres-add-' + obraId);
    if(sel) sel.value = '';
    return;
  }
  state.presencas.push({
    id: uid(),
    obraId, workerId, data
  });
  await save('presencas');
  // Re-render apenas a ficha da obra
  if(typeof openObra === 'function') openObra(obraId);
}

async function removerPresenca(presencaId, obraId){
  _ensureWorkersStorage();
  state.presencas = state.presencas.filter(p => p.id !== presencaId);
  await save('presencas');
  if(typeof openObra === 'function') openObra(obraId);
}

// === Exportar Folha de Dias (CSV) ===
function exportarFolhaDias(){
  _ensureWorkersStorage();
  if(state.presencas.length === 0){
    alert('Ainda não há presenças registadas. Adicione presenças nas obras primeiro.');
    return;
  }
  // Pedir período
  const meses = [...new Set(state.presencas.map(p => (p.data||'').slice(0,7)).filter(Boolean))].sort().reverse();
  const opts = meses.map(m => {
    const [y,mo] = m.split('-');
    const nome = ['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'][+mo-1];
    return `<option value="${m}">${nome} ${y}</option>`;
  }).join('');
  openModal(`
    <div class="p-6">
      <h2 class="text-2xl font-bold mb-4">📊 Exportar Folha de Dias</h2>
      <p class="text-sm mb-4" style="color:var(--ink-soft);">Escolha o período. Será gerado um ficheiro CSV (abre em Excel ou LibreOffice) com o resumo e o detalhe diário, sem valores de salário.</p>
      <div class="grid-2 mb-5">
        <div>
          <label class="label">Mês</label>
          <select class="select" id="exp-mes">
            <option value="todos">Todos os meses</option>
            ${opts}
          </select>
        </div>
        <div>
          <label class="label">Trabalhador</label>
          <select class="select" id="exp-worker">
            <option value="todos">Todos</option>
            ${state.workers.map(w => `<option value="${w.id}">${escapeHtml(w.nome)}</option>`).join('')}
          </select>
        </div>
      </div>
      <div class="flex justify-end gap-2">
        <button class="btn btn-ghost" onclick="closeModal()">Cancelar</button>
        <button class="btn btn-primary" onclick="_doExportarDias()">📥 Descarregar CSV</button>
      </div>
    </div>
  `);
}

function _doExportarDias(){
  const mes = document.getElementById('exp-mes').value;
  const wid = document.getElementById('exp-worker').value;

  let pres = state.presencas.slice();
  if(mes && mes !== 'todos') pres = pres.filter(p => (p.data||'').startsWith(mes));
  if(wid && wid !== 'todos') pres = pres.filter(p => p.workerId === wid);

  if(pres.length === 0){
    alert('Sem presenças para o filtro selecionado.');
    return;
  }

  // Construir resumo: contar dias únicos por trabalhador
  const diasUnicos = {};
  pres.forEach(p => {
    const k = p.workerId + '|' + p.data;
    diasUnicos[k] = true;
  });
  const totaisPorTrab = {};
  Object.keys(diasUnicos).forEach(k => {
    const wid = k.split('|')[0];
    totaisPorTrab[wid] = (totaisPorTrab[wid]||0) + 1;
  });

  // Construir detalhe: agrupar por (data, trabalhador), juntar obras
  const detalheMap = {};
  pres.forEach(p => {
    const k = p.workerId + '|' + p.data;
    if(!detalheMap[k]) detalheMap[k] = {workerId: p.workerId, data: p.data, obras: []};
    const o = state.obras.find(x => x.id === p.obraId);
    if(o) detalheMap[k].obras.push(obraLabel(o));
  });
  const detalheLista = Object.values(detalheMap).sort((a,b) => (a.data||'').localeCompare(b.data||'') || (a.workerId).localeCompare(b.workerId));

  // Construir CSV
  const csv = [];
  const periodLabel = mes === 'todos' ? 'Todos os períodos' : (() => {
    const [y,mo] = mes.split('-');
    return ['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'][+mo-1] + ' ' + y;
  })();

  csv.push('TRITED — Folha de Dias Trabalhados');
  csv.push('Período;' + periodLabel);
  csv.push('Exportado em;' + fmtDate(today()));
  csv.push('');
  csv.push('=== RESUMO POR TRABALHADOR ===');
  csv.push('Trabalhador;Total de Dias;Notas');
  state.workers.forEach(w => {
    const total = totaisPorTrab[w.id] || 0;
    if(total === 0 && wid !== 'todos' && wid !== w.id) return;
    if(total === 0) return;
    csv.push([w.nome, total, w.notas||''].map(_csvCell).join(';'));
  });
  csv.push('');
  csv.push('=== DETALHE DIÁRIO ===');
  csv.push('Data;Dia da Semana;Trabalhador;Obras Visitadas');
  const diasSemana = ['Dom','Seg','Ter','Qua','Qui','Sex','Sáb'];
  detalheLista.forEach(d => {
    const w = state.workers.find(x => x.id === d.workerId);
    const dt = new Date(d.data + 'T00:00:00');
    csv.push([
      fmtDate(d.data),
      diasSemana[dt.getDay()],
      w ? w.nome : '(eliminado)',
      d.obras.join(', ')
    ].map(_csvCell).join(';'));
  });
  csv.push('');
  csv.push('Nota: Cada dia conta uma única vez por trabalhador, mesmo que tenha visitado várias obras.');
  csv.push('Para calcular salário: multiplique a coluna "Total de Dias" pela diária de cada trabalhador (em privado).');

  // BOM para Excel reconhecer UTF-8 com acentos
  const BOM = '\uFEFF';
  const blob = new Blob([BOM + csv.join('\n')], {type: 'text/csv;charset=utf-8;'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  const periodTag = mes === 'todos' ? 'todos' : mes;
  a.download = 'TRITED_Dias_' + periodTag + '.csv';
  a.click();
  closeModal(true);
}

function _csvCell(v){
  v = String(v == null ? '' : v);
  if(v.includes(';') || v.includes('"') || v.includes('\n')){
    return '"' + v.replace(/"/g,'""') + '"';
  }
  return v;
}
