<!-- TRITED - Gestão -->
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,800&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
  /* ========== COLOR SYSTEM - TRITED (orange + blue) ========== */
  :root[data-theme="light"]{
    --bg:#f0ece2;
    --bg-alt:#e8e3d4;
    --bg-grad:radial-gradient(ellipse at top, #f5e8d6 0%, #f0ece2 55%);
    --card:#faf6ec;
    --card-hover:#f5f0e2;
    --ink:#2a2418;
    --ink-soft:#5a5142;
    --muted:#8c8473;
    --line:#e0d8c4;
    --line-soft:#ebe5d5;
    --accent:#ea6a1f;
    --accent-hover:#d15a15;
    --accent-soft:#fbe6d2;
    --accent-grad:linear-gradient(135deg,#f47a2a 0%,#e8551a 100%);
    --blue:#1e5788;
    --blue-hover:#164368;
    --blue-soft:#dbe5f0;
    --blue-grad:linear-gradient(135deg,#2a6ba3 0%,#143f64 100%);
    --ok:#3d7a4a; --ok-soft:#dfecd9;
    --warn:#9c7515; --warn-soft:#f3e7c4;
    --danger:#a82a30; --danger-soft:#f3dcd8;
    --partial:#7c3aed; --partial-soft:#e8dcf3;
    --shadow-sm:0 1px 2px rgba(74,58,30,.05);
    --shadow:0 1px 3px rgba(74,58,30,.06), 0 4px 16px rgba(74,58,30,.06);
    --shadow-lg:0 4px 12px rgba(74,58,30,.08), 0 16px 40px rgba(74,58,30,.1);
    --shadow-accent:0 4px 14px rgba(234,106,31,.22);
    --shadow-blue:0 4px 14px rgba(30,87,136,.22);
  }
  :root[data-theme="dark"]{
    --bg:#080f1e;
    --bg-alt:#0d1828;
    --bg-grad:radial-gradient(ellipse at top, #1a1410 0%, #080f1e 60%);
    --card:#111f36;
    --card-hover:#152741;
    --ink:#eaf0f9;
    --ink-soft:#b4c2d4;
    --muted:#6b7e98;
    --line:#22344f;
    --line-soft:#172741;
    --accent:#ff8c4d;
    --accent-hover:#ffa066;
    --accent-soft:#2d1a0e;
    --accent-grad:linear-gradient(135deg,#ff8c4d 0%,#e8551a 100%);
    --blue:#5fa3d6;
    --blue-hover:#7fb8e0;
    --blue-soft:#142a44;
    --blue-grad:linear-gradient(135deg,#5fa3d6 0%,#2a6ba3 100%);
    --ok:#5cc283; --ok-soft:#0f2818;
    --warn:#e0b020; --warn-soft:#2a2208;
    --danger:#e84855; --danger-soft:#2e1014;
    --partial:#a78bfa; --partial-soft:#1f1638;
    --shadow-sm:0 1px 2px rgba(0,0,0,.4);
    --shadow:0 2px 4px rgba(0,0,0,.4), 0 8px 24px rgba(0,0,0,.3);
    --shadow-lg:0 4px 12px rgba(0,0,0,.5), 0 20px 60px rgba(0,0,0,.4);
    --shadow-accent:0 4px 18px rgba(255,140,77,.3);
    --shadow-blue:0 4px 18px rgba(95,163,214,.3);
  }

  html,body{background:var(--bg);background-image:var(--bg-grad);background-attachment:fixed;color:var(--ink);font-family:'DM Sans',system-ui,sans-serif;transition:background .2s, color .2s;-webkit-font-smoothing:antialiased;}
  h1,h2,h3,h4,.serif{font-family:'Fraunces',Georgia,serif;letter-spacing:-0.015em;font-weight:600;}

  .brand{display:flex;align-items:center;}
  .brand-img{height:54px;width:auto;display:block;}
  :root[data-theme="dark"] .brand-img{filter:drop-shadow(0 0 12px rgba(95,163,214,.15));}

  .card{background:var(--card);border:1px solid var(--line);border-radius:16px;box-shadow:var(--shadow);transition:all .2s ease;}
  .card:hover{box-shadow:var(--shadow-lg);}

  .btn{display:inline-flex;align-items:center;gap:7px;padding:9px 16px;border-radius:10px;font-weight:600;font-size:13.5px;border:1px solid transparent;cursor:pointer;transition:all .15s ease;letter-spacing:0.01em;}
  .btn-primary{background:var(--blue-grad);color:#fff;box-shadow:var(--shadow-blue);}
  .btn-primary:hover{transform:translateY(-1px);box-shadow:0 6px 20px rgba(30,87,136,.35);}
  .btn-accent{background:var(--accent-grad);color:#fff;box-shadow:var(--shadow-accent);}
  .btn-accent:hover{transform:translateY(-1px);box-shadow:0 6px 22px rgba(234,106,31,.4);}
  .btn-ghost{background:var(--card);color:var(--ink);border-color:var(--line);box-shadow:var(--shadow-sm);}
  .btn-ghost:hover{background:var(--line-soft);border-color:var(--ink-soft);}
  .btn-ok{background:linear-gradient(135deg,#2ba366 0%,#1f8a4c 100%);color:#fff;box-shadow:0 4px 14px rgba(31,138,76,.25);}
  .btn-ok:hover{transform:translateY(-1px);}
  .btn-danger{background:transparent;color:var(--danger);border-color:var(--danger-soft);}
  .btn-danger:hover{background:var(--danger-soft);border-color:var(--danger);}
  .input, .select, textarea{width:100%;padding:11px 14px;border:1.5px solid var(--line);border-radius:10px;background:var(--card);font:inherit;font-size:14px;color:var(--ink);outline:none;transition:all .15s;}
  .input:focus, .select:focus, textarea:focus{border-color:var(--blue);box-shadow:0 0 0 3px var(--blue-soft);}
  .input:disabled{opacity:.5;background:var(--line-soft);}
  .label{font-size:11px;font-weight:700;color:var(--ink-soft);text-transform:uppercase;letter-spacing:.06em;margin-bottom:6px;display:block;}
  .badge{display:inline-block;padding:4px 11px;border-radius:999px;font-size:10.5px;font-weight:700;text-transform:uppercase;letter-spacing:.04em;}
  .badge-ok{background:var(--ok-soft);color:var(--ok);}
  .badge-warn{background:var(--warn-soft);color:var(--warn);}
  .badge-danger{background:var(--danger-soft);color:var(--danger);}
  .badge-partial{background:var(--partial-soft);color:var(--partial);}
  .badge-blue{background:var(--blue-soft);color:var(--blue);}
  .badge-neutral{background:var(--line-soft);color:var(--ink-soft);}

  .nav-tab{padding:11px 20px;border-radius:11px;font-weight:600;font-size:14px;cursor:pointer;color:var(--ink-soft);transition:all .2s ease;background:transparent;border:none;white-space:nowrap;flex-shrink:0;letter-spacing:0.01em;}
  .nav-tab:hover{background:var(--line-soft);color:var(--ink);transform:translateY(-1px);}
  .nav-tab.active{background:var(--blue-grad);color:#fff;box-shadow:var(--shadow-blue);}

  table{width:100%;border-collapse:collapse;}
  th{text-align:left;font-size:10.5px;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);font-weight:700;padding:14px 16px;border-bottom:1px solid var(--line);background:var(--line-soft);}
  th:first-child{border-top-left-radius:14px;}
  th:last-child{border-top-right-radius:14px;}
  td{padding:15px 16px;border-bottom:1px solid var(--line-soft);font-size:14px;vertical-align:middle;color:var(--ink);}
  tr:last-child td{border-bottom:none;}
  tr.clickable{cursor:pointer;transition:background .15s;}
  tr.clickable:hover td{background:var(--card-hover);}

  .modal-bg{position:fixed;inset:0;background:rgba(5,15,30,.55);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);z-index:50;display:flex;align-items:center;justify-content:center;padding:20px;animation:fadeIn .2s ease;}
  .modal{background:var(--card);border-radius:20px;max-width:960px;width:100%;max-height:92vh;overflow-y:auto;border:1px solid var(--line);box-shadow:0 30px 80px rgba(0,0,0,.3);animation:slideUp .3s cubic-bezier(.16,1,.3,1);}
  @keyframes fadeIn{from{opacity:0;}to{opacity:1;}}
  @keyframes slideUp{from{opacity:0;transform:translateY(20px) scale(.98);}to{opacity:1;transform:none;}}

  .stat-num{font-family:'Fraunces',serif;font-size:42px;font-weight:600;line-height:1;color:var(--ink);letter-spacing:-0.02em;}
  .stat-accent{background:var(--accent-grad);-webkit-background-clip:text;background-clip:text;color:transparent;}
  .stat-ok{color:var(--ok);}
  .stat-blue{background:var(--blue-grad);-webkit-background-clip:text;background-clip:text;color:transparent;}
  .input:focus, .select:focus, textarea:focus{border-color:var(--blue);}
  .input:disabled{opacity:.5;background:var(--line-soft);}

  /* Horizontal scrollable tab bar */
  .tab-bar{display:flex;gap:6px;overflow-x:auto;overflow-y:hidden;padding:10px 4px;scroll-behavior:smooth;-webkit-overflow-scrolling:touch;cursor:grab;user-select:none;scrollbar-width:none;}
  .tab-bar::-webkit-scrollbar{display:none;}
  .tab-bar.dragging{cursor:grabbing;}
  .tab-bar-wrap{position:relative;border-top:1px solid var(--line);background:var(--card);}
  .tab-bar-wrap::before,.tab-bar-wrap::after{content:'';position:absolute;top:0;bottom:0;width:30px;pointer-events:none;z-index:2;}
  .tab-bar-wrap::before{left:0;background:linear-gradient(to right,var(--card),transparent);}
  .tab-bar-wrap::after{right:0;background:linear-gradient(to left,var(--card),transparent);}

  .theme-toggle{padding:10px 12px;border-radius:11px;background:var(--card);border:1px solid var(--line);cursor:pointer;color:var(--ink);font-size:18px;transition:all .15s;line-height:1;box-shadow:var(--shadow-sm);}
  .theme-toggle:hover{background:var(--line-soft);transform:translateY(-1px);box-shadow:var(--shadow);}

  .chip{display:inline-flex;align-items:center;gap:6px;padding:6px 12px;background:var(--line-soft);border-radius:999px;font-size:12.5px;color:var(--ink);font-weight:500;}
  .stat-blue{color:var(--blue);}

  .empty{text-align:center;padding:54px 20px;color:var(--muted);}
  .empty-icon{font-size:48px;margin-bottom:10px;opacity:.4;}
  .obra-num{font-family:'Fraunces',serif;font-weight:700;background:var(--accent-grad);-webkit-background-clip:text;background-clip:text;color:transparent;}
  .section-box{border:1px solid var(--line);border-radius:14px;padding:20px;background:var(--bg-alt);position:relative;}

  /* Progress bar for partial payments */
  .progress{height:10px;background:var(--line-soft);border-radius:999px;overflow:hidden;border:1px solid var(--line);}
  .progress-bar{height:100%;background:linear-gradient(90deg,var(--accent) 0%,var(--blue) 100%);border-radius:999px;transition:width .4s ease;}

  /* ITED sheet (PDF preview) - stays in light for print */
  .ited-sheet{background:#fff;color:#000;font-family:Arial,sans-serif;font-size:11px;padding:30px;width:800px;}
  .ited-sheet h1{font-family:Arial,sans-serif;font-size:14px;font-weight:bold;text-align:center;border:1.5px solid #000;padding:6px;margin-bottom:10px;color:#000;}
  .ited-sheet .ited-row{display:flex;border:1px solid #000;border-bottom:none;}
  .ited-sheet .ited-row:last-child{border-bottom:1px solid #000;}
  .ited-sheet .ited-cell{padding:4px 6px;border-right:1px solid #000;flex:1;min-height:20px;}
  .ited-sheet .ited-cell:last-child{border-right:none;}
  .ited-sheet .ited-label{font-size:9px;font-weight:bold;text-transform:uppercase;color:#333;}
  .ited-sheet .ited-val{font-size:11px;color:#000;}
  .ited-sheet .ited-section{background:#e8e8e8;font-weight:bold;font-size:11px;padding:5px 6px;border:1px solid #000;border-bottom:none;text-transform:uppercase;color:#000;}
  .ited-sheet table.ited-tab{width:100%;border-collapse:collapse;border:1px solid #000;}
  .ited-sheet table.ited-tab th,.ited-sheet table.ited-tab td{border:1px solid #000;padding:4px 6px;font-size:10px;text-align:left;vertical-align:top;color:#000;}
  .ited-sheet table.ited-tab th{background:#f0f0f0;font-size:9px;text-transform:uppercase;}
  .ited-sheet .doc-list{border:1px solid #000;padding:8px;font-size:10px;color:#000;}
  .ited-sheet .doc-list p{margin:3px 0;}
  .ited-sheet .trited-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;padding-bottom:8px;border-bottom:2px solid #ea6a1f;}
  .ited-sheet .trited-header .brand-name{font-family:'Fraunces',serif;font-weight:800;font-size:22px;letter-spacing:3px;color:#ea6a1f;}
  .ited-sheet .trited-header .brand-sub{font-size:9px;color:#1e5788;letter-spacing:2px;text-transform:uppercase;}

  .grid-2{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
  .grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;}
  .grid-4{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;}
  @media(max-width:760px){.grid-2,.grid-3,.grid-4{grid-template-columns:1fr;}}
  .icon-btn{padding:7px 11px;border-radius:8px;cursor:pointer;color:var(--ink-soft);background:transparent;border:none;line-height:1;}
  .icon-btn:hover{background:var(--line-soft);color:var(--ink);}

  /* File drop zones */
  .dropzone{border:2px dashed var(--line);border-radius:14px;padding:24px;text-align:center;background:var(--bg-alt);transition:all .2s;cursor:pointer;}
  .dropzone:hover, .dropzone.over{border-color:var(--accent);background:var(--accent-soft);transform:scale(1.005);}
  .dropzone-icon{font-size:32px;opacity:.7;margin-bottom:6px;}
  .dropzone-text{font-size:13px;color:var(--ink-soft);}
  .file-item{display:flex;align-items:center;gap:12px;padding:11px 14px;background:var(--card);border:1px solid var(--line);border-radius:10px;margin-top:8px;font-size:13.5px;box-shadow:var(--shadow-sm);transition:all .15s;}
  .file-item:hover{border-color:var(--ink-soft);}
  .file-item .file-name{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-weight:500;}
  .file-item .file-size{color:var(--muted);font-size:11.5px;flex-shrink:0;font-weight:500;}
  .equip-chip{display:inline-flex;align-items:center;gap:8px;padding:8px 14px;background:var(--blue-soft);color:var(--blue);border-radius:999px;font-size:13px;margin:4px;font-weight:600;border:1px solid transparent;transition:all .15s;}
  .equip-chip:hover{border-color:var(--blue);}
  .equip-chip button{background:none;border:none;color:var(--blue);cursor:pointer;font-size:14px;padding:0 2px;opacity:.7;}
  .equip-chip button:hover{opacity:1;}
  .brand-sub{color:var(--muted);font-size:13px;margin-top:4px;}
  @media(max-width:640px){
    .brand-img{height:42px;}
    .brand-sub{display:none;}
  }
</style>

        <div id="searchResults" style="position:absolute;top:100%;right:0;width:420px;max-width:90vw;max-height:500px;overflow-y:auto;background:var(--card);border:1px solid var(--line);border-radius:12px;box-shadow:var(--shadow-lg);z-index:45;display:none;margin-top:6px;"></div>
      </div>
    </div>
    <div class="tab-bar-wrap">
      <div class="max-w-7xl mx-auto px-4">
        <nav id="tabs" class="tab-bar"></nav>
      </div>
    </div>
  </header>
  <main id="view" class="max-w-7xl mx-auto px-6 py-8"></main>
</div>

<script>
// ============ STATE ============
const STORE_KEYS = ['clients','obras','inventory','equipment','catalog','workers','presencas'];
let state = { clients:[], obras:[], inventory:[], equipment:[], catalog:[], workers:[], presencas:[] };
let currentTab = 'painel';
let theme = 'light';

const uid = () => Date.now().toString(36) + Math.random().toString(36).slice(2,7);
const fmt = (n) => (Number(n)||0).toLocaleString('pt-PT',{minimumFractionDigits:2,maximumFractionDigits:2}) + ' €';
const fmtDate = (d) => d ? new Date(d).toLocaleDateString('pt-PT') : '—';
const daysBetween = (a,b) => Math.ceil((new Date(b)-new Date(a))/(1000*60*60*24));
const today = () => new Date().toISOString().slice(0,10);
const currentYear = () => new Date().getFullYear();
// Obra label: "NN-YY" (ex: 01-26 = obra 1 de 2026)
const obraLabel = (o) => {
  const n = String(Number(o?.numero)||0).padStart(2,'0');
  const y = String((Number(o?.ano)||currentYear())).slice(-2);
  return n + '-' + y;
};
const nextObraNumForYear = (ano) => (state.obras.filter(o=>Number(o.ano)===Number(ano)).reduce((m,o)=>Math.max(m, Number(o.numero)||0), 0)) + 1;

function fichaBadges(o){
  const parts = [];
  if(o.incluiFichaItur) parts.push('<span class="badge" style="background:var(--accent-soft);color:var(--accent);">ITUR</span>');
  if(o.incluiFichaIted) parts.push('<span class="badge badge-blue">ITED</span>');
  return parts.length ? ' ' + parts.join(' ') : '';
}
function fichaBigBadges(o){
  const parts = [];
  if(o.incluiFichaItur) parts.push('<span class="badge" style="background:var(--accent-soft);color:var(--accent);">Ficha ITUR</span>');
  if(o.incluiFichaIted) parts.push('<span class="badge badge-blue">Ficha ITED</span>');
  return parts.join(' ');
}

// Payment status helpers
function paymentStatus(obra){
  const valor = Number(obra.valor||0);
  const pago = Number(obra.valorPago||0);
  if(valor === 0) return {key:'nenhum', label:'—', cls:'badge-neutral'};
  if(pago >= valor) return {key:'pago', label:'Pago', cls:'badge-ok'};
  if(pago > 0) return {key:'parcial', label:'Parcial', cls:'badge-partial'};
  return {key:'pendente', label:'Por pagar', cls:'badge-warn'};
}
function obraEstado(obra){
  const e = obra.estado || 'em_curso';
  const map = {
    em_curso: {label:'Em curso', cls:'badge-blue'},
    aguarda_material: {label:'Aguarda material', cls:'badge-warn'},
    espera_cliente: {label:'À espera do cliente', cls:'badge-warn'},
    falta_termo: {label:'Falta termo de resp.', cls:'badge-warn'},
    pronto_faturar: {label:'Pronto para faturar', cls:'badge-partial'},
    concluida: {label:'Concluída', cls:'badge-ok'},
    pausada: {label:'Pausada', cls:'badge-neutral'},
    cancelada: {label:'Cancelada', cls:'badge-danger'},
  };
  return map[e] || map.em_curso;
}

async function loadAll(){
  // Load theme
  try {
    const t = await window.storage.get('theme');
    if(t && t.value) theme = t.value;
  } catch(e){}
  applyTheme();

  for(const k of STORE_KEYS){
    try {
      const r = await window.storage.get('data:'+k);
      if(r && r.value) state[k] = JSON.parse(r.value);
    } catch(e){}
  }

  // MIGRATE: old pago boolean → valorPago number + add ano field + renumber per year
  let changed = false;
  state.obras.forEach(o => {
    if(o.incluiFichaItur === undefined){ o.incluiFichaItur = false; changed = true; }
    if(o.valorPago === undefined){
      o.valorPago = o.pago ? Number(o.valor||0) : 0;
      changed = true;
    }
    if(!o.estado) { o.estado = 'em_curso'; changed = true; }
    if(o.observacoes === undefined) { o.observacoes = ''; changed = true; }
    if(!o.equipamentosUsados) { o.equipamentosUsados = []; changed = true; }
    if(!o.ficheiros) { o.ficheiros = {cobre:[],coaxial:[],fibra:[],fotos:[],outros:[]}; changed = true; }
    if(o.dataConclusao === undefined) { o.dataConclusao = ''; changed = true; }
    if(!o.ano){
      const y = o.data ? new Date(o.data).getFullYear() : currentYear();
      o.ano = y || currentYear();
      o._needsRenumber = true;
      changed = true;
    }
  });
  state.equipment.forEach(eq => { if(!eq.ficheiros) { eq.ficheiros = []; changed = true; } });
  // Renumber obras within their year (sequential, by data)
  if(state.obras.some(o=>o._needsRenumber)){
    const byYear = {};
    state.obras.forEach(o => { (byYear[o.ano] = byYear[o.ano] || []).push(o); });
    Object.values(byYear).forEach(arr => {
      arr.sort((a,b)=>(a.data||'').localeCompare(b.data||''));
      arr.forEach((o,i) => { o.numero = i+1; delete o._needsRenumber; });
    });
  }
  if(changed) await save('obras');

  // Old keys cleanup (services/ordens from v0)
  try {
    const oldS = await window.storage.get('data:services');
    if(oldS && oldS.value){
      const services = JSON.parse(oldS.value);
      services.forEach(s => {
        const ano = s.dataServico ? new Date(s.dataServico).getFullYear() : currentYear();
        state.obras.push({
          id: s.id || uid(), numero: nextObraNumForYear(ano), ano,
          clienteId: s.clienteId,
          data: s.dataServico || today(), dataConclusao:'',
          descricao: s.descricao || '', observacoes:'',
          valor: Number(s.valor)||0, valorPago: s.pago?Number(s.valor)||0:0,
          dataPagamento: s.dataPagamento || '', estado:'concluida',
          incluiFichaIted:false
        });
      });
      await window.storage.delete('data:services');
      await save('obras');
    }
  } catch(e){}
  try {
    const oldO = await window.storage.get('data:ordens');
    if(oldO && oldO.value){
      const ordens = JSON.parse(oldO.value);
      ordens.forEach(o => {
        const ano = o.data ? new Date(o.data).getFullYear() : currentYear();
        state.obras.push({
          id: o.id || uid(), numero: nextObraNumForYear(ano), ano,
          clienteId: o.clienteId || '',
          data: o.data || today(), dataConclusao:'',
          descricao: 'Ficha ITED · ' + (o.refId || ''), observacoes:'',
          valor:0, valorPago:0, dataPagamento:'', estado:'concluida',
          incluiFichaIted:true, refId: o.refId || '',
          instalador: o.instalador || {nome:'',nif:'',numero:''},
          itur: o.itur || {morada:'',codPostal:'',localidade:'',coordenadas:'',manualIted:''},
          cabos: o.cabos || [], materiais: o.materiais || [],
          docObrig: o.docObrig || {ensaios:false,calibracao:false,projeto:false},
          docFacult: o.docFacult || ''
        });
      });
      await window.storage.delete('data:ordens');
      await save('obras');
    }
  } catch(e){}
}
async function save(key){
  try { await window.storage.set('data:'+key, JSON.stringify(state[key])); }
  catch(e){ alert('Erro ao guardar: '+e.message); }
}

// ============ THEME ============
function applyTheme(){
  document.documentElement.setAttribute('data-theme', theme);
  const btn = document.getElementById('themeBtn');
  if(btn) btn.textContent = theme === 'dark' ? '☀️' : '🌙';
}
async function toggleTheme(){
  theme = theme === 'dark' ? 'light' : 'dark';
  applyTheme();
  try { await window.storage.set('theme', theme); } catch(e){}
}

// ============ NAV ============
const TABS = [
  {id:'painel', label:'Painel'},
  {id:'clientes', label:'Clientes'},
  {id:'obras', label:'Obras'},
  {id:'catalogo', label:'Catálogo'},
  {id:'inventario', label:'Inventário'},
  {id:'equipamentos', label:'Equipamentos'},
  {id:'trabalhadores', label:'👷 Trabalhadores'},
];
function renderTabs(){
  const bar = document.getElementById('tabs');
  bar.innerHTML = TABS.map(t =>
    `<button class="nav-tab ${currentTab===t.id?'active':''}" onclick="switchTab('${t.id}')">${t.label}</button>`
  ).join('');
  attachTabDrag(bar);
  // Auto-scroll active tab into view (centered)
  requestAnimationFrame(() => {
    const active = bar.querySelector('.nav-tab.active');
    if(active){
      const offset = active.offsetLeft - (bar.clientWidth/2) + (active.offsetWidth/2);
      bar.scrollTo({left: Math.max(0, offset), behavior: 'smooth'});
    }
  });
}

let _dragAttached = false;
function attachTabDrag(bar){
  if(_dragAttached) return;
  _dragAttached = true;
  let isDown = false, startX, scrollLeft, moved = false;
  bar.addEventListener('mousedown', e => {
    isDown = true; moved = false;
    bar.classList.add('dragging');
    startX = e.pageX - bar.offsetLeft;
    scrollLeft = bar.scrollLeft;
  });
  bar.addEventListener('mouseleave', () => { isDown = false; bar.classList.remove('dragging'); });
  bar.addEventListener('mouseup', () => { isDown = false; bar.classList.remove('dragging'); });
  bar.addEventListener('mousemove', e => {
    if(!isDown) return;
    e.preventDefault();
    const x = e.pageX - bar.offsetLeft;
    const walk = (x - startX);
    if(Math.abs(walk) > 4) moved = true;
    bar.scrollLeft = scrollLeft - walk;
  });
  // Block click after drag (so dragging doesn't trigger tab switch)
  bar.addEventListener('click', e => {
    if(moved){ e.stopPropagation(); e.preventDefault(); moved = false; }
  }, true);
  // Mouse wheel = horizontal scroll
  bar.addEventListener('wheel', e => {
    if(e.deltaY !== 0){
      e.preventDefault();
      bar.scrollLeft += e.deltaY;
    }
  }, {passive: false});
}
function switchTab(id){ currentTab=id; renderTabs(); renderView(); }

function renderView(){
  const v = document.getElementById('view');
  if(currentTab==='painel') v.innerHTML = viewPainel();
  else if(currentTab==='clientes') v.innerHTML = viewClientes();
  else if(currentTab==='obras') v.innerHTML = viewObras();
  else if(currentTab==='catalogo') v.innerHTML = viewCatalogo();
  else if(currentTab==='inventario') v.innerHTML = viewInventario();
  else if(currentTab==='equipamentos') v.innerHTML = viewEquipamentos();
  else if(currentTab==='trabalhadores') v.innerHTML = viewTrabalhadores();
}

// ============ HELPERS ============
function clientStatus(clienteId){
  const obras = state.obras.filter(o => o.clienteId === clienteId);
  let divida = 0, pago = 0, pendCount = 0, parcCount = 0, pagasCount = 0;
  obras.forEach(o => {
    const val = Number(o.valor||0);
    const vp = Number(o.valorPago||0);
    pago += vp;
    divida += Math.max(0, val - vp);
    const st = paymentStatus(o).key;
    if(st === 'pendente') pendCount++;
    else if(st === 'parcial') parcCount++;
    else if(st === 'pago') pagasCount++;
  });
  const emDia = pendCount === 0 && parcCount === 0;
  return { obras, divida, pago, pendCount, parcCount, pagasCount, emDia, total: obras.length };
}

// ============ PAINEL ============
function renderMonthlyChart(){
  // Últimos 12 meses: faturado (valor de obras criadas) + recebido (valorPago)
  const now = new Date();
  const months = [];
  for(let i = 11; i >= 0; i--){
    const d = new Date(now.getFullYear(), now.getMonth() - i, 1);
    months.push({
      key: d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0'),
      label: ['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'][d.getMonth()],
      ano: d.getFullYear(),
      faturado: 0, recebido: 0
    });
  }
  const mIdx = k => months.findIndex(m => m.key === k);
  state.obras.forEach(o => {
    const valor = Number(o.valor || 0);
    const pago = Number(o.valorPago || 0);
    if(valor > 0 && o.data){
      const k = o.data.slice(0,7); // YYYY-MM
      const i = mIdx(k);
      if(i >= 0) months[i].faturado += valor;
    }
    if(pago > 0 && o.dataPagamento){
      const k = o.dataPagamento.slice(0,7);
      const i = mIdx(k);
      if(i >= 0) months[i].recebido += pago;
    } else if(pago > 0 && o.data){
      // fallback: usa data da obra se não houver dataPagamento
      const k = o.data.slice(0,7);
      const i = mIdx(k);
      if(i >= 0) months[i].recebido += pago;
    }
  });
  const maxVal = Math.max(1, ...months.map(m => Math.max(m.faturado, m.recebido)));
  const hasAny = months.some(m => m.faturado > 0 || m.recebido > 0);
  const totalFaturado = months.reduce((a,m) => a + m.faturado, 0);
  const totalRecebido = months.reduce((a,m) => a + m.recebido, 0);

  const bars = months.map((m, idx) => {
    const hFat = Math.round((m.faturado / maxVal) * 140);
    const hRec = Math.round((m.recebido / maxVal) * 140);
    const currentMonth = idx === months.length - 1;
    const title = `${m.label} ${m.ano}\nFaturado: ${fmt(m.faturado)}\nRecebido: ${fmt(m.recebido)}`;
    return `
      <div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;min-width:0;" title="${title}">
        <div style="height:150px;display:flex;align-items:flex-end;gap:3px;width:100%;justify-content:center;">
          <div style="width:12px;height:${Math.max(hFat,1)}px;background:var(--accent-grad);border-radius:3px 3px 0 0;opacity:${m.faturado>0?1:0.15};transition:height .3s;"></div>
          <div style="width:12px;height:${Math.max(hRec,1)}px;background:var(--blue-grad);border-radius:3px 3px 0 0;opacity:${m.recebido>0?1:0.15};transition:height .3s;"></div>
        </div>
        <div style="font-size:11px;color:${currentMonth?'var(--ink)':'var(--muted)'};font-weight:${currentMonth?'700':'500'};white-space:nowrap;">${m.label}</div>
      </div>
    `;
  }).join('');

  return `
  <div class="card p-5 mb-6">
    <div class="flex items-center justify-between mb-2 flex-wrap gap-2">
      <h2 class="text-xl font-bold">📊 Faturação dos Últimos 12 Meses</h2>
      <div class="text-xs" style="color:var(--muted);">Passe o rato sobre cada barra para ver valores exatos</div>
    </div>
    <div class="flex gap-4 mb-4 flex-wrap" style="font-size:12px;">
      <div style="display:flex;align-items:center;gap:6px;"><span style="width:12px;height:12px;background:var(--accent-grad);border-radius:3px;display:inline-block;"></span> <span style="color:var(--ink-soft);">Faturado: <strong style="color:var(--accent);">${fmt(totalFaturado)}</strong></span></div>
      <div style="display:flex;align-items:center;gap:6px;"><span style="width:12px;height:12px;background:var(--blue-grad);border-radius:3px;display:inline-block;"></span> <span style="color:var(--ink-soft);">Recebido: <strong style="color:var(--blue);">${fmt(totalRecebido)}</strong></span></div>
    </div>
    ${hasAny
      ? `<div style="display:flex;align-items:flex-end;gap:8px;padding:10px 0;">${bars}</div>`
      : `<div class="empty" style="padding:30px 20px;"><div class="empty-icon">📊</div>Sem dados de faturação nos últimos 12 meses.<br><span style="font-size:12px;">Crie obras com valor e data para ver o gráfico.</span></div>`
    }
  </div>
  `;
}

function viewPainel(){
  let totalDivida = 0, totalRecebido = 0;
  state.obras.forEach(o => {
    const v = Number(o.valor||0), p = Number(o.valorPago||0);
    totalRecebido += p;
    totalDivida += Math.max(0, v - p);
  });

  const clientesAtraso = state.clients
    .map(c => ({c, st: clientStatus(c.id)}))
    .filter(x => !x.st.emDia && x.st.total > 0)
    .sort((a,b) => b.st.divida - a.st.divida);

  const alertLicencas = [];
  state.equipment.forEach(eq => (eq.licencas||[]).forEach(l => {
    if(!l.dataFim) return;
    const d = daysBetween(today(), l.dataFim);
    if(d <= 30) alertLicencas.push({eq, lic:l, dias:d});
  }));
  alertLicencas.sort((a,b)=>a.dias-b.dias);

  const ESTADOS_ABERTOS = ['em_curso','pausada','aguarda_material','espera_cliente','falta_termo','pronto_faturar'];
  const obrasRecentes = [...state.obras]
    .filter(o => ESTADOS_ABERTOS.includes(o.estado||'em_curso'))
    .sort((a,b)=>(b.data||'').localeCompare(a.data||''))
    .slice(0,8);

  return `
  <div class="grid-4 mb-8">
    <div class="card p-5">
      <div class="label">Total Clientes</div>
      <div class="stat-num stat-blue">${state.clients.length}</div>
      <div class="text-xs mt-1" style="color:var(--muted);">${clientesAtraso.length} em atraso</div>
    </div>
    <div class="card p-5" style="cursor:pointer;" onclick="setObrasFilter('abertas');switchTab('obras');">
      <div class="label">Obras em Aberto</div>
      <div class="stat-num stat-accent">${state.obras.filter(o => ESTADOS_ABERTOS.includes(o.estado||'em_curso')).length}</div>
      <div class="text-xs mt-1" style="color:var(--muted);">${state.obras.filter(o=>o.estado==='concluida').length} concluída(s) · ${state.obras.length} total</div>
    </div>
    <div class="card p-5">
      <div class="label">Por Receber</div>
      <div class="stat-num stat-accent">${fmt(totalDivida)}</div>
      <div class="text-xs mt-1" style="color:var(--muted);">valor em dívida</div>
    </div>
    <div class="card p-5">
      <div class="label">Já Recebido</div>
      <div class="stat-num stat-ok">${fmt(totalRecebido)}</div>
      <div class="text-xs mt-1" style="color:var(--muted);">valor cobrado</div>
    </div>
  </div>

  <div class="grid-2 mb-6">
    <div class="card p-5">
      <div class="flex items-center justify-between mb-4">
        <h2 class="text-xl font-bold">Clientes com Pagamentos em Atraso</h2>
        <span class="badge ${clientesAtraso.length?'badge-warn':'badge-ok'}">${clientesAtraso.length}</span>
      </div>
      ${clientesAtraso.length === 0
        ? `<div class="empty"><div class="empty-icon">✓</div>Todos os clientes em dia</div>`
        : clientesAtraso.slice(0,8).map(x => `
            <div class="py-3 border-b flex items-center justify-between gap-3 cursor-pointer" style="border-color:var(--line);" onclick="openCliente('${x.c.id}')">
              <div>
                <div class="font-semibold">${escapeHtml(x.c.nome)}</div>
                <div class="text-xs mt-0.5" style="color:var(--muted);">
                  ${x.st.pendCount?x.st.pendCount+' pendente(s)':''}${x.st.pendCount&&x.st.parcCount?' · ':''}${x.st.parcCount?x.st.parcCount+' parcial(is)':''}
                </div>
              </div>
              <div class="font-semibold" style="color:var(--accent);">${fmt(x.st.divida)}</div>
            </div>
          `).join('')
      }
    </div>

    <div class="card p-5">
      <div class="flex items-center justify-between mb-4">
        <h2 class="text-xl font-bold">Alertas de Licenças</h2>
        <span class="badge ${alertLicencas.length?'badge-warn':'badge-ok'}">${alertLicencas.length}</span>
      </div>
      ${alertLicencas.length === 0
        ? `<div class="empty"><div class="empty-icon">✓</div>Nenhuma licença a expirar nos próximos 30 dias</div>`
        : alertLicencas.slice(0,8).map(a => {
            const cls = a.dias < 0 ? 'badge-danger' : (a.dias <= 7 ? 'badge-danger' : 'badge-warn');
            const txt = a.dias < 0 ? `há ${Math.abs(a.dias)}d` : (a.dias===0?'hoje':`${a.dias}d`);
            return `<div class="py-3 border-b" style="border-color:var(--line);">
              <div class="flex items-start justify-between gap-3">
                <div>
                  <div class="font-semibold">${escapeHtml(a.eq.nome)}</div>
                  <div class="text-xs" style="color:var(--muted);">${escapeHtml(a.lic.nome)} · ${fmtDate(a.lic.dataFim)}</div>
                </div>
                <span class="badge ${cls}">${txt}</span>
              </div>
            </div>`;
          }).join('')
      }
    </div>
  </div>

  ${renderMonthlyChart()}

  <div class="card p-5">
    <div class="flex items-center justify-between mb-4">
      <h2 class="text-xl font-bold">🔨 Obras em Aberto</h2>
      <button class="btn btn-ghost" onclick="setObrasFilter('abertas');switchTab('obras');">Ver todas →</button>
    </div>
    ${(() => {
      const prontas = state.obras.filter(o => o.estado === 'pronto_faturar');
      return prontas.length > 0 ? `
        <div style="background:var(--partial-soft);border:1px solid var(--partial);border-radius:11px;padding:12px 14px;margin-bottom:14px;display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap;">
          <div>
            <strong style="color:var(--partial);">💶 ${prontas.length} obra(s) pronta(s) para faturar</strong>
            <div class="text-xs mt-1" style="color:var(--ink-soft);">Total a faturar: <strong>${fmt(prontas.reduce((a,o)=>a+Number(o.valor||0),0))}</strong></div>
          </div>
          <button class="btn btn-ghost" onclick="setObrasFilter('pronto_faturar');switchTab('obras');">Ver →</button>
        </div>
      ` : '';
    })()}
    ${obrasRecentes.length === 0

async function saveCliente(id){
  const data = {
    nome: document.getElementById('f-nome').value.trim(),
    nif: document.getElementById('f-nif').value.trim(),
    morada: document.getElementById('f-morada').value.trim(),
    codPostal: document.getElementById('f-cp').value.trim(),
    localidade: document.getElementById('f-loc').value.trim(),
    contacto: document.getElementById('f-contacto').value.trim(),
    email: document.getElementById('f-email').value.trim(),
    notas: document.getElementById('f-notas').value.trim(),
  };
  if(!data.nome){ alert('Nome é obrigatório'); return; }
  let finalId = id;
  if(id){
    const i = state.clients.findIndex(c=>c.id===id);
    state.clients[i] = {...state.clients[i], ...data};
  } else {
    finalId = uid();
    state.clients.push({id:finalId, ...data});
  }
  await save('clients');
  openCliente(finalId);
}
function deleteCliente(id){
  confirmAction('Eliminar cliente? As obras ficarão sem cliente associado, mas não serão removidas.', async () => {
    state.clients = state.clients.filter(c=>c.id!==id);
    // Disassociate obras instead of deleting them (obras now live independently)
    state.obras.forEach(o => { if(o.clienteId === id) o.clienteId = ''; });
    await save('clients'); await save('obras');
    closeModal(); currentTab='clientes'; renderTabs(); renderView();
  });
}

// ============ REGISTAR PAGAMENTO (parcial ou total) ============
function toggleObraMenu(id){
  const el = document.getElementById('obra-menu-' + id);
  if(!el) return;
  const isOpen = el.style.display === 'block';
  document.querySelectorAll('[id^="obra-menu-"]').forEach(m => m.style.display = 'none');
  el.style.display = isOpen ? 'none' : 'block';
  if(!isOpen){
    setTimeout(() => {
      document.addEventListener('click', function closeOnce(e){
        if(!e.target.closest('#obra-menu-' + id) && !e.target.closest('[onclick*="toggleObraMenu"]')){
          el.style.display = 'none';
          document.removeEventListener('click', closeOnce);
        }
      });
    }, 50);
  }
}

async function duplicarObra(id){
  const orig = state.obras.find(x => x.id === id);
  if(!orig) return;
  const ano = currentYear();
  const nova = {
    id: uid(),
    numero: nextObraNumForYear(ano),
    ano,
    clienteId: orig.clienteId || '',
    data: today(),
    dataConclusao: '',
    descricao: 'CÓPIA - ' + (orig.descricao || ''),
    observacoes: '',
    valor: 0, valorPago: 0, dataPagamento: '',
    estado: 'em_curso',
    incluiFichaIted: !!orig.incluiFichaIted,
    incluiFichaItur: !!orig.incluiFichaItur,
    refId: '',
    instalador: orig.instalador ? {...orig.instalador} : {nome:'',nif:'',numero:''},
    itur: {
      morada: '', codPostal: '', localidade: '', coordenadas: '',
      manualIted: (orig.itur && orig.itur.manualIted) || ''
    },
    cabos: (orig.cabos || []).map(c => ({...c})),
    materiais: (orig.materiais || []).map(m => ({...m})),
    docObrig: orig.docObrig ? {...orig.docObrig} : {ensaios:false,calibracao:false,projeto:false},
    docFacult: orig.docFacult || '',
    equipamentosUsados: [...(orig.equipamentosUsados || [])],
    ficheiros: {cobre:[], coaxial:[], fibra:[], fotos:[], outros:[]},
    _duplicadaDe: orig.id
  };
  state.obras.push(nova);
  await save('obras');
  closeModal(true);
  editObra(nova.id);
}

async function setObraEstado(id, novoEstado){
  const o = state.obras.find(x=>x.id===id);
  if(!o) return;
  const wasConcluida = o.estado === 'concluida';
  o.estado = novoEstado;
  if(novoEstado === 'concluida' && !o.dataConclusao){
    o.dataConclusao = today();
  }
  await save('obras');
  if(novoEstado === 'concluida' && !wasConcluida){
    confirmAction(
      `✓ Obra ${obraLabel(o)} marcada como concluída.\n\nQuer extrair agora o ZIP final com toda a documentação?`,
      () => exportObraZIP(id, true),
      {
        okLabel: '📦 Extrair ZIP Final',
        cancelLabel: 'Mais tarde',
        okStyle: 'background:var(--accent);color:#fff;',
        onCancel: () => openObra(id)
      }
    );
    return;
  }
  openObra(id);
}

function registarPagamento(id){
  const o = state.obras.find(x=>x.id===id);
  const emFalta = Math.max(0, Number(o.valor||0) - Number(o.valorPago||0));
  openModal(`
    <div class="p-6">
      <h2 class="text-2xl font-bold mb-2">Registar Pagamento</h2>
      <p class="text-sm mb-5" style="color:var(--muted);">Obra <span class="obra-num">${obraLabel(o)}</span></p>

      <div class="grid-3 mb-4">
        <div class="card p-3"><div class="label">Valor Total</div><div class="font-semibold text-lg">${fmt(o.valor)}</div></div>
        <div class="card p-3"><div class="label">Já Pago</div><div class="font-semibold text-lg" style="color:var(--ok);">${fmt(o.valorPago)}</div></div>
        <div class="card p-3"><div class="label">Em Falta</div><div class="font-semibold text-lg" style="color:var(--accent);">${fmt(emFalta)}</div></div>
      </div>

      <div class="grid-2">
        <div><label class="label">Valor a pagar agora (€)</label><input class="input" type="number" step="0.01" id="p-valor" value="${emFalta.toFixed(2)}" max="${emFalta}"></div>
        <div><label class="label">Data do pagamento</label><input class="input" type="date" id="p-data" value="${today()}"></div>
      </div>

      <div class="flex gap-2 mt-3">
        <button class="btn btn-ghost" onclick="document.getElementById('p-valor').value='${emFalta.toFixed(2)}'">Pagar tudo</button>
        <button class="btn btn-ghost" onclick="document.getElementById('p-valor').value='${(emFalta/2).toFixed(2)}'">Metade</button>
      </div>

      <div class="flex justify-end gap-2 mt-6">
        <button class="btn btn-ghost" onclick="openObra('${id}')">Cancelar</button>
        <button class="btn btn-ok" onclick="confirmarPagamento('${id}')">Confirmar</button>
      </div>
    </div>
  `);
}
async function confirmarPagamento(id){
  const o = state.obras.find(x=>x.id===id);
  const v = parseFloat(document.getElementById('p-valor').value)||0;
  const d = document.getElementById('p-data').value || today();
  if(v <= 0){ alert('Valor inválido'); return; }
  o.valorPago = Math.min(Number(o.valor||0), Number(o.valorPago||0) + v);
  o.dataPagamento = d;
  await save('obras');
  openObra(id);
}

// ============ ASSOCIAR CLIENTE A OBRA ============
function pickClienteForObra(obraId){
  const o = state.obras.find(x=>x.id===obraId); if(!o) return;
  const list = state.clients.length === 0
    ? `<div class="empty"><div class="empty-icon">👥</div>Sem clientes. Crie um cliente primeiro no separador "Clientes".</div>`
    : state.clients.map(c => {
        const isCurrent = o.clienteId === c.id;
        return `
          <div class="card p-3 mb-2 cursor-pointer flex items-center justify-between" onclick="associateClienteToObra('${obraId}','${c.id}')" style="${isCurrent?'border-color:var(--accent);':''}">
            <div>
              <div class="font-semibold">${escapeHtml(c.nome)}</div>
              <div class="text-xs mt-1" style="color:var(--muted);">${c.nif?'NIF '+escapeHtml(c.nif):''}${c.contacto?' · '+escapeHtml(c.contacto):''}</div>
            </div>
            ${isCurrent?'<span class="badge badge-ok">Atual</span>':'<span style="color:var(--muted);">→</span>'}
          </div>`;
      }).join('');
  openModal(`
    <div class="p-6">
      <div class="flex items-center justify-between mb-4">
        <div>
          <h2 class="text-2xl font-bold">Associar Cliente</h2>
          <p class="text-sm" style="color:var(--muted);">Obra <span class="obra-num">${obraLabel(o)}</span></p>
        </div>
        <button class="icon-btn text-xl" onclick="openObra('${obraId}')">✕</button>
      </div>
      <input class="input mb-4" id="cli-filter" placeholder="Filtrar por nome, NIF ou contacto..." oninput="filterClientPicker(this.value)">
      <div id="cli-picker-list">${list}</div>
      ${o.clienteId?`<div class="mt-4 text-center"><button class="btn btn-danger" onclick="associateClienteToObra('${obraId}','')">Remover associação ao cliente</button></div>`:''}
    </div>
  `);
}
function filterClientPicker(q){
  q = q.toLowerCase().trim();
  document.querySelectorAll('#cli-picker-list .card').forEach(el => {
    el.style.display = !q || el.textContent.toLowerCase().includes(q) ? '' : 'none';
  });
}
async function associateClienteToObra(obraId, clienteId){
  const o = state.obras.find(x=>x.id===obraId);
  o.clienteId = clienteId || '';
  await save('obras');
  openObra(obraId);
}

// ============ EDITAR OBRA ============
function editObra(id, preClienteId){
  if(id){
    window._editingObra = JSON.parse(JSON.stringify(state.obras.find(x=>x.id===id)));
    window._editingObraId = id;
  } else {
    window._editingObra = {
      numero: nextObraNumForYear(currentYear()),
      ano: currentYear(),
      clienteId: preClienteId || '',
      data: today(),
      dataConclusao: '',
      descricao: '',
      observacoes: '',
      valor: 0,
      valorPago: 0,
      dataPagamento: '',
      estado: 'em_curso',
      incluiFichaIted: false,
      incluiFichaItur: false,
      refId: '',
      instalador: {nome:'',nif:'',numero:''},
      itur: {morada:'',codPostal:'',localidade:'',coordenadas:'',manualIted:''},
      cabos: [{tecnologia:'Pares de Cobre',marca:'',classe:'',ref:''},{tecnologia:'Coaxial',marca:'',classe:'',ref:''},{tecnologia:'Fibra Ótica',marca:'',classe:'',ref:''}],
      materiais: [
        {designacao:'Tomadas',marca:'',ref:''},
        {designacao:'ATE (RG)',marca:'',ref:''},
        {designacao:'ATI (RC)',marca:'',ref:''},
        {designacao:'Redes S/MATV',marca:'',ref:''},
        {designacao:'Redes CATV',marca:'',ref:''},
        {designacao:'CVM/CAM',marca:'',ref:''},
        {designacao:'Cabeça de Rede',marca:'',ref:''},
        {designacao:'Outros',marca:'',ref:''},
      ],
      docObrig: {ensaios:false,calibracao:false,projeto:false},

}

function addEquipToObra(eqId){
  if(!eqId) return;
  syncObraFromForm();
  window._editingObra.equipamentosUsados = window._editingObra.equipamentosUsados || [];
  if(!window._editingObra.equipamentosUsados.includes(eqId)) window._editingObra.equipamentosUsados.push(eqId);
  _renderObraModal();
}
function removeEquipFromObra(eqId){
  syncObraFromForm();
  window._editingObra.equipamentosUsados = (window._editingObra.equipamentosUsados||[]).filter(x=>x!==eqId);
  _renderObraModal();
}

function toggleFichaTipo(tipo){
  syncObraFromForm();
  const o = window._editingObra;
  if(tipo === 'itur') o.incluiFichaItur = !o.incluiFichaItur;
  if(tipo === 'ited') o.incluiFichaIted = !o.incluiFichaIted;
  // Inicialização defensiva ao ativar pela primeira vez
  if(o.incluiFichaIted || o.incluiFichaItur){
    if(!o.instalador) o.instalador = {nome:'',nif:'',numero:''};
    if(!o.itur) o.itur = {morada:'',codPostal:'',localidade:'',coordenadas:'',manualIted:''};
    if(!Array.isArray(o.cabos)) o.cabos = [];
    if(!Array.isArray(o.materiais)) o.materiais = [];
    if(!o.docObrig) o.docObrig = {ensaios:false,calibracao:false,projeto:false};
    if(o.docFacult === undefined) o.docFacult = '';
    if(o.refId === undefined) o.refId = '';
  }
  _renderObraModal();
}

// === Autocomplete Instalador/Cliente ===
function buildInstaladorPool(){
  const pool = new Map();
  state.obras.forEach(o => {
    const nome = (o.instalador && o.instalador.nome || '').trim();
    if(!nome) return;
    const key = nome.toLowerCase();
    if(!pool.has(key)){
      pool.set(key, {nome, nif:o.instalador.nif||'', numero:o.instalador.numero||'', origem:'instalador'});
    } else {
      const p = pool.get(key);
      if(!p.nif && o.instalador.nif) p.nif = o.instalador.nif;
      if(!p.numero && o.instalador.numero) p.numero = o.instalador.numero;
    }
  });
  state.clients.forEach(c => {
    const nome = (c.nome||'').trim();
    if(!nome) return;
    const key = nome.toLowerCase();
    if(!pool.has(key)){
      pool.set(key, {nome, nif:c.nif||'', numero:'', origem:'cliente'});
    }
  });
  return Array.from(pool.values());
}

function onInstaladorInput(){
  const inp = document.getElementById('o-inst-nome');
  const box = document.getElementById('inst-suggest');
  if(!inp || !box) return;
  const q = inp.value.trim().toLowerCase();
  const pool = buildInstaladorPool();
  let list = pool;
  if(q) list = pool.filter(p => p.nome.toLowerCase().includes(q));
  list = list.slice(0, 8);
  if(list.length === 0){ box.style.display = 'none'; return; }
  box.innerHTML = list.map((p,i) => {
    const badge = p.origem === 'cliente'
      ? '<span class="badge badge-blue" style="font-size:9px;">Cliente</span>'
      : '<span class="badge" style="background:var(--accent-soft);color:var(--accent);font-size:9px;">Instalador</span>';
    const sub = [p.nif && ('NIF '+p.nif), p.numero && ('Nº '+p.numero)].filter(Boolean).join(' · ') || '<em style="color:var(--muted);">sem dados adicionais</em>';
    return `<div onmousedown="pickInstalador(${i})" data-idx="${i}" style="padding:10px 14px;cursor:pointer;border-bottom:1px solid var(--line-soft);" onmouseover="this.style.background='var(--line-soft)'" onmouseout="this.style.background=''">
      <div style="display:flex;align-items:center;gap:8px;"><strong>${escapeHtml(p.nome)}</strong> ${badge}</div>
      <div style="font-size:12px;color:var(--muted);margin-top:2px;">${sub}</div>
    </div>`;
  }).join('');
  window._instPool = list;
  box.style.display = 'block';
}

function pickInstalador(idx){
  const p = (window._instPool||[])[idx];
  if(!p) return;
  const nome = document.getElementById('o-inst-nome');
  const nif = document.getElementById('o-inst-nif');
  const num = document.getElementById('o-inst-num');
  if(nome) nome.value = p.nome;
  if(nif && p.nif) nif.value = p.nif;
  if(num && p.numero) num.value = p.numero;
  hideInstaladorSuggestions();
}

function hideInstaladorSuggestions(){
  const box = document.getElementById('inst-suggest');
  if(box) box.style.display = 'none';
}

function toggleItedSection(checked){
  syncObraFromForm();
  window._editingObra.incluiFichaIted = checked;
  _renderObraModal();
}

function refreshCatalogRowStatus(){
  const o = window._editingObra;
  if(!o || (!o.incluiFichaIted && !o.incluiFichaItur)) return;
  // Sync current values from inputs into o without re-rendering
  document.querySelectorAll('[data-c]').forEach(el=>{
    const i=+el.dataset.i, k=el.dataset.c;
    if(!o.cabos[i]) o.cabos[i]={tecnologia:'',marca:'',classe:'',ref:''};
    if(k==='tec') o.cabos[i].tecnologia=el.value;
    if(k==='marca') o.cabos[i].marca=el.value;
    if(k==='classe') o.cabos[i].classe=el.value;
    if(k==='ref') o.cabos[i].ref=el.value;
  });
  document.querySelectorAll('[data-m]').forEach(el=>{
    const i=+el.dataset.i, k=el.dataset.m;
    if(!o.materiais[i]) o.materiais[i]={designacao:'',marca:'',ref:''};
    if(k==='des') o.materiais[i].designacao=el.value;
    if(k==='marca') o.materiais[i].marca=el.value;
    if(k==='ref') o.materiais[i].ref=el.value;
  });
  // Update icons in the cabo rows
  const caboRows = document.querySelectorAll('[data-c="tec"]');
  caboRows.forEach((el,_) => {
    const i = +el.dataset.i;
    const span = el.parentElement.querySelector('span[title]');
    if(span && o.cabos[i]){
      const s = catalogRowStatus(o.cabos[i], 'cabo');
      span.textContent = s.icon;
      span.title = s.title;
    }
  });
  const matRows = document.querySelectorAll('[data-m="des"]');
  matRows.forEach((el,_) => {
    const i = +el.dataset.i;
    const span = el.parentElement.querySelector('span[title]');
    if(span && o.materiais[i]){
      const s = catalogRowStatus(o.materiais[i], 'material');
      span.textContent = s.icon;
      span.title = s.title;
    }
  });
}

function syncObraFromForm(){
  const o = window._editingObra;
  if(!o) return;
  const val = id => { const el=document.getElementById(id); return el?el.value:''; };
  const chk = id => { const el=document.getElementById(id); return el?el.checked:false; };
  o.numero = parseInt(val('o-numero'))||o.numero;
  o.ano = parseInt(val('o-ano'))||o.ano||currentYear();
  o.data = val('o-data');
  o.dataConclusao = val('o-dataconc');
  o.estado = val('o-estado')||'em_curso';
  o.descricao = val('o-desc');
  o.observacoes = val('o-obs');
  o.valor = parseFloat(val('o-valor'))||0;
  o.valorPago = parseFloat(val('o-valorpago'))||0;
  o.dataPagamento = val('o-datapago');
  // Checkbox Ficha ITED — compatível com versões antigas
  const itedCheckbox = document.getElementById('o-incluiIted');
  if(itedCheckbox) o.incluiFichaIted = itedCheckbox.checked;
  if(o.incluiFichaIted || o.incluiFichaItur){
    // Inicialização defensiva para obras antigas que não tinham ficha
    if(!o.instalador) o.instalador = {nome:'',nif:'',numero:''};
    if(!o.itur) o.itur = {morada:'',codPostal:'',localidade:'',coordenadas:'',manualIted:''};
    if(!Array.isArray(o.cabos)) o.cabos = [];
    if(!Array.isArray(o.materiais)) o.materiais = [];
    if(!o.docObrig) o.docObrig = {ensaios:false,calibracao:false,projeto:false};
    if(o.docFacult === undefined) o.docFacult = '';
    if(o.refId === undefined) o.refId = '';

    o.refId = val('o-refid') || o.refId;
    if(document.getElementById('o-inst-nome')){
      o.instalador.nome = val('o-inst-nome');
      o.instalador.nif = val('o-inst-nif');
      o.instalador.numero = val('o-inst-num');
    }
    if(document.getElementById('o-itur-morada')){
      o.itur.morada = val('o-itur-morada');
      o.itur.codPostal = val('o-itur-cp');
      o.itur.localidade = val('o-itur-loc');
      o.itur.coordenadas = val('o-itur-coord');
      o.itur.manualIted = val('o-itur-manual');
    }
    document.querySelectorAll('[data-c]').forEach(el=>{
      const i=+el.dataset.i, k=el.dataset.c;
      if(!o.cabos[i]) o.cabos[i]={tecnologia:'',marca:'',classe:'',ref:''};
      if(k==='tec') o.cabos[i].tecnologia=el.value;
      if(k==='marca') o.cabos[i].marca=el.value;
      if(k==='classe') o.cabos[i].classe=el.value;
      if(k==='ref') o.cabos[i].ref=el.value;
    });
    document.querySelectorAll('[data-m]').forEach(el=>{
      const i=+el.dataset.i, k=el.dataset.m;
      if(!o.materiais[i]) o.materiais[i]={designacao:'',marca:'',ref:''};
      if(k==='des') o.materiais[i].designacao=el.value;
      if(k==='marca') o.materiais[i].marca=el.value;
      if(k==='ref') o.materiais[i].ref=el.value;
    });
    if(document.getElementById('o-doc-ensaios')){
      o.docObrig.ensaios = chk('o-doc-ensaios');
      o.docObrig.calibracao = chk('o-doc-calibracao');
      o.docObrig.projeto = chk('o-doc-projeto');
      o.docFacult = val('o-doc-facult');
    }
  }
}

function applyCatalogItem(tipo, rowIndex, catalogId){

// ============ DETECÇÃO DE NOVOS / ALTERADOS NO CATÁLOGO ============
function catalogRowStatus(item, tipo){
  const designacao = (tipo === 'cabo' ? item.tecnologia : item.designacao) || '';
  if(!designacao && !item.marca && !item.ref){
    return {icon:'', title:''}; // linha vazia
  }
  const match = findCatalogMatch(item, tipo);
  if(!match){
    return {icon:'✨', title:'Novo · será adicionado ao catálogo ao guardar'};
  }
  // Verifica diferenças
  const diff = (a,b) => (a||'').trim().toLowerCase() !== (b||'').trim().toLowerCase();
  let hasDiff = false;
  if(item.marca && diff(match.marca, item.marca)) hasDiff = true;
  if(item.ref && diff(match.ref, item.ref)) hasDiff = true;
  if(tipo === 'cabo'){
    if(item.tecnologia && diff(match.tecnologia, item.tecnologia)) hasDiff = true;
    if(item.classe && diff(match.classe, item.classe)) hasDiff = true;
  } else {
    if(item.designacao && diff(match.designacao, item.designacao)) hasDiff = true;
  }
  if(hasDiff) return {icon:'⚠', title:'Difere do catálogo · será atualizado ao guardar'};
  return {icon:'⭐', title:'Já está no catálogo'};
}

function findCatalogMatch(item, tipo){
  // Procura primeiro por referência (mais fiável)
  if(item.ref){
    const byRef = state.catalog.find(c => c.tipo === tipo && c.ref && c.ref.toLowerCase() === item.ref.toLowerCase());
    if(byRef) return byRef;
  }
  // Senão, por marca + designação/tecnologia
  const designacao = (tipo === 'cabo' ? item.tecnologia : item.designacao) || '';
  if(!designacao && !item.marca) return null;
  return state.catalog.find(c => {
    if(c.tipo !== tipo) return false;
    const cDes = (tipo === 'cabo' ? c.tecnologia : c.designacao) || '';
    return cDes.toLowerCase() === designacao.toLowerCase()
        && (c.marca||'').toLowerCase() === (item.marca||'').toLowerCase();
  });
}

function obraCatalogDiff(obra){
  // Devolve { novos: [...], alterados: [...] }
  const novos = [];
  const alterados = [];
  const seen = new Set(); // evita duplicados dentro da mesma obra

  const checkItem = (item, tipo) => {
    const designacao = (tipo === 'cabo' ? item.tecnologia : item.designacao) || '';
    if(!designacao && !item.marca && !item.ref) return; // linha vazia
    const key = tipo + '|' + (item.ref||'').toLowerCase() + '|' + designacao.toLowerCase() + '|' + (item.marca||'').toLowerCase();
    if(seen.has(key)) return;
    seen.add(key);

    const match = findCatalogMatch(item, tipo);
    if(!match){
      novos.push({tipo, item});
    } else {
      // Verifica se há diferenças
      const diffs = [];
      const cmp = (catalogVal, obraVal, field) => {
        catalogVal = (catalogVal||'').trim();
        obraVal = (obraVal||'').trim();
        if(obraVal && catalogVal !== obraVal) diffs.push({field, catalogVal, obraVal});
      };
      if(tipo === 'cabo'){
        cmp(match.tecnologia, item.tecnologia, 'Tecnologia');
        cmp(match.classe, item.classe, 'Classe RPC');
      } else {
        cmp(match.designacao, item.designacao, 'Designação');
      }
      cmp(match.marca, item.marca, 'Marca');
      cmp(match.ref, item.ref, 'Referência');
      if(diffs.length > 0){
        alterados.push({tipo, item, match, diffs});
      }
    }
  };

  (obra.cabos||[]).forEach(c => checkItem(c, 'cabo'));
  (obra.materiais||[]).forEach(m => checkItem(m, 'material'));
  return { novos, alterados };
}

function showCatalogSyncDialog(diff, onDone){
  if(diff.novos.length === 0 && diff.alterados.length === 0){
    onDone(); return;
  }
  const novosHtml = diff.novos.map((n,i) => {
    const desc = n.tipo === 'cabo'
      ? `<strong>${escapeHtml(n.item.tecnologia||'(sem tecnologia)')}</strong>${n.item.classe?' · '+escapeHtml(n.item.classe):''}`
      : `<strong>${escapeHtml(n.item.designacao||'(sem designação)')}</strong>`;
    const sub = `${n.item.marca?escapeHtml(n.item.marca):'<em style="color:var(--muted);">sem marca</em>'}${n.item.ref?' · Ref. '+escapeHtml(n.item.ref):''}`;
    return `
      <label class="file-item" style="cursor:pointer;">
        <input type="checkbox" data-novo="${i}" checked style="margin-right:4px;">
        <div style="flex:1;">
          <div>${n.tipo==='cabo'?'🔌':'📦'} ${desc}</div>
          <div class="text-xs" style="color:var(--muted);">${sub}</div>
        </div>
      </label>
    `;
  }).join('');

  const altHtml = diff.alterados.map((a,i) => {
    const nome = a.tipo === 'cabo' ? (a.item.tecnologia||a.match.tecnologia||'') : (a.item.designacao||a.match.designacao||'');
    const diffsTxt = a.diffs.map(d => `<div class="text-xs"><strong>${d.field}:</strong> <span style="color:var(--muted);text-decoration:line-through;">${escapeHtml(d.catalogVal||'(vazio)')}</span> → <span style="color:var(--ok);">${escapeHtml(d.obraVal)}</span></div>`).join('');
    return `
      <label class="file-item" style="cursor:pointer;align-items:flex-start;">
        <input type="checkbox" data-alt="${i}" checked style="margin-top:3px;margin-right:4px;">
        <div style="flex:1;">
          <div>${a.tipo==='cabo'?'🔌':'📦'} <strong>${escapeHtml(nome)}</strong> ${a.item.marca?'· '+escapeHtml(a.item.marca):''}</div>
          <div style="margin-top:5px;">${diffsTxt}</div>
        </div>
      </label>
    `;
  }).join('');

  openModal(`
    <div class="p-6">
      <h2 class="text-2xl font-bold mb-2">📖 Sincronizar com Catálogo</h2>
      <p class="text-sm mb-5" style="color:var(--ink-soft);">Encontrei artigos na ficha que podem ser guardados ou atualizados no catálogo. Desmarque o que não quiser sincronizar.</p>

      ${diff.novos.length > 0 ? `
        <h3 class="serif text-lg font-bold mb-3">✨ Novos artigos (${diff.novos.length})</h3>
        <div class="mb-5">${novosHtml}</div>
      ` : ''}

      ${diff.alterados.length > 0 ? `
        <h3 class="serif text-lg font-bold mb-3">🔄 Atualizações de artigos existentes (${diff.alterados.length})</h3>
        <div class="mb-5">${altHtml}</div>
      ` : ''}

      <div class="flex justify-end gap-2 mt-6">
        <button class="btn btn-ghost" id="cat-skip-btn">Não sincronizar</button>
        <button class="btn btn-primary" id="cat-apply-btn">Aplicar selecionados</button>
      </div>
    </div>
  `);

  document.getElementById('cat-skip-btn').onclick = () => { closeModal(); onDone(); };
  document.getElementById('cat-apply-btn').onclick = async () => {
    // Adicionar novos selecionados
    document.querySelectorAll('[data-novo]').forEach(cb => {
      if(cb.checked){
        const n = diff.novos[+cb.dataset.novo];
        const newItem = {
          id: uid(),
          tipo: n.tipo,
          tecnologia: n.tipo === 'cabo' ? (n.item.tecnologia||'') : '',
          designacao: n.tipo !== 'cabo' ? (n.item.designacao||'') : '',
          marca: n.item.marca || '',
          ref: n.item.ref || '',
          classe: n.tipo === 'cabo' ? (n.item.classe||'') : '',
          notas: ''
        };
        state.catalog.push(newItem);
      }
    });
    // Aplicar alterações aos existentes
    document.querySelectorAll('[data-alt]').forEach(cb => {
      if(cb.checked){
        const a = diff.alterados[+cb.dataset.alt];
        const idx = state.catalog.findIndex(c => c.id === a.match.id);
        if(idx >= 0){
          a.diffs.forEach(d => {
            const fieldMap = {'Tecnologia':'tecnologia','Classe RPC':'classe','Designação':'designacao','Marca':'marca','Referência':'ref'};
            const k = fieldMap[d.field];
            if(k) state.catalog[idx][k] = d.obraVal;
          });
        }
      }
    });
    await save('catalog');
    closeModal();
    onDone();
  };
}

async function saveObra(){
  try {
    syncObraFromForm();
    const data = window._editingObra;
    const id = window._editingObraId;
    // Descrição não é obrigatória — permite guardar como rascunho
    if(!data.descricao || !data.descricao.trim()){
      data.descricao = '(Rascunho — sem descrição)';
    }
    let finalId = id;
    if(id){
      const i = state.obras.findIndex(o=>o.id===id);
      if(i >= 0) state.obras[i] = {...data, id};
      else state.obras.push({...data, id});
    } else {
      finalId = uid();
      state.obras.push({...data, id:finalId});
    }
    await save('obras');
    if(typeof clearDirty === 'function') clearDirty();

    // Verificar catálogo se a obra tiver ITED ou ITUR
    if(data.incluiFichaIted || data.incluiFichaItur){
      const diff = obraCatalogDiff(data);
      if(diff.novos.length > 0 || diff.alterados.length > 0){
        showCatalogSyncDialog(diff, () => openObra(finalId));
        return;
      }
    }
    openObra(finalId);
  } catch(e){
    alert('Erro ao guardar a obra: ' + e.message + '\n\nAbra F12 → Console para ver o erro completo.');
    console.error('saveObra failed:', e);
  }
}

function deleteObra(id){
  confirmAction('Eliminar esta obra? Esta ação não pode ser revertida.', async () => {
    state.obras = state.obras.filter(o=>o.id!==id);
    await save('obras');
    closeModal();
  });
}

async function exportObraZIP(id, isFinal){
  const o = state.obras.find(x=>x.id===id);
  if(!o){ alert('Obra não encontrada'); return; }
  if(typeof JSZip === 'undefined'){ alert('JSZip ainda não carregou. Tente novamente.'); return; }

  const overlay = document.createElement('div');
  overlay.className = 'modal-bg';
  overlay.style.zIndex = '90';
  overlay.innerHTML = '<div class="modal" style="max-width:380px;"><div class="p-6 text-center"><div style="font-size:36px;margin-bottom:8px;">📦</div><h3 class="text-xl font-bold mb-2">A gerar ZIP...</h3><p class="text-sm" style="color:var(--muted);" id="zip-progress">A preparar</p></div></div>';
  document.body.appendChild(overlay);
  const progress = (msg) => { const p = document.getElementById('zip-progress'); if(p) p.textContent = msg; };

  try {
    const zip = new JSZip();
    const cliente = state.clients.find(c=>c.id===o.clienteId);
    const obraTag = obraLabel(o);
    let indice = ['INDICE - Obra ' + obraTag, '='.repeat(40), ''];
    indice.push('Data: ' + fmtDate(o.data));
    if(cliente) indice.push('Cliente: ' + cliente.nome);
    indice.push('Descricao: ' + (o.descricao || '-'));
    indice.push('Valor: ' + fmt(o.valor));
    indice.push('');

    // Gerar PDFs para cada tipo de ficha ativo
    const tiposFicha = [];
    if(o.incluiFichaItur) tiposFicha.push('ITUR');
    if(o.incluiFichaIted) tiposFicha.push('ITED');
    for(let idx=0; idx<tiposFicha.length; idx++){
      const tipo = tiposFicha[idx];
      const prefix = String(idx+1).padStart(2,'0');
      progress('A gerar Ficha ' + tipo + ' em PDF...');
      const tempDiv = document.createElement('div');
      tempDiv.style.position = 'fixed';
      tempDiv.style.left = '-10000px';
      tempDiv.innerHTML = renderItedSheet(o, tipo);
      document.body.appendChild(tempDiv);
      try {
        const canvas = await html2canvas(tempDiv.firstElementChild, {scale:2, backgroundColor:'#ffffff'});
        const { jsPDF } = window.jspdf;
        const pdf = new jsPDF('p','mm','a4');
        const pageW = pdf.internal.pageSize.getWidth();
        const imgW = pageW - 20;
        const imgH = canvas.height * imgW / canvas.width;
        pdf.addImage(canvas.toDataURL('image/png'), 'PNG', 10, 10, imgW, imgH);
        const fname = prefix + '_Ficha_' + tipo + '.pdf';
        zip.file(fname, pdf.output('blob'));
        indice.push(fname);
      } finally { document.body.removeChild(tempDiv); }
    }

    const cats = { cobre:'02_Testes/Cobre', coaxial:'02_Testes/Coaxial', fibra:'02_Testes/Fibra' };
    for(const [k, folder] of Object.entries(cats)){
      for(const f of ((o.ficheiros && o.ficheiros[k]) || [])){
        progress('A juntar: ' + f.name);
        const data = await readFile(f.key);
        if(data){ zip.file(folder + '/' + f.name, dataUrlToBlob(data)); indice.push(folder + '/' + f.name); }
      }
    }

    const equipsUsados = (o.equipamentosUsados||[]).map(eqId => state.equipment.find(e=>e.id===eqId)).filter(Boolean);
    for(const eq of equipsUsados){
      const safeName = eq.nome.replace(/[\/\\:*?"<>|]/g,'_');
      const folder = '03_Equipamentos_Utilizados/' + safeName;
      let info = ['Equipamento: ' + eq.nome];
      if(eq.tipo) info.push('Tipo: ' + eq.tipo);
      if(eq.numeroSerie) info.push('Nº Série: ' + eq.numeroSerie);
      if(eq.dataCompra) info.push('Data de compra: ' + fmtDate(eq.dataCompra));
      if(eq.licencas && eq.licencas.length){
        info.push(''); info.push('Licencas / Calibracoes:');
        eq.licencas.forEach(l => info.push('  - ' + (l.nome||'') + (l.dataInicio?' · inicio '+fmtDate(l.dataInicio):'') + (l.dataFim?' · valido ate '+fmtDate(l.dataFim):'')));
      }
      zip.file(folder + '/INFO.txt', info.join('\n'));
      indice.push(folder + '/INFO.txt');
      for(const f of (eq.ficheiros||[])){
        progress('A juntar: ' + f.name);
        const data = await readFile(f.key);
        if(data){ zip.file(folder + '/' + f.name, dataUrlToBlob(data)); indice.push(folder + '/' + f.name); }
      }
    }

    for(const f of ((o.ficheiros && o.ficheiros.fotos) || [])){
      progress('A juntar: ' + f.name);
      const data = await readFile(f.key);
      if(data){ zip.file('04_Fotos/' + f.name, dataUrlToBlob(data)); indice.push('04_Fotos/' + f.name); }
    }
    for(const f of ((o.ficheiros && o.ficheiros.outros) || [])){
      progress('A juntar: ' + f.name);
      const data = await readFile(f.key);
      if(data){ zip.file('05_Outros_Documentos/' + f.name, dataUrlToBlob(data)); indice.push('05_Outros_Documentos/' + f.name); }
    }

    zip.file('INDICE.txt', indice.join('\n'));
    progress('A comprimir...');
    const blob = await zip.generateAsync({type:'blob'}, m => progress('A comprimir... ' + Math.round(m.percent) + '%'));
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'TRITED_Obra_' + obraTag + (isFinal ? '_FINAL' : '') + '.zip';
    a.click();
    setTimeout(() => URL.revokeObjectURL(url), 1000);
  } catch(e){
    alert('Erro ao gerar ZIP: ' + e.message);
  } finally {
    overlay.remove();
  }
}

async function exportObraPDF(id, tipo){
  const o = state.obras.find(x=>x.id===id);
  tipo = tipo || (o.incluiFichaItur ? 'ITUR' : 'ITED');
  const el = document.getElementById('ited-preview').firstElementChild;
  try {
    const canvas = await html2canvas(el, {scale:2, backgroundColor:'#ffffff'});
    const imgData = canvas.toDataURL('image/png');
    const { jsPDF } = window.jspdf;
    const pdf = new jsPDF('p','mm','a4');
    const pageW = pdf.internal.pageSize.getWidth();
    const pageH = pdf.internal.pageSize.getHeight();
    const imgW = pageW - 20;
    const imgH = canvas.height * imgW / canvas.width;
    if(imgH < pageH - 20){
      pdf.addImage(imgData, 'PNG', 10, 10, imgW, imgH);
    } else {
      let remaining = imgH;
      let sY = 0;
      const pagePx = (pageH - 20) * canvas.width / imgW;
      while(remaining > 0){
        const slice = document.createElement('canvas');
        slice.width = canvas.width;
        slice.height = Math.min(pagePx, canvas.height - sY);
        slice.getContext('2d').drawImage(canvas, 0, sY, canvas.width, slice.height, 0, 0, canvas.width, slice.height);
        const sliceImg = slice.toDataURL('image/png');
        const sliceH = slice.height * imgW / canvas.width;
        pdf.addImage(sliceImg, 'PNG', 10, 10, imgW, sliceH);
        sY += slice.height;
        remaining -= sliceH;
        if(remaining > 0) pdf.addPage();
      }
    }
    pdf.save(`TRITED_Obra_${obraLabel(o)}_Ficha_${tipo}.pdf`);
  } catch(e){ alert('Erro ao gerar PDF: '+e.message); }
}

function switchCatType(tipo){
  syncCatItemFromForm();
  window._editingCat.tipo = tipo;
  _renderCatItemModal();
}

function syncCatItemFromForm(){
  const c = window._editingCat;
  const val = id => { const el=document.getElementById(id); return el?el.value.trim():''; };
  if(c.tipo === 'cabo'){
    c.tecnologia = val('cat-tec');
    c.classe = val('cat-classe');
    c.designacao = '';
  } else {
    c.designacao = val('cat-des');
    c.tecnologia = '';
    c.classe = '';
  }
  c.marca = val('cat-marca');
  c.ref = val('cat-ref');
  c.notas = val('cat-notas');
}

async function saveCatItem(){
  syncCatItemFromForm();
  const c = window._editingCat;
  const id = window._editingCatId;
  if(c.tipo === 'cabo' && !c.tecnologia){ alert('Tecnologia é obrigatória'); return; }
  if(c.tipo !== 'cabo' && !c.designacao){ alert('Designação é obrigatória'); return; }
  if(id){
    const i = state.catalog.findIndex(x=>x.id===id);
    state.catalog[i] = {...c, id};
  } else {
    state.catalog.push({...c, id:uid()});
  }
  await save('catalog');
  closeModal();
}

function deleteCatItem(id){
  confirmAction('Eliminar este artigo do catálogo?', async () => {
    state.catalog = state.catalog.filter(x=>x.id!==id);
    await save('catalog');
    closeModal();
  });
}

function openModal(html){

    m = document.createElement('div');

    m.addEventListener('click', e=>{ if(e.target===m) closeModal(); });
    document.body.appendChild(m);
  }
  m.innerHTML = `<div class="modal" onclick="event.stopPropagation()">${html}</div>`;
  m.style.display = 'flex';
}
function closeModal(){
  const m = document.getElementById('modal');
  if(m) m.style.display='none';
  renderView();
}

// Custom confirmation modal (replaces native confirm() which can be blocked in embedded environments)
function confirmAction(message, onConfirm, opts){
  opts = opts || {};
  const okLabel = opts.okLabel || 'Eliminar';
  const cancelLabel = opts.cancelLabel || 'Cancelar';
  const okStyle = opts.okStyle || 'background:var(--danger);color:#fff;';
  const wrap = document.createElement('div');
  wrap.className = 'modal-bg';
  wrap.style.zIndex = '70';
  wrap.innerHTML = `
    <div class="modal" style="max-width:440px;" onclick="event.stopPropagation()">
      <div class="p-6">
        <h3 class="text-xl font-bold mb-3">Confirmar</h3>
        <p class="text-sm mb-5" style="color:var(--ink-soft);line-height:1.5;white-space:pre-line;">${escapeHtml(message)}</p>
        <div class="flex justify-end gap-2">
          <button class="btn btn-ghost" data-act="cancel">${escapeHtml(cancelLabel)}</button>
          <button class="btn" data-act="ok" style="${okStyle}">${escapeHtml(okLabel)}</button>
        </div>
      </div>
    </div>
  `;
  document.body.appendChild(wrap);
  const close = () => wrap.remove();
  wrap.querySelector('[data-act="cancel"]').onclick = () => { close(); if(opts.onCancel) try{opts.onCancel();}catch(e){} };
  wrap.querySelector('[data-act="ok"]').onclick = () => { close(); try { onConfirm(); } catch(e){ alert('Erro: '+e.message); } };
  wrap.addEventListener('click', e => { if(e.target === wrap){ close(); if(opts.onCancel) try{opts.onCancel();}catch(e){} } });
}

function handleGlobalSearch(q){
  const box = document.getElementById('searchResults');
  if(!box) return;
  q = (q||'').toLowerCase().trim();
  if(!q){ box.style.display='none'; return; }
  const results = [];
  state.clients.forEach(c => {
    const hay = (c.nome+' '+(c.nif||'')+' '+(c.contacto||'')+' '+(c.morada||'')).toLowerCase();
    if(hay.includes(q)) results.push({type:'Cliente',label:c.nome,sub:c.nif||c.contacto||'',onclick:`openCliente('${c.id}')`});
  });
  state.obras.forEach(o => {
    const cl = state.clients.find(x=>x.id===o.clienteId);
    const hay = (obraLabel(o)+' '+(o.descricao||'')+' '+(cl?cl.nome:'')).toLowerCase();

  });
  state.catalog.forEach(c => {

    box.style.display='block';
    return;

  box.style.display='block';
}

// ============ FILE STORAGE ============
const fmtSize = (b) => b < 1024 ? b+' B' : b < 1048576 ? (b/1024).toFixed(1)+' KB' : (b/1048576).toFixed(1)+' MB';

async function storeFile(file){
  if(file.size > 4500000){ throw new Error('Ficheiro "'+file.name+'" excede 4.5 MB.'); }
  const dataUrl = await new Promise((res,rej)=>{
    const r = new FileReader();
    r.onload = () => res(r.result);
    r.onerror = () => rej(new Error('Erro a ler ficheiro'));
    r.readAsDataURL(file);
  });
  const id = uid();
  const key = 'file:'+id;
  await window.storage.set(key, dataUrl);
  return { id, key, name: file.name, size: file.size, type: file.type || 'application/octet-stream' };
}

async function readFile(key){
  try { const r = await window.storage.get(key); return r ? r.value : null; }
  catch(e){ return null; }
}

async function deleteStoredFile(key){
  try { await window.storage.delete(key); } catch(e){}
}

function dataUrlToBlob(dataUrl){
  const [meta, b64] = dataUrl.split(',');
  const mime = (meta.match(/:(.*?);/)||[])[1] || 'application/octet-stream';
  const bin = atob(b64);
  const arr = new Uint8Array(bin.length);
  for(let i=0;i<bin.length;i++) arr[i] = bin.charCodeAt(i);
  return new Blob([arr], {type: mime});
}

async function downloadStoredFile(fmeta){
  const dataUrl = await readFile(fmeta.key);
  if(!dataUrl){ alert('Ficheiro não encontrado'); return; }
  const a = document.createElement('a');
  a.href = dataUrl;
  a.download = fmeta.name;
  a.click();
}

// Generic dropzone renderer used by obra and equip modals
// target = {obj, listKey}  obj is the in-memory object being edited, listKey is the array prop
function renderDropZone(zoneId, label, listArr, onChange){
  return `
    <div class="dropzone" id="${zoneId}" onclick="document.getElementById('${zoneId}-input').click()">
      <input type="file" id="${zoneId}-input" multiple style="display:none" onchange="window['${zoneId}_handle'](this.files)">
      <div class="dropzone-icon">📎</div>
      <div class="dropzone-text"><strong>${label}</strong> · clique ou arraste ficheiros aqui</div>
      <div class="dropzone-text" style="font-size:11px;margin-top:2px;">máx. 4.5 MB por ficheiro</div>
    </div>
    <div id="${zoneId}-list">
      ${(listArr||[]).map((f,i)=>`
        <div class="file-item">
          <span style="font-size:16px;">${f.type && f.type.startsWith('image/') ? '🖼️' : '📄'}</span>
          <span class="file-name" onclick="downloadStoredFile(${JSON.stringify(f).replace(/"/g,'&quot;')})" style="cursor:pointer;text-decoration:underline;">${escapeHtml(f.name)}</span>
          <span class="file-size">${fmtSize(f.size)}</span>
          <button class="icon-btn" onclick="window['${zoneId}_remove'](${i})" title="Remover">✕</button>
        </div>
      `).join('')}
    </div>
  `;
}

function attachDropZone(zoneId, listArr, onUpdate){
  const zone = document.getElementById(zoneId);
  if(!zone) return;
  const handle = async (files) => {
    for(const f of files){
      try {
        const meta = await storeFile(f);
        listArr.push(meta);
      } catch(e){ alert(e.message); }
    }
    onUpdate();
  };
  window[zoneId+'_handle'] = handle;
  window[zoneId+'_remove'] = async (i) => {
    const f = listArr[i];
    if(f && f.key) await deleteStoredFile(f.key);
    listArr.splice(i,1);
    onUpdate();
  };
  ['dragenter','dragover'].forEach(ev => zone.addEventListener(ev, e => { e.preventDefault(); zone.classList.add('over'); }));
  ['dragleave','drop'].forEach(ev => zone.addEventListener(ev, e => { e.preventDefault(); zone.classList.remove('over'); }));
  zone.addEventListener('drop', e => { if(e.dataTransfer.files.length) handle(e.dataTransfer.files); });
}
