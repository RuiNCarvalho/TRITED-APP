<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,800&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
  /* ========== COLOR SYSTEM - TRITED (orange + blue) ========== */
  :root[data-theme="light"]{
    --bg:#f0ece2;
    --bg-alt:#e8e3d4;
    --bg-grad:radial-gradient(ellipse at top, #f5e8d6 0%, #f0ece2 55%);
    --card:#faf6ec;
    --card-hover:#f5f0e2;
    --ink:#2a2418;
    --ink-soft:#5a5142;
    --muted:#8c8473;
    --line:#e0d8c4;
    --line-soft:#ebe5d5;
    --accent:#ea6a1f;
    --accent-hover:#d15a15;
    --accent-soft:#fbe6d2;
    --accent-grad:linear-gradient(135deg,#f47a2a 0%,#e8551a 100%);
    --blue:#1e5788;
    --blue-hover:#164368;
    --blue-soft:#dbe5f0;
    --blue-grad:linear-gradient(135deg,#2a6ba3 0%,#143f64 100%);
    --ok:#3d7a4a; --ok-soft:#dfecd9;
    --warn:#9c7515; --warn-soft:#f3e7c4;
    --danger:#a82a30; --danger-soft:#f3dcd8;
    --partial:#7c3aed; --partial-soft:#e8dcf3;
    --shadow-sm:0 1px 2px rgba(74,58,30,.05);
    --shadow:0 1px 3px rgba(74,58,30,.06), 0 4px 16px rgba(74,58,30,.06);
    --shadow-lg:0 4px 12px rgba(74,58,30,.08), 0 16px 40px rgba(74,58,30,.1);
    --shadow-accent:0 4px 14px rgba(234,106,31,.22);
    --shadow-blue:0 4px 14px rgba(30,87,136,.22);
  }
  :root[data-theme="dark"]{
    --bg:#080f1e;
    --bg-alt:#0d1828;
    --bg-grad:radial-gradient(ellipse at top, #1a1410 0%, #080f1e 60%);
    --card:#111f36;
    --card-hover:#152741;
    --ink:#eaf0f9;
    --ink-soft:#b4c2d4;
    --muted:#6b7e98;
    --line:#22344f;
    --line-soft:#172741;
    --accent:#ff8c4d;
    --accent-hover:#ffa066;
    --accent-soft:#2d1a0e;
    --accent-grad:linear-gradient(135deg,#ff8c4d 0%,#e8551a 100%);
    --blue:#5fa3d6;
    --blue-hover:#7fb8e0;
    --blue-soft:#142a44;
    --blue-grad:linear-gradient(135deg,#5fa3d6 0%,#2a6ba3 100%);
    --ok:#5cc283; --ok-soft:#0f2818;
    --warn:#e0b020; --warn-soft:#2a2208;
    --danger:#e84855; --danger-soft:#2e1014;
    --partial:#a78bfa; --partial-soft:#1f1638;
    --shadow-sm:0 1px 2px rgba(0,0,0,.4);
    --shadow:0 2px 4px rgba(0,0,0,.4), 0 8px 24px rgba(0,0,0,.3);
    --shadow-lg:0 4px 12px rgba(0,0,0,.5), 0 20px 60px rgba(0,0,0,.4);
    --shadow-accent:0 4px 18px rgba(255,140,77,.3);
    --shadow-blue:0 4px 18px rgba(95,163,214,.3);
  }

  html,body{background:var(--bg);background-image:var(--bg-grad);background-attachment:fixed;color:var(--ink);font-family:'DM Sans',system-ui,sans-serif;transition:background .2s, color .2s;-webkit-font-smoothing:antialiased;}
  h1,h2,h3,h4,.serif{font-family:'Fraunces',Georgia,serif;letter-spacing:-0.015em;font-weight:600;}

  .brand{display:flex;align-items:center;}
  .brand-img{height:54px;width:auto;display:block;}
  :root[data-theme="dark"] .brand-img{filter:drop-shadow(0 0 12px rgba(95,163,214,.15));}

  .card{background:var(--card);border:1px solid var(--line);border-radius:16px;box-shadow:var(--shadow);transition:all .2s ease;}
  .card:hover{box-shadow:var(--shadow-lg);}

  .btn{display:inline-flex;align-items:center;gap:7px;padding:9px 16px;border-radius:10px;font-weight:600;font-size:13.5px;border:1px solid transparent;cursor:pointer;transition:all .15s ease;letter-spacing:0.01em;}
  .btn-primary{background:var(--blue-grad);color:#fff;box-shadow:var(--shadow-blue);}
  .btn-primary:hover{transform:translateY(-1px);box-shadow:0 6px 20px rgba(30,87,136,.35);}
  .btn-accent{background:var(--accent-grad);color:#fff;box-shadow:var(--shadow-accent);}
  .btn-accent:hover{transform:translateY(-1px);box-shadow:0 6px 22px rgba(234,106,31,.4);}
  .btn-ghost{background:var(--card);color:var(--ink);border-color:var(--line);box-shadow:var(--shadow-sm);}
  .btn-ghost:hover{background:var(--line-soft);border-color:var(--ink-soft);}
  .btn-ok{background:linear-gradient(135deg,#2ba366 0%,#1f8a4c 100%);color:#fff;box-shadow:0 4px 14px rgba(31,138,76,.25);}
  .btn-ok:hover{transform:translateY(-1px);}
  .btn-danger{background:transparent;color:var(--danger);border-color:var(--danger-soft);}
  .btn-danger:hover{background:var(--danger-soft);border-color:var(--danger);}
  .input, .select, textarea{width:100%;padding:11px 14px;border:1.5px solid var(--line);border-radius:10px;background:var(--card);font:inherit;font-size:14px;color:var(--ink);outline:none;transition:all .15s;}
  .input:focus, .select:focus, textarea:focus{border-color:var(--blue);box-shadow:0 0 0 3px var(--blue-soft);}
  .input:disabled{opacity:.5;background:var(--line-soft);}
  .label{font-size:11px;font-weight:700;color:var(--ink-soft);text-transform:uppercase;letter-spacing:.06em;margin-bottom:6px;display:block;}
  .badge{display:inline-block;padding:4px 11px;border-radius:999px;font-size:10.5px;font-weight:700;text-transform:uppercase;letter-spacing:.04em;}
  .badge-ok{background:var(--ok-soft);color:var(--ok);}
  .badge-warn{background:var(--warn-soft);color:var(--warn);}
  .badge-danger{background:var(--danger-soft);color:var(--danger);}
  .badge-partial{background:var(--partial-soft);color:var(--partial);}
  .badge-blue{background:var(--blue-soft);color:var(--blue);}
  .badge-green{background:#e6f4ea;color:#1a7f37;}
  .badge-red{background:#fde8e8;color:#c1272d;}
  .badge-neutral{background:var(--line-soft);color:var(--ink-soft);}

  .nav-tab{padding:11px 20px;border-radius:11px;font-weight:600;font-size:14px;cursor:pointer;color:var(--ink-soft);transition:all .2s ease;background:transparent;border:none;white-space:nowrap;flex-shrink:0;letter-spacing:0.01em;}
  .nav-tab:hover{background:var(--line-soft);color:var(--ink);transform:translateY(-1px);}
  .nav-tab.active{background:var(--blue-grad);color:#fff;box-shadow:var(--shadow-blue);}

  table{width:100%;border-collapse:collapse;}
  th{text-align:left;font-size:10.5px;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);font-weight:700;padding:14px 16px;border-bottom:1px solid var(--line);background:var(--line-soft);}
  th:first-child{border-top-left-radius:14px;}
  th:last-child{border-top-right-radius:14px;}
  td{padding:15px 16px;border-bottom:1px solid var(--line-soft);font-size:14px;vertical-align:middle;color:var(--ink);}
  tr:last-child td{border-bottom:none;}
  tr.clickable{cursor:pointer;transition:background .15s;}
  tr.clickable:hover td{background:var(--card-hover);}

  .modal-bg{position:fixed;inset:0;background:rgba(5,15,30,.55);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);z-index:50;display:flex;align-items:center;justify-content:center;padding:20px;animation:fadeIn .2s ease;}
  .modal{background:var(--card);border-radius:20px;max-width:960px;width:100%;max-height:92vh;overflow-y:auto;border:1px solid var(--line);box-shadow:0 30px 80px rgba(0,0,0,.3);animation:slideUp .3s cubic-bezier(.16,1,.3,1);}
  @keyframes fadeIn{from{opacity:0;}to{opacity:1;}}
  @keyframes slideUp{from{opacity:0;transform:translateY(20px) scale(.98);}to{opacity:1;transform:none;}}

  .stat-num{font-family:'Fraunces',serif;font-size:42px;font-weight:600;line-height:1;color:var(--ink);letter-spacing:-0.02em;}
  .stat-accent{background:var(--accent-grad);-webkit-background-clip:text;background-clip:text;color:transparent;}
  .stat-ok{color:var(--ok);}
  .stat-blue{background:var(--blue-grad);-webkit-background-clip:text;background-clip:text;color:transparent;}
  .input:focus, .select:focus, textarea:focus{border-color:var(--blue);}
  .input:disabled{opacity:.5;background:var(--line-soft);}

  /* Horizontal scrollable tab bar */
  .tab-bar{display:flex;gap:6px;overflow-x:auto;overflow-y:hidden;padding:10px 4px;scroll-behavior:smooth;-webkit-overflow-scrolling:touch;cursor:grab;user-select:none;scrollbar-width:none;}
  .tab-bar::-webkit-scrollbar{display:none;}
  .tab-bar.dragging{cursor:grabbing;}
  .tab-bar-wrap{position:relative;border-top:1px solid var(--line);background:var(--card);}
  .tab-bar-wrap::before,.tab-bar-wrap::after{content:'';position:absolute;top:0;bottom:0;width:30px;pointer-events:none;z-index:2;}
  .tab-bar-wrap::before{left:0;background:linear-gradient(to right,var(--card),transparent);}
  .tab-bar-wrap::after{right:0;background:linear-gradient(to left,var(--card),transparent);}

  .theme-toggle{padding:10px 12px;border-radius:11px;background:var(--card);border:1px solid var(--line);cursor:pointer;color:var(--ink);font-size:18px;transition:all .15s;line-height:1;box-shadow:var(--shadow-sm);}
  .theme-toggle:hover{background:var(--line-soft);transform:translateY(-1px);box-shadow:var(--shadow);}

  .chip{display:inline-flex;align-items:center;gap:6px;padding:6px 12px;background:var(--line-soft);border-radius:999px;font-size:12.5px;color:var(--ink);font-weight:500;}
  .stat-blue{color:var(--blue);}

  .empty{text-align:center;padding:54px 20px;color:var(--muted);}
  .empty-icon{font-size:48px;margin-bottom:10px;opacity:.4;}
  .obra-num{font-family:'Fraunces',serif;font-weight:700;background:var(--accent-grad);-webkit-background-clip:text;background-clip:text;color:transparent;}
  .section-box{border:1px solid var(--line);border-radius:14px;padding:20px;background:var(--bg-alt);position:relative;}

  /* Progress bar for partial payments */
  .progress{height:10px;background:var(--line-soft);border-radius:999px;overflow:hidden;border:1px solid var(--line);}
  .progress-bar{height:100%;background:linear-gradient(90deg,var(--accent) 0%,var(--blue) 100%);border-radius:999px;transition:width .4s ease;}

  /* ITED sheet (PDF preview) - stays in light for print */
  .ited-sheet{background:#fff;color:#000;font-family:Arial,sans-serif;font-size:11px;padding:30px;width:800px;}
  .ited-sheet h1{font-family:Arial,sans-serif;font-size:14px;font-weight:bold;text-align:center;border:1.5px solid #000;padding:6px;margin-bottom:10px;color:#000;}
  .ited-sheet .ited-row{display:flex;border:1px solid #000;border-bottom:none;}
  .ited-sheet .ited-row:last-child{border-bottom:1px solid #000;}
  .ited-sheet .ited-cell{padding:4px 6px;border-right:1px solid #000;flex:1;min-height:20px;}
  .ited-sheet .ited-cell:last-child{border-right:none;}
  .ited-sheet .ited-label{font-size:9px;font-weight:bold;text-transform:uppercase;color:#333;}
  .ited-sheet .ited-val{font-size:11px;color:#000;}
  .ited-sheet .ited-section{background:#e8e8e8;font-weight:bold;font-size:11px;padding:5px 6px;border:1px solid #000;border-bottom:none;text-transform:uppercase;color:#000;}
  .ited-sheet table.ited-tab{width:100%;border-collapse:collapse;border:1px solid #000;}
  .ited-sheet table.ited-tab th,.ited-sheet table.ited-tab td{border:1px solid #000;padding:4px 6px;font-size:10px;text-align:left;vertical-align:top;color:#000;}
  .ited-sheet table.ited-tab th{background:#f0f0f0;font-size:9px;text-transform:uppercase;}
  .ited-sheet .doc-list{border:1px solid #000;padding:8px;font-size:10px;color:#000;}
  .ited-sheet .doc-list p{margin:3px 0;}
  .ited-sheet .trited-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;padding-bottom:8px;border-bottom:2px solid #ea6a1f;}
  .ited-sheet .trited-header .brand-name{font-family:'Fraunces',serif;font-weight:800;font-size:22px;letter-spacing:3px;color:#ea6a1f;}
  .ited-sheet .trited-header .brand-sub{font-size:9px;color:#1e5788;letter-spacing:2px;text-transform:uppercase;}

  .grid-2{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
  .grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;}
  .grid-4{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;}
  @media(max-width:760px){.grid-2,.grid-3,.grid-4{grid-template-columns:1fr;}}
  .icon-btn{padding:7px 11px;border-radius:8px;cursor:pointer;color:var(--ink-soft);background:transparent;border:none;line-height:1;}
  .icon-btn:hover{background:var(--line-soft);color:var(--ink);}

  /* File drop zones */
  .dropzone{border:2px dashed var(--line);border-radius:14px;padding:24px;text-align:center;background:var(--bg-alt);transition:all .2s;cursor:pointer;}
  .dropzone:hover, .dropzone.over{border-color:var(--accent);background:var(--accent-soft);transform:scale(1.005);}
  .dropzone-icon{font-size:32px;opacity:.7;margin-bottom:6px;}
  .dropzone-text{font-size:13px;color:var(--ink-soft);}
  .file-item{display:flex;align-items:center;gap:12px;padding:11px 14px;background:var(--card);border:1px solid var(--line);border-radius:10px;margin-top:8px;font-size:13.5px;box-shadow:var(--shadow-sm);transition:all .15s;}
  .file-item:hover{border-color:var(--ink-soft);}
  .file-item .file-name{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-weight:500;}
  .file-item .file-size{color:var(--muted);font-size:11.5px;flex-shrink:0;font-weight:500;}
  .equip-chip{display:inline-flex;align-items:center;gap:8px;padding:8px 14px;background:var(--blue-soft);color:var(--blue);border-radius:999px;font-size:13px;margin:4px;font-weight:600;border:1px solid transparent;transition:all .15s;}
  .equip-chip:hover{border-color:var(--blue);}
  .equip-chip button{background:none;border:none;color:var(--blue);cursor:pointer;font-size:14px;padding:0 2px;opacity:.7;}
  .equip-chip button:hover{opacity:1;}
  .brand-sub{color:var(--muted);font-size:13px;margin-top:4px;}
  @media(max-width:640px){
    .brand-img{height:42px;}
    .brand-sub{display:none;}
  }


  /* Sidebar layout */
  .app-shell{display:grid;grid-template-columns:280px minmax(0,1fr);min-height:100vh;}
  .sidebar{position:sticky;top:0;height:100vh;background:var(--card);border-right:1px solid var(--line);display:flex;flex-direction:column;padding:22px 18px;gap:18px;box-shadow:var(--shadow-sm);}
  .sidebar-top{padding-bottom:18px;border-bottom:1px solid var(--line);}
  .sidebar-mid{flex:1;min-height:0;display:flex;flex-direction:column;}
  .sidebar-tabs{display:flex;flex-direction:column;gap:8px;overflow-y:auto;overflow-x:hidden;padding-right:4px;}
  .sidebar-tabs .nav-tab{width:100%;text-align:left;padding:12px 14px;white-space:normal;display:flex;align-items:center;justify-content:flex-start;transform:none;}
  .sidebar-tabs .nav-tab:hover{transform:none;}
  .sidebar-bottom{padding-top:16px;border-top:1px solid var(--line);display:flex;flex-direction:column;gap:10px;}
  .sidebar-user-label{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;}
  .sidebar-user-actions{display:flex;flex-direction:column;gap:8px;}
  .app-content{min-width:0;display:flex;flex-direction:column;}
  .content-topbar{position:sticky;top:0;z-index:20;border-bottom:1px solid var(--line);background:var(--card);padding:18px 24px;display:flex;align-items:center;justify-content:space-between;gap:16px;}
  .content-topbar-title{display:flex;flex-direction:column;gap:4px;min-width:0;}
  .content-topbar-title h1{font-size:28px;line-height:1.05;margin:0;}
  .content-topbar-title p{margin:0;color:var(--muted);font-size:13px;}
  .content-topbar-actions{display:flex;align-items:center;gap:8px;position:relative;}
  #view{max-width:none !important;width:100%;padding:24px;}
  #sessionUserPill{justify-content:flex-start;}
  @media(max-width:980px){
    .app-shell{grid-template-columns:1fr;}
    .sidebar{position:static;height:auto;border-right:none;border-bottom:1px solid var(--line);}
    .content-topbar{padding:16px 18px;}
    #view{padding:18px;}
  }
  @media(max-width:640px){
    .content-topbar{flex-direction:column;align-items:stretch;}
    .content-topbar-actions{width:100%;}
    #globalSearch{width:100% !important;max-width:none !important;}
    #searchResults{left:0 !important;right:0 !important;width:auto !important;max-width:none !important;}
  }

</style>

// Storage fallback: permite usar a app fora do ambiente que injeta window.storage
(function ensureStorage(){
  if(window.storage && typeof window.storage.get === 'function' && typeof window.storage.set === 'function'){
    return;
  }
  const mem = {};
  const prefix = 'trited:';
  window.storage = {
    async get(key){
      try {
        const v = localStorage.getItem(prefix + key);
        return v === null ? null : { value: v };
      } catch(e){
        return Object.prototype.hasOwnProperty.call(mem, key) ? { value: mem[key] } : null;
      }
    },
    async set(key, value){
      const v = String(value);
      try { localStorage.setItem(prefix + key, v); }
      catch(e){ mem[key] = v; }
      return { key, value: v };
    },
    async delete(key){
      try { localStorage.removeItem(prefix + key); }
      catch(e){ delete mem[key]; }
    }
  };
})();

function safeUser(u){
  if(!u) return null;
  return {id:u.id, nome:u.nome, username:u.username, role:u.role, ativo:u.ativo !== false};
}
async function hashPassword(password){
  const text = String(password||'');
  if(window.crypto && crypto.subtle && window.TextEncoder){
    const data = new TextEncoder().encode(text);
    const hash = await crypto.subtle.digest('SHA-256', data);
    return 'sha256:' + Array.from(new Uint8Array(hash)).map(b=>b.toString(16).padStart(2,'0')).join('');
  }
  return 'local:' + btoa(unescape(encodeURIComponent(text)));
}

// Payment status helpers
function paymentStatus(obra){
  const valor = Number(obra.valor||0);
  const pago = Number(obra.valorPago||0);
  if(valor === 0) return {key:'nenhum', label:'—', cls:'badge-neutral'};
  if(pago >= valor) return {key:'pago', label:'Pago', cls:'badge-ok'};
  if(pago > 0) return {key:'parcial', label:'Parcial', cls:'badge-partial'};
  return {key:'pendente', label:'Por pagar', cls:'badge-warn'};
}
function obraEstado(obra){
  const e = obra.estado || 'em_curso';

    em_curso: {label:'Em curso', cls:'badge-blue'},
    aguarda_material: {label:'Aguarda material', cls:'badge-warn'},

    falta_termo: {label:'Falta termo de resp.', cls:'badge-warn'},
    pronto_faturar: {label:'Pronto para faturar', cls:'badge-partial'},

    pausada: {label:'Pausada', cls:'badge-neutral'},
    cancelada: {label:'Cancelada', cls:'badge-danger'},

}

function obraInventarioItems(obra){
  return Array.isArray(obra && obra.itensInventario) ? obra.itensInventario : [];
}
function inventarioById(id){
  return state.inventory.find(x => x.id === id) || null;
}
function inventarioRowLabel(row){
  const item = inventarioById(row.inventoryId);
  return item ? item.nome : (row.nome || 'Artigo removido do inventário');
}
function inventarioRowUnidade(row){
  const item = inventarioById(row.inventoryId);
  return item ? (item.unidade || 'un') : (row.unidade || 'un');
}
function inventarioStockBadge(row, obraId){
  const item = inventarioById(row.inventoryId);
  const qtd = Number(row.quantidade || 0);
  if(!item) return '<span class="badge badge-danger">Removido</span>';
  const disponivel = inventarioDisponivel(item.id, obraId);
  if(qtd > disponivel) return '<span class="badge badge-warn">Stock insuficiente</span>';
  return '<span class="badge badge-ok">Stock OK</span>';
}
function inventarioReservado(itemId, excludeObraId){
  return state.obras.reduce((total, obra) => {
    if(!obra || obra.id === excludeObraId || obra.stockBaixado || !obra.stockReservado) return total;
    return total + obraInventarioItems(obra).reduce((s,row) => {
      return row && row.inventoryId === itemId ? s + Number(row.quantidade || 0) : s;
    }, 0);
  }, 0);
}
function inventarioDisponivel(itemId, excludeObraId){
  const item = inventarioById(itemId);
  if(!item) return 0;
  return Math.max(0, Number(item.quantidade || 0) - inventarioReservado(itemId, excludeObraId));
}
function validarReservaStockObra(obra){
  const items = obraInventarioItems(obra).filter(row => row && row.inventoryId && Number(row.quantidade || 0) > 0);
  const problemas = [];
  items.forEach(row => {
    const item = inventarioById(row.inventoryId);
    const qtd = Number(row.quantidade || 0);
    if(!item){
      problemas.push(`${inventarioRowLabel(row)}: artigo não existe no inventário.`);
      return;
    }
    const disponivel = inventarioDisponivel(item.id, obra.id);
    if(qtd > disponivel){
      problemas.push(`${item.nome}: precisa de reservar ${qtd} ${item.unidade || 'un'}, mas só existem ${disponivel} ${item.unidade || 'un'} disponíveis.`);
    }
  });
  return {items, problemas};
}
async function aplicarReservaStockObra(id){
  const obra = state.obras.find(x => x.id === id);
  if(!obra){ alert('Obra não encontrada.'); return false; }
  if(obra.stockBaixado){ alert('O stock desta obra já foi baixado.'); return false; }
  if(obra.stockReservado){ alert('O stock desta obra já está reservado.'); return false; }
  const check = validarReservaStockObra(obra);
  if(check.items.length === 0){ alert('Esta obra não tem materiais do inventário associados.'); return false; }
  if(check.problemas.length > 0){
    alert('Não foi possível reservar o stock:\n\n' + check.problemas.join('\n'));
    return false;
  }
  obra.stockReservado = true;
  obra.stockReservadoEm = today();
  await save('obras');
  return true;
}
function reservarStockObra(id){
  const obra = state.obras.find(x => x.id === id);
  if(!obra) return;
  if(obra.stockBaixado){ alert('O stock desta obra já foi baixado.'); return; }
  if(obra.stockReservado){ alert('O stock desta obra já está reservado.'); return; }
  const check = validarReservaStockObra(obra);
  if(check.items.length === 0){ alert('Esta obra não tem materiais do inventário associados.'); return; }
  if(check.problemas.length > 0){
    alert('Antes de reservar, corrija o stock:\n\n' + check.problemas.join('\n'));
    return;
  }
  const resumo = check.items.map(row => {
    const item = inventarioById(row.inventoryId);
    return `• ${item.nome}: ${Number(row.quantidade || 0)} ${item.unidade || 'un'}`;
  }).join('\n');
  confirmAction(
    `Reservar stock para a Obra ${obraLabel(obra)}?\n\n${resumo}\n\nA reserva não desconta o inventário; apenas bloqueia estas quantidades como comprometidas.`,
    async () => { const ok = await aplicarReservaStockObra(id); if(ok) openObra(id); },
    { okLabel:'📌 Reservar stock', cancelLabel:'Cancelar', okStyle:'background:var(--blue);color:#fff;' }
  );
}
function renderObraInventarioResumo(obra){
  const rows = obraInventarioItems(obra).filter(r => r && Number(r.quantidade || 0) > 0);

  const statusHtml = obra.stockBaixado

      );
  return `
    <div class="section-box mb-4">
      <div class="flex items-center justify-between gap-3 mb-3 flex-wrap">
        <div>
          <div class="label">Materiais do Inventário Usados</div>
          <div class="text-xs" style="color:var(--muted);">${rows.length} artigo(s) associado(s) à obra</div>
        </div>
        <div class="flex gap-2 flex-wrap">${statusHtml}</div>
      </div>
      <table>
        <thead><tr><th>Artigo</th><th>Qtd. usada</th><th>Stock atual</th><th>Disponível</th><th>Estado</th></tr></thead>
        <tbody>
          ${rows.map(row => {
            const item = inventarioById(row.inventoryId);
            const unidade = inventarioRowUnidade(row);

            return `<tr>
              <td class="font-semibold">${escapeHtml(inventarioRowLabel(row))}</td>
              <td>${Number(row.quantidade || 0)} ${escapeHtml(unidade)}</td>
              <td>${stockTxt}</td>
              <td>${disponivelTxt}</td>

async function loadAll(){
  const loadWarnings = [];
  // Load theme
  try {
    const t = await window.storage.get('theme');
    if(t && t.value) theme = t.value;
  } catch(e){
    loadWarnings.push('Não foi possível carregar o tema: ' + e.message);
  }
  applyTheme();

  for(const k of STORE_KEYS){
    try {
      const r = await window.storage.get('data:'+k);
      if(r && r.value){
        const parsed = JSON.parse(r.value);
        if(Array.isArray(parsed)) state[k] = parsed;
        else loadWarnings.push('Dados inválidos em "'+k+'": esperado array.');
      }
    } catch(e){
      loadWarnings.push('Erro ao carregar "'+k+'": ' + e.message);
    }
  }

  // MIGRATE: old pago boolean → valorPago number + add ano field + renumber per year
  let changed = false;
  state.obras.forEach(o => {
    if(o.incluiFichaItur === undefined){ o.incluiFichaItur = false; changed = true; }
    if(o.valorPago === undefined){
      o.valorPago = o.pago ? Number(o.valor||0) : 0;
      changed = true;
    }
    if(!o.estado) { o.estado = 'em_curso'; changed = true; }
    if(o.observacoes === undefined) { o.observacoes = ''; changed = true; }
    if(!Array.isArray(o.itensInventario)) { o.itensInventario = []; changed = true; }
    if(o.stockReservado === undefined) { o.stockReservado = false; changed = true; }
    if(o.stockReservadoEm === undefined) { o.stockReservadoEm = ''; changed = true; }
    if(o.stockBaixado === undefined) { o.stockBaixado = false; changed = true; }
    if(!o.equipamentosUsados) { o.equipamentosUsados = []; changed = true; }
    if(!o.ficheiros) { o.ficheiros = {cobre:[],coaxial:[],fibra:[],fotos:[],outros:[]}; changed = true; }
    if(o.dataConclusao === undefined) { o.dataConclusao = ''; changed = true; }
    // MIGRATE: criar array pagamentos se não existir
    if(!Array.isArray(o.pagamentos)){
      o.pagamentos = [];
      if(Number(o.valorPago||0) > 0){
        o.pagamentos.push({id:uid(), data:o.dataPagamento||o.data||today(), valor:Number(o.valorPago), metodo:'', nota:'Migrado automaticamente'});
      }
      changed = true;
    }
    if(!o.ano){
      const y = o.data ? new Date(o.data).getFullYear() : currentYear();
      o.ano = y || currentYear();
      o._needsRenumber = true;
      changed = true;
    }
  });
  state.equipment.forEach(eq => { if(!eq.ficheiros) { eq.ficheiros = []; changed = true; } });
  // Renumber obras within their year (sequential, by data)
  if(state.obras.some(o=>o._needsRenumber)){
    const byYear = {};
    state.obras.forEach(o => { (byYear[o.ano] = byYear[o.ano] || []).push(o); });
    Object.values(byYear).forEach(arr => {
      arr.sort((a,b)=>(a.data||'').localeCompare(b.data||''));
      arr.forEach((o,i) => { o.numero = i+1; delete o._needsRenumber; });
    });
  }
  if(changed) await save('obras');

  // Old keys cleanup (services/ordens from v0)
  try {
    const oldS = await window.storage.get('data:services');
    if(oldS && oldS.value){
      const services = JSON.parse(oldS.value);
      services.forEach(s => {
        const ano = s.dataServico ? new Date(s.dataServico).getFullYear() : currentYear();
        state.obras.push({
          id: s.id || uid(), numero: nextObraNumForYear(ano), ano,
          clienteId: s.clienteId,
          data: s.dataServico || today(), dataConclusao:'',
          descricao: s.descricao || '', observacoes:'',
          valor: Number(s.valor)||0, valorPago: s.pago?Number(s.valor)||0:0,
          dataPagamento: s.dataPagamento || '', estado:'concluida',
          incluiFichaIted:false
        });
      });
      await window.storage.delete('data:services');
      await save('obras');
    }
  } catch(e){
    loadWarnings.push('Falha na migração de "services": ' + e.message);
  }
  try {
    const oldO = await window.storage.get('data:ordens');
    if(oldO && oldO.value){
      const ordens = JSON.parse(oldO.value);
      ordens.forEach(o => {
        const ano = o.data ? new Date(o.data).getFullYear() : currentYear();
        state.obras.push({
          id: o.id || uid(), numero: nextObraNumForYear(ano), ano,
          clienteId: o.clienteId || '',
          data: o.data || today(), dataConclusao:'',
          descricao: 'Ficha ITED · ' + (o.refId || ''), observacoes:'',
          valor:0, valorPago:0, dataPagamento:'', estado:'concluida',
          incluiFichaIted:true, refId: o.refId || '',
          instalador: o.instalador || {nome:'',nif:'',numero:''},
          itur: o.itur || {morada:'',codPostal:'',localidade:'',coordenadas:'',manualIted:''},
          cabos: o.cabos || [], materiais: o.materiais || [],
          docObrig: o.docObrig || {ensaios:false,calibracao:false,projeto:false},
          docFacult: o.docFacult || ''
        });
      });
      await window.storage.delete('data:ordens');
      await save('obras');
    }
  } catch(e){
    loadWarnings.push('Falha na migração de "ordens": ' + e.message);
  }

  await ensureDefaultUsers();

  if(loadWarnings.length){
    console.warn('Avisos de carregamento:', loadWarnings);
    _warn('Atenção: foram detetados problemas de carregamento/migração. Veja a consola (F12) para detalhes.');
  }
}

let _dragAttached = false;
function attachTabDrag(bar){
  if(_dragAttached) return;
  _dragAttached = true;
  let isDown = false, startX, scrollLeft, moved = false;
  bar.addEventListener('mousedown', e => {
    isDown = true; moved = false;
    bar.classList.add('dragging');
    startX = e.pageX - bar.offsetLeft;
    scrollLeft = bar.scrollLeft;
  });
  bar.addEventListener('mouseleave', () => { isDown = false; bar.classList.remove('dragging'); });
  bar.addEventListener('mouseup', () => { isDown = false; bar.classList.remove('dragging'); });
  bar.addEventListener('mousemove', e => {
    if(!isDown) return;
    e.preventDefault();
    const x = e.pageX - bar.offsetLeft;
    const walk = (x - startX);
    if(Math.abs(walk) > 4) moved = true;
    bar.scrollLeft = scrollLeft - walk;
  });
  // Block click after drag (so dragging doesn't trigger tab switch)
  bar.addEventListener('click', e => {
    if(moved){ e.stopPropagation(); e.preventDefault(); moved = false; }
  }, true);
  // Mouse wheel = horizontal scroll
  bar.addEventListener('wheel', e => {
    if(e.deltaY !== 0){
      e.preventDefault();
      bar.scrollLeft += e.deltaY;
    }
  }, {passive: false});
}

function clientStatus(clienteId){
  const obras = state.obras.filter(o => o.clienteId === clienteId);
  let divida = 0, pago = 0, pendCount = 0, parcCount = 0, pagasCount = 0;
  obras.forEach(o => {
    const val = Number(o.valor||0);
    const vp = Number(o.valorPago||0);
    pago += vp;
    divida += Math.max(0, val - vp);
    const st = paymentStatus(o).key;
    if(st === 'pendente') pendCount++;
    else if(st === 'parcial') parcCount++;
    else if(st === 'pago') pagasCount++;
  });
  const emDia = pendCount === 0 && parcCount === 0;
  return { obras, divida, pago, pendCount, parcCount, pagasCount, emDia, total: obras.length };
}

function renderMonthlyChart(){
  // Últimos 12 meses: faturado (valor de obras criadas) + recebido (valorPago)
  const now = new Date();
  const months = [];
  for(let i = 11; i >= 0; i--){
    const d = new Date(now.getFullYear(), now.getMonth() - i, 1);
    months.push({
      key: d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0'),
      label: ['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'][d.getMonth()],
      ano: d.getFullYear(),
      faturado: 0, recebido: 0
    });
  }
  const mIdx = k => months.findIndex(m => m.key === k);
  state.obras.forEach(o => {
    const valor = Number(o.valor || 0);
    const pago = Number(o.valorPago || 0);
    if(valor > 0 && o.data){
      const k = o.data.slice(0,7); // YYYY-MM
      const i = mIdx(k);
      if(i >= 0) months[i].faturado += valor;
    }
    if(pago > 0 && o.dataPagamento){
      const k = o.dataPagamento.slice(0,7);
      const i = mIdx(k);
      if(i >= 0) months[i].recebido += pago;
    } else if(pago > 0 && o.data){
      // fallback: usa data da obra se não houver dataPagamento
      const k = o.data.slice(0,7);
      const i = mIdx(k);
      if(i >= 0) months[i].recebido += pago;
    }
  });
  const maxVal = Math.max(1, ...months.map(m => Math.max(m.faturado, m.recebido)));
  const hasAny = months.some(m => m.faturado > 0 || m.recebido > 0);
  const totalFaturado = months.reduce((a,m) => a + m.faturado, 0);
  const totalRecebido = months.reduce((a,m) => a + m.recebido, 0);

  const bars = months.map((m, idx) => {
    const hFat = Math.round((m.faturado / maxVal) * 140);
    const hRec = Math.round((m.recebido / maxVal) * 140);
    const currentMonth = idx === months.length - 1;
    const title = `${m.label} ${m.ano}\nFaturado: ${fmt(m.faturado)}\nRecebido: ${fmt(m.recebido)}`;
    return `
      <div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;min-width:0;" title="${title}">
        <div style="height:150px;display:flex;align-items:flex-end;gap:3px;width:100%;justify-content:center;">
          <div style="width:12px;height:${Math.max(hFat,1)}px;background:var(--accent-grad);border-radius:3px 3px 0 0;opacity:${m.faturado>0?1:0.15};transition:height .3s;"></div>
          <div style="width:12px;height:${Math.max(hRec,1)}px;background:var(--blue-grad);border-radius:3px 3px 0 0;opacity:${m.recebido>0?1:0.15};transition:height .3s;"></div>
        </div>
        <div style="font-size:11px;color:${currentMonth?'var(--ink)':'var(--muted)'};font-weight:${currentMonth?'700':'500'};white-space:nowrap;">${m.label}</div>
      </div>
    `;
  }).join('');

  return `
  <div class="card p-5 mb-6">
    <div class="flex items-center justify-between mb-2 flex-wrap gap-2">
      <h2 class="text-xl font-bold">📊 Faturação dos Últimos 12 Meses</h2>
      <div class="text-xs" style="color:var(--muted);">Passe o rato sobre cada barra para ver valores exatos</div>
    </div>
    <div class="flex gap-4 mb-4 flex-wrap" style="font-size:12px;">
      <div style="display:flex;align-items:center;gap:6px;"><span style="width:12px;height:12px;background:var(--accent-grad);border-radius:3px;display:inline-block;"></span> <span style="color:var(--ink-soft);">Faturado: <strong style="color:var(--accent);">${fmt(totalFaturado)}</strong></span></div>
      <div style="display:flex;align-items:center;gap:6px;"><span style="width:12px;height:12px;background:var(--blue-grad);border-radius:3px;display:inline-block;"></span> <span style="color:var(--ink-soft);">Recebido: <strong style="color:var(--blue);">${fmt(totalRecebido)}</strong></span></div>
    </div>
    ${hasAny
      ? `<div style="display:flex;align-items:flex-end;gap:8px;padding:10px 0;">${bars}</div>`
      : `<div class="empty" style="padding:30px 20px;"><div class="empty-icon">📊</div>Sem dados de faturação nos últimos 12 meses.<br><span style="font-size:12px;">Crie obras com valor e data para ver o gráfico.</span></div>`
    }
  </div>
  `;
}

function _painelObraAtrasada(o){

function _painelDashboardData(){

  return {totalDivida,totalRecebido,clientesAtraso,alertLicencas,obrasAbertas,obrasAtrasadas,obrasProntas,orcPendentes,orcExpirados,stockBaixo};

  const pagamentosHtml = d.clientesAtraso.slice(0,6).map(x => `

  const licencasHtml = d.alertLicencas.slice(0,6).map(a => {

    return `<div class="py-3 border-b flex items-center justify-between gap-3 cursor-pointer" style="border-color:var(--line);" onclick="editEquip('${a.eq.id}')">

  const alertasCriticos = d.obrasAtrasadas.length + d.orcExpirados.length + d.stockBaixo.length + d.alertLicencas.length;

      return `<div class="py-3 border-b flex items-center justify-between gap-3 cursor-pointer" style="border-color:var(--line);" onclick="openObra('${o.id}')">

        <span class="badge badge-warn">Obra</span>
      </div>`;
    }),
    ...d.orcExpirados.slice(0,2).map(o => `<div class="py-3 border-b flex items-center justify-between gap-3 cursor-pointer" style="border-color:var(--line);" onclick="viewOrcamento('${o.id}')">
      <div><div class="font-semibold">${orcLabel(o)} · ${escapeHtml((o.descricao||'').slice(0,55))}</div><div class="text-xs" style="color:var(--muted);">validade ${fmtDate(orcValidadeData(o))}</div></div>
      <span class="badge badge-warn">Orçamento</span>
    </div>`),
    ...d.stockBaixo.slice(0,2).map(it => `<div class="py-3 border-b flex items-center justify-between gap-3 cursor-pointer" style="border-color:var(--line);" onclick="editItem('${it.id}')">
      <div><div class="font-semibold">${escapeHtml(it.nome)}</div><div class="text-xs" style="color:var(--muted);">stock disponível abaixo do mínimo</div></div>
      <span class="badge badge-danger">Stock</span>
    </div>`),
    ...d.alertLicencas.slice(0,2).map(a => `<div class="py-3 border-b flex items-center justify-between gap-3 cursor-pointer" style="border-color:var(--line);" onclick="editEquip('${a.eq.id}')">
      <div><div class="font-semibold">${escapeHtml(a.eq.nome)}</div><div class="text-xs" style="color:var(--muted);">${escapeHtml(a.lic.nome)} · ${fmtDate(a.lic.dataFim)}</div></div>
      <span class="badge badge-warn">Licença</span>
    </div>`)
  ].slice(0,6).join('');

  return `
  <div class="card p-5 mb-6" style="background:linear-gradient(135deg,var(--card) 0%,var(--bg-alt) 100%);">
    <div class="flex items-center justify-between gap-4 flex-wrap">
      <div>
        <div class="label">Dashboard</div>
        <h2 class="text-2xl font-bold mb-1">Visão rápida da empresa</h2>

      </div>
      <div class="flex gap-2 flex-wrap">
        <button class="btn btn-accent" onclick="editObra()">+ Nova Obra</button>
        <button class="btn btn-primary" onclick="editOrcamento()">+ Novo Orçamento</button>
      </div>
    </div>
  </div>

  <div class="grid-4 mb-6">
    ${_painelCard('Obras Abertas', d.obrasAbertas.length, `${state.obras.length} obra(s) no total`, 'stat-blue', "setObrasFilter('abertas');switchTab('obras');")}
    ${_painelCard('Prontas p/ Faturar', d.obrasProntas.length, fmt(totalPronto), 'stat-accent', "setObrasFilter('pronto_faturar');switchTab('obras');")}
    ${_painelCard('Por Receber', fmt(d.totalDivida), `${d.clientesAtraso.length} cliente(s) com valores pendentes`, 'stat-accent', '')}
    ${_painelCard('Alertas', alertasCriticos, 'obras, stock, orçamentos e licenças', 'stat-accent', '')}
  </div>

  <div class="grid-2 mb-6">
    ${_painelMiniList('💶 Obras prontas para faturar', d.obrasProntas.length, 'Nenhuma obra pronta para faturar.', obrasProntasHtml, '<div class="mt-3"><button class="btn btn-ghost" onclick="setObrasFilter(\'pronto_faturar\');switchTab(\'obras\');">Ver todas →</button></div>')}
    ${_painelMiniList('⚠️ Prioridades de hoje', alertasCriticos, 'Sem alertas importantes.', alertaRows, '<div class="mt-3 flex gap-2 flex-wrap"><button class="btn btn-ghost" onclick="setObrasFilter(\'abertas\');switchTab(\'obras\');">Obras →</button><button class="btn btn-ghost" onclick="switchTab(\'inventario\');">Stock →</button><button class="btn btn-ghost" onclick="switchTab(\'equipamentos\');">Licenças →</button></div>')}

      ${_painelMiniList('📦 Stock baixo', d.stockBaixo.length, 'Sem alertas de stock baixo.', stockHtml, '<div class="mt-3"><button class="btn btn-ghost" onclick="switchTab(\'inventario\');">Ver inventário →</button></div>')}
      ${_painelMiniList('💰 Pagamentos em atraso', d.clientesAtraso.length, 'Todos os clientes estão em dia.', pagamentosHtml, '')}
      ${_painelMiniList('🔧 Licenças / calibrações a expirar', d.alertLicencas.length, 'Nenhuma licença a expirar nos próximos 30 dias.', licencasHtml, '<div class="mt-3"><button class="btn btn-ghost" onclick="switchTab(\'equipamentos\');">Ver equipamentos →</button></div>')}
      <div class="card p-5">

          <div class="section-box"><div class="label">Já recebido</div><div class="stat-num stat-ok" style="font-size:26px;">${fmt(d.totalRecebido)}</div></div>

// ============ 7. CLIENTES (LISTA) ============
function viewClientes(){
  const activeClients = state.clients.filter(c => !c.arquivado);
  const archivedCount = state.clients.length - activeClients.length;
  return `
  <div class="flex items-center justify-between mb-6">
    <div><h2 class="text-2xl font-bold">Clientes</h2><p class="text-sm" style="color:var(--muted);">${activeClients.length} cliente(s)${archivedCount>0?' · <a href="#" onclick="event.preventDefault();_toggleArquivados()" style="color:var(--blue);">'+archivedCount+' arquivado(s)</a>':''}</p></div>
    <button class="btn btn-accent" onclick="editCliente()">+ Novo Cliente</button>
  </div>
  ${activeClients.length===0
    ? `<div class="card empty"><div class="empty-icon">👥</div>Sem clientes. Clique em "Novo Cliente" para começar.</div>`
    : `<div class="card"><table><thead><tr><th>Nome</th><th>NIF</th><th>Contacto</th><th>Obras</th><th>Estado</th><th>Por Receber</th><th></th></tr></thead><tbody>${
        activeClients.map(c => {
          const st = clientStatus(c.id);
          const estadoBadge = st.total === 0 ? '<span class="badge badge-neutral">sem obras</span>'
            : (st.emDia ? '<span class="badge badge-ok">Em dia</span>' : `<span class="badge badge-warn">${st.pendCount+st.parcCount} pendente(s)</span>`);
          return `<tr class="clickable" onclick="openCliente('${c.id}')">
            <td class="font-semibold">${escapeHtml(c.nome)}</td>
            <td>${escapeHtml(c.nif||'—')}</td>
            <td>${escapeHtml(c.contacto||'—')}</td>
            <td>${st.total}</td>
            <td>${estadoBadge}</td>
            <td><span class="${st.divida>0?'font-semibold':''}" style="${st.divida>0?'color:var(--accent);':''}">${fmt(st.divida)}</span></td>
            <td class="text-right"><button class="btn btn-danger" onclick="event.stopPropagation();deleteCliente('${c.id}')" title="Eliminar">🗑</button></td>
          </tr>`;
        }).join('')
      }</tbody></table></div>`
  }`;
}

function editCliente(id){
  const c = id ? state.clients.find(x=>x.id===id) : {nome:'',nif:'',morada:'',codPostal:'',localidade:'',contacto:'',email:'',notas:''};
  openModal(`
    <div class="p-6">
      <h2 class="text-2xl font-bold mb-5">${id?'Editar':'Novo'} Cliente</h2>
      <div class="grid-2">
        <div><label class="label">Nome *</label><input class="input" id="f-nome" value="${escapeAttr(c.nome)}"></div>
        <div><label class="label">NIF</label><input class="input" id="f-nif" value="${escapeAttr(c.nif||'')}"></div>
        <div><label class="label">Contacto</label><input class="input" id="f-contacto" value="${escapeAttr(c.contacto||'')}"></div>
        <div><label class="label">Email</label><input class="input" id="f-email" value="${escapeAttr(c.email||'')}"></div>
        <div><label class="label">Morada</label><input class="input" id="f-morada" value="${escapeAttr(c.morada||'')}"></div>
        <div><label class="label">Cód. Postal</label><input class="input" id="f-cp" value="${escapeAttr(c.codPostal||'')}"></div>
        <div><label class="label">Localidade</label><input class="input" id="f-loc" value="${escapeAttr(c.localidade||'')}"></div>
      </div>
      <div class="mt-3"><label class="label">Notas</label><textarea class="input" id="f-notas" rows="3">${escapeHtml(c.notas||'')}</textarea></div>
      <div class="flex justify-between mt-6">
        ${id?`<button class="btn btn-danger" onclick="deleteCliente('${id}')">Eliminar</button>`:'<div></div>'}
        <div class="flex gap-2">
          <button class="btn btn-ghost" onclick="${id?`openCliente('${id}')`:'closeModal(true)'}">Cancelar</button>
          <button class="btn btn-primary" onclick="saveCliente('${id||''}')">Guardar</button>
        </div>
      </div>
    </div>
  `);
}
async function saveCliente(id){
  if(window._saving) return; window._saving = true;
  try {
    const data = {
      nome: document.getElementById('f-nome').value.trim(),
      nif: document.getElementById('f-nif').value.trim(),
      morada: document.getElementById('f-morada').value.trim(),
      codPostal: document.getElementById('f-cp').value.trim(),
      localidade: document.getElementById('f-loc').value.trim(),
      contacto: document.getElementById('f-contacto').value.trim(),
      email: document.getElementById('f-email').value.trim(),
      notas: document.getElementById('f-notas').value.trim(),
    };
    if(!data.nome){ alert('Nome é obrigatório'); return; }
    let finalId = id;
    if(id){
      const i = state.clients.findIndex(c=>c.id===id);
      if(i < 0){ alert('Cliente não encontrado.'); return; }
      state.clients[i] = {...state.clients[i], ...data};
    } else {
      finalId = uid();
      state.clients.push({id:finalId, ...data});
    }
    await save('clients');
    clearDirty();
    closeModal(true);
    renderView();
  } catch(e){
    console.error('saveCliente failed:', e);
  } finally { window._saving = false; }
}
function deleteCliente(id){
  const c = state.clients.find(x=>x.id===id);
  if(!c) return;
  const obrasAssoc = state.obras.filter(o=>o.clienteId===id);
  let msg = 'Eliminar o cliente "' + c.nome + '"?';
  if(obrasAssoc.length > 0){
    msg += '\n\n⚠️ Este cliente tem ' + obrasAssoc.length + ' obra(s) associada(s):\n';
    msg += obrasAssoc.slice(0,8).map(o => '  • ' + obraLabel(o) + ' — ' + (o.descricao||'sem descrição').slice(0,40)).join('\n');
    if(obrasAssoc.length > 8) msg += '\n  ... e mais ' + (obrasAssoc.length-8);
    msg += '\n\nAs obras ficarão sem cliente associado.';
  }
  openModal(`
    <div class="p-6">
      <h3 class="text-xl font-bold mb-3">Eliminar ou Arquivar Cliente?</h3>
      <p class="text-sm mb-4" style="color:var(--ink-soft);white-space:pre-line;line-height:1.6;">${escapeHtml(msg)}</p>
      <div class="flex flex-wrap justify-end gap-2 mt-5">
        <button class="btn btn-ghost" onclick="closeModal(true)">Cancelar</button>
        <button class="btn" style="background:var(--blue);color:#fff;" onclick="_arquivarCliente('${id}')">📦 Arquivar (recomendado)</button>
        <button class="btn btn-danger" onclick="_eliminarClienteConfirmado('${id}')">🗑 Eliminar definitivamente</button>
      </div>
      <div class="text-xs mt-3" style="color:var(--muted);">Arquivar mantém os dados do cliente mas oculta da lista principal. Pode restaurar depois.</div>
    </div>
  `);
}
async function _arquivarCliente(id){
  const c = state.clients.find(x=>x.id===id);
  if(c) c.arquivado = true;
  await save('clients');
  closeModal(true); currentTab='clientes'; renderTabs(); renderView();
}
async function _eliminarClienteConfirmado(id){
  const prevClients = JSON.parse(JSON.stringify(state.clients));
  const prevObras = JSON.parse(JSON.stringify(state.obras));
  state.clients = state.clients.filter(c=>c.id!==id);
  state.obras.forEach(o => { if(o.clienteId === id) o.clienteId = ''; });
  try {
    await saveMany(['clients','obras']);
  } catch(e){
    state.clients = prevClients;
    state.obras = prevObras;
    _warn('Falha ao eliminar cliente. Alterações revertidas em memória.');
    return;
  }
  closeModal(true); currentTab='clientes'; renderTabs(); renderView();
}
function _toggleArquivados(){
  const arq = state.clients.filter(c=>c.arquivado);
  if(arq.length===0){ alert('Sem clientes arquivados.'); return; }
  openModal(`
    <div class="p-6">
      <h3 class="text-xl font-bold mb-3">📦 Clientes Arquivados</h3>
      <table><thead><tr><th>Nome</th><th>NIF</th><th></th></tr></thead><tbody>
        ${arq.map(c=>`<tr>
          <td>${escapeHtml(c.nome)}</td><td>${escapeHtml(c.nif||'—')}</td>
          <td style="text-align:right;"><button class="btn btn-ghost" onclick="_restaurarCliente('${c.id}')" style="font-size:12px;">Restaurar</button></td>
        </tr>`).join('')}
      </tbody></table>
      <div class="flex justify-end mt-4"><button class="btn btn-ghost" onclick="closeModal(true)">Fechar</button></div>
    </div>
  `);
}
async function _restaurarCliente(id){
  const c = state.clients.find(x=>x.id===id);
  if(c) { delete c.arquivado; await save('clients'); }
  closeModal(true); renderView();
}

    ? '<span class="badge badge-neutral">Sem obras</span>'

          ${c.notas?`<div class="text-sm mt-3 italic p-2 rounded" style="color:var(--ink-soft);background:var(--line-soft);">"${escapeHtml(c.notas)}"</div>`:''}
        </div>

      ${obrasOrdered.length===0 ? `<div class="empty"><div class="empty-icon">🔨</div>Sem obras. Clique em "Nova Obra" para criar a primeira.</div>` :
        `<table><thead><tr><th>Nº</th><th>Data</th><th>Descrição</th><th>Valor</th><th>Estado</th><th>Pagamento</th></tr></thead><tbody>${
          obrasOrdered.map(o=>{
            const pay = paymentStatus(o);
            const est = obraEstado(o);
            const payExtra = pay.key==='parcial'?`<div class="text-xs mt-0.5" style="color:var(--muted);">${fmt(o.valorPago)} / ${fmt(o.valor)}</div>`:'';
            return `<tr class="clickable" onclick="openObra('${o.id}')">
              <td class="obra-num">${obraLabel(o)}</td>
              <td>${fmtDate(o.data)}</td>
              <td>${escapeHtml((o.descricao||'').slice(0,60))}${fichaBadges(o)}</td>
              <td class="font-semibold">${fmt(o.valor)}</td>
              <td><span class="badge ${est.cls}">${est.label}</span></td>
              <td><span class="badge ${pay.cls}">${pay.label}</span>${payExtra}</td>
            </tr>`;
          }).join('')
        }</tbody></table>`
      }
    </div>
  `);
}

// ============ 8. FICHA DA OBRA ============
function openObra(id){
  const o = state.obras.find(x=>x.id===id); if(!o) return;
  const c = o.clienteId ? state.clients.find(x=>x.id===o.clienteId) : null;
  const orcOrigem = o.orcamentoId ? orcamentoById(o.orcamentoId) : null;
  const pay = paymentStatus(o);
  const est = obraEstado(o);
  const valor = Number(o.valor||0);
  const valorPago = Number(o.valorPago||0);
  const emFalta = Math.max(0, valor - valorPago);
  const progressPct = valor > 0 ? Math.min(100, (valorPago/valor)*100) : 0;

  openModal(`
    <div class="p-6">
      <div class="flex items-start justify-between gap-3 mb-5">
        <div>

            <span class="badge ${est.cls}">${est.label}</span>
            <span class="badge ${pay.cls}">${pay.label}</span>
            ${fichaBigBadges(o)}

        </div>
        <div class="flex gap-2">
          ${pay.key !== 'pago' && valor > 0?`<button class="btn btn-ok" onclick="registarPagamento('${o.id}')">€ Registar Pagamento</button>`:''}
          ${o.estado !== 'concluida' ? `<button class="btn btn-ok" onclick="setObraEstado('${o.id}','concluida')" title="Marcar como concluída">✓ Concluir</button>` : `<button class="btn btn-ghost" onclick="setObraEstado('${o.id}','em_curso')" title="Reabrir obra">↻ Reabrir</button>`}
          ${obraInventarioItems(o).length > 0 && !o.stockBaixado ? `<button class="btn btn-primary" onclick="baixarStockObra('${o.id}')">📦 Dar baixa stock</button>` : ''}
          <button class="btn btn-accent" onclick="exportObraZIP('${o.id}', ${o.estado === 'concluida' ? 'true' : 'false'})">📦 ${o.estado === 'concluida' ? 'Extrair ZIP Final' : 'Exportar ZIP'}</button>

              <div style="height:1px;background:var(--line-soft);"></div>
              <button onclick="document.getElementById('obra-menu-${o.id}').style.display='none';deleteObra('${o.id}')" style="width:100%;text-align:left;padding:11px 14px;border:none;background:none;cursor:pointer;display:flex;align-items:center;gap:10px;color:var(--danger);font-size:14px;" onmouseover="this.style.background='var(--danger-soft)'" onmouseout="this.style.background=''">🗑 <span>Eliminar obra</span></button>
            </div>
          </div>

      <div class="card p-4 mb-4 flex items-center justify-between gap-3" style="background:var(--bg-alt);">

        </div>
        <button class="btn ${c?'btn-ghost':'btn-accent'}" onclick="pickClienteForObra('${o.id}')">${c?'Mudar cliente':'+ Associar cliente'}</button>

      ${orcOrigem ? `
      <div class="card p-4 mb-4 flex items-center justify-between gap-3" style="background:var(--bg-alt);">
        <div>
          <div class="label">Orçamento de Origem</div>
          <div class="font-semibold mt-1" style="font-size:17px;color:var(--accent);">📋 ${orcLabel(orcOrigem)}</div>

          ${(o.pagamentos||[]).length > 0 ? `

              <div class="text-xs font-semibold mb-2" style="color:var(--muted);">HISTÓRICO DE PAGAMENTOS</div>
              ${(o.pagamentos||[]).slice().sort((a,b)=>(b.data||'').localeCompare(a.data||'')).slice(0,5).map(p => `
                <div class="flex justify-between text-sm py-1" style="border-bottom:1px solid var(--line-soft);">
                  <span>${fmtDate(p.data)} ${p.metodo?'<span style="color:var(--muted);">· '+escapeHtml(p.metodo)+'</span>':''}${p.nota?' — <span style="color:var(--muted);">'+escapeHtml(p.nota)+'</span>':''}</span>
                  <strong style="color:var(--ok);">${fmt(p.valor)}</strong>
                </div>

              ${(o.pagamentos||[]).length > 5 ? '<div class="text-xs mt-1" style="color:var(--muted);">... e mais '+ ((o.pagamentos||[]).length - 5) +' pagamento(s)</div>' : ''}

        <div style="white-space:pre-wrap;margin-top:8px;line-height:1.6;">${escapeHtml(o.descricao||'—')}</div>
      </div>

      ${renderObraInventarioResumo(o)}

      <!-- Secção de Presenças — substitui Observações para ficar bem visível -->
      ${typeof presencasObraHtml === 'function' ? presencasObraHtml(o.id) : '<div style="color:red;">presencasObraHtml não definida</div>'}

      ${(o.incluiFichaIted || o.incluiFichaItur) ? `

          <div>
            <div class="font-semibold">Ficha(s) de Identificações: ${fichaBigBadges(o)}</div>
            <div class="text-xs" style="color:var(--muted);">Ref. ID: ${escapeHtml(o.refId||'—')}</div>
          </div>
          <button class="btn btn-primary" onclick="previewObraPDF('${o.id}')">↓ Ver / Exportar PDF</button>
        </div>
      ` : ''}
    </div>
  `);
}

// ============ 9. PAGAMENTOS ============
function toggleObraMenu(id){
  const el = document.getElementById('obra-menu-' + id);
  if(!el) return;
  const isOpen = el.style.display === 'block';
  document.querySelectorAll('[id^="obra-menu-"]').forEach(m => m.style.display = 'none');
  el.style.display = isOpen ? 'none' : 'block';
  if(!isOpen){
    setTimeout(() => {
      document.addEventListener('click', function closeOnce(e){
        if(!e.target.closest('#obra-menu-' + id) && !e.target.closest('[onclick*="toggleObraMenu"]')){
          el.style.display = 'none';
          document.removeEventListener('click', closeOnce);
        }
      });
    }, 50);
  }
}

async function duplicarObra(id){
  if(window._saving) return; window._saving = true;
  try {
    const orig = state.obras.find(x => x.id === id);
    if(!orig) return;
    const ano = currentYear();
    const nova = {
      id: uid(),
      numero: nextObraNumForYear(ano),
      ano,
      clienteId: orig.clienteId || '',
      data: today(),
      dataConclusao: '',
      descricao: 'CÓPIA - ' + (orig.descricao || ''),
      observacoes: '',
      valor: 0, valorPago: 0, dataPagamento: '', pagamentos: [],
      estado: 'em_curso',
      incluiFichaIted: !!orig.incluiFichaIted,
      incluiFichaItur: !!orig.incluiFichaItur,
      refId: '',
      instalador: orig.instalador ? {...orig.instalador} : {nome:'',nif:'',numero:''},
      itur: {
        morada: '', codPostal: '', localidade: '', coordenadas: '',
        manualIted: (orig.itur && orig.itur.manualIted) || ''
      },
      cabos: (orig.cabos || []).map(c => ({...c})),
      materiais: (orig.materiais || []).map(m => ({...m})),
      docObrig: orig.docObrig ? {...orig.docObrig} : {ensaios:false,calibracao:false,projeto:false},
      docFacult: orig.docFacult || '',
      equipamentosUsados: [...(orig.equipamentosUsados || [])],
      itensInventario: (orig.itensInventario || []).map(item => ({...item, id:uid()})),
      stockReservado: false,
      stockReservadoEm: '',
      stockBaixado: false,
      stockBaixadoEm: '',
      ficheiros: {cobre:[], coaxial:[], fibra:[], fotos:[], outros:[]},
      _duplicadaDe: orig.id
    };
    state.obras.push(nova);
    await save('obras');
    closeModal(true);
    editObra(nova.id);
  } catch(e){
    console.error('duplicarObra failed:', e);
  } finally { window._saving = false; }
}

async function setObraEstado(id, novoEstado){
  const o = state.obras.find(x=>x.id===id);
  if(!o) return;
  const wasConcluida = o.estado === 'concluida';
  o.estado = novoEstado;
  if(novoEstado === 'concluida' && !o.dataConclusao){
    o.dataConclusao = today();
  }
  await save('obras');
  if(novoEstado === 'concluida' && !wasConcluida){
    if(obraInventarioItems(o).filter(r => Number(r.quantidade || 0) > 0).length > 0 && !o.stockBaixado){
      confirmAction(
        `✓ Obra ${obraLabel(o)} marcada como concluída.

Quer dar baixa no inventário dos materiais usados nesta obra?`,
        async () => { const ok = await aplicarBaixaStockObra(id); if(ok) openObra(id); },
        {
          okLabel: '📦 Dar baixa no stock',
          cancelLabel: 'Não agora',
          okStyle: 'background:var(--blue);color:#fff;',
          onCancel: () => openObra(id)
        }
      );
      return;
    }
    confirmAction(
      `✓ Obra ${obraLabel(o)} marcada como concluída.

Quer extrair agora o ZIP final com toda a documentação?`,
      () => exportObraZIP(id, true),
      {
        okLabel: '📦 Extrair ZIP Final',
        cancelLabel: 'Mais tarde',
        okStyle: 'background:var(--accent);color:#fff;',
        onCancel: () => openObra(id)
      }
    );
    return;
  }
  openObra(id);
}

function registarPagamento(id){
  const o = state.obras.find(x=>x.id===id);
  if(!Array.isArray(o.pagamentos)) o.pagamentos = [];
  _recalcPagamento(o);
  const emFalta = Math.max(0, Number(o.valor||0) - o.valorPago);

  const histHtml = o.pagamentos.length === 0
    ? '<div class="text-sm" style="color:var(--muted);padding:8px 0;">Sem pagamentos registados.</div>'
    : o.pagamentos.slice().sort((a,b)=>(b.data||'').localeCompare(a.data||'')).map(p => `
        <div class="flex items-center justify-between py-2" style="border-bottom:1px solid var(--line-soft);">
          <div>
            <span class="font-semibold" style="color:var(--ok);">${fmt(p.valor)}</span>
            <span class="text-xs" style="color:var(--muted);margin-left:8px;">${fmtDate(p.data)}${p.metodo?' · '+escapeHtml(p.metodo):''}${p.nota?' — '+escapeHtml(p.nota):''}</span>
          </div>
          <button class="icon-btn" onclick="removerPagamento('${id}','${p.id}')" title="Remover" style="color:var(--danger);font-size:13px;">✕</button>
        </div>
      `).join('');

  openModal(`
    <div class="p-6">
      <h2 class="text-2xl font-bold mb-2">Registar Pagamento</h2>
      <p class="text-sm mb-5" style="color:var(--muted);">Obra <span class="obra-num">${obraLabel(o)}</span></p>

      <div class="grid-3 mb-4">
        <div class="card p-3"><div class="label">Valor Total</div><div class="font-semibold text-lg">${fmt(o.valor)}</div></div>
        <div class="card p-3"><div class="label">Já Pago</div><div class="font-semibold text-lg" style="color:var(--ok);">${fmt(o.valorPago)}</div></div>
        <div class="card p-3"><div class="label">Em Falta</div><div class="font-semibold text-lg" style="color:var(--accent);">${fmt(emFalta)}</div></div>
      </div>

      <h3 class="serif font-bold mb-2">Histórico de Pagamentos</h3>
      <div class="section-box mb-4" style="max-height:180px;overflow-y:auto;">${histHtml}</div>

      <h3 class="serif font-bold mb-2">Novo Pagamento</h3>
      <div class="grid-2 mb-2">
        <div><label class="label">Valor (€)</label><input class="input" type="number" step="0.01" id="p-valor" value="${emFalta.toFixed(2)}"></div>
        <div><label class="label">Data</label><input class="input" type="date" id="p-data" value="${today()}"></div>
      </div>
      <div class="grid-2 mb-3">
        <div><label class="label">Método</label><select class="select" id="p-metodo"><option value="">—</option><option value="Transferência">Transferência</option><option value="MBWay">MBWay</option><option value="Numerário">Numerário</option><option value="Cheque">Cheque</option><option value="Outro">Outro</option></select></div>
        <div><label class="label">Nota (opcional)</label><input class="input" id="p-nota" placeholder="ex: Pagamento parcial"></div>
      </div>

      <div class="flex gap-2 mb-4">
        <button class="btn btn-ghost" onclick="document.getElementById('p-valor').value='${emFalta.toFixed(2)}'">Pagar tudo</button>
        <button class="btn btn-ghost" onclick="document.getElementById('p-valor').value='${(emFalta/2).toFixed(2)}'">Metade</button>
      </div>

      <div class="flex justify-end gap-2 mt-4">
        <button class="btn btn-ghost" onclick="openObra('${id}')">Cancelar</button>
        <button class="btn btn-ok" onclick="confirmarPagamento('${id}')">Confirmar Pagamento</button>
      </div>
    </div>
  `);
}
async function confirmarPagamento(id){
  if(window._saving) return; window._saving = true;
  try {
    const o = state.obras.find(x=>x.id===id);
    const v = parseFloat(document.getElementById('p-valor').value)||0;
    const d = document.getElementById('p-data').value || today();
    const metodo = document.getElementById('p-metodo').value || '';
    const nota = document.getElementById('p-nota').value || '';
    if(v <= 0){ alert('Valor inválido'); return; }
    if(!Array.isArray(o.pagamentos)) o.pagamentos = [];
    o.pagamentos.push({id:uid(), data:d, valor:v, metodo, nota});
    _recalcPagamento(o);
    await save('obras');
    openObra(id);
  } catch(e){
    console.error('confirmarPagamento failed:', e);
  } finally { window._saving = false; }
}
async function removerPagamento(obraId, pagId){
  const o = state.obras.find(x=>x.id===obraId);
  if(!o) return;
  o.pagamentos = (o.pagamentos||[]).filter(p=>p.id!==pagId);
  _recalcPagamento(o);
  await save('obras');
  registarPagamento(obraId);
}

// ============ 8b. ASSOCIAR CLIENTE A OBRA ============
function pickClienteForObra(obraId){
  const o = state.obras.find(x=>x.id===obraId); if(!o) return;
  const list = state.clients.length === 0
    ? `<div class="empty"><div class="empty-icon">👥</div>Sem clientes. Crie um cliente primeiro no separador "Clientes".</div>`
    : state.clients.map(c => {
        const isCurrent = o.clienteId === c.id;
        return `
          <div class="card p-3 mb-2 cursor-pointer flex items-center justify-between" onclick="associateClienteToObra('${obraId}','${c.id}')" style="${isCurrent?'border-color:var(--accent);':''}">
            <div>
              <div class="font-semibold">${escapeHtml(c.nome)}</div>
              <div class="text-xs mt-1" style="color:var(--muted);">${c.nif?'NIF '+escapeHtml(c.nif):''}${c.contacto?' · '+escapeHtml(c.contacto):''}</div>
            </div>
            ${isCurrent?'<span class="badge badge-ok">Atual</span>':'<span style="color:var(--muted);">→</span>'}
          </div>`;
      }).join('');
  openModal(`
    <div class="p-6">
      <div class="flex items-center justify-between mb-4">
        <div>
          <h2 class="text-2xl font-bold">Associar Cliente</h2>
          <p class="text-sm" style="color:var(--muted);">Obra <span class="obra-num">${obraLabel(o)}</span></p>
        </div>
        <button class="icon-btn text-xl" onclick="openObra('${obraId}')">✕</button>
      </div>
      <input class="input mb-4" id="cli-filter" placeholder="Filtrar por nome, NIF ou contacto..." oninput="filterClientPicker(this.value)">
      <div id="cli-picker-list">${list}</div>
      ${o.clienteId?`<div class="mt-4 text-center"><button class="btn btn-danger" onclick="associateClienteToObra('${obraId}','')">Remover associação ao cliente</button></div>`:''}
    </div>
  `);
}
function filterClientPicker(q){
  q = q.toLowerCase().trim();
  document.querySelectorAll('#cli-picker-list .card').forEach(el => {
    el.style.display = !q || el.textContent.toLowerCase().includes(q) ? '' : 'none';
  });
}
async function associateClienteToObra(obraId, clienteId){
  const o = state.obras.find(x=>x.id===obraId);
  o.clienteId = clienteId || '';
  await save('obras');
  openObra(obraId);
}

function addEquipToObra(eqId){
  if(!eqId) return;
  syncObraFromForm();
  window._editingObra.equipamentosUsados = window._editingObra.equipamentosUsados || [];
  if(!window._editingObra.equipamentosUsados.includes(eqId)) window._editingObra.equipamentosUsados.push(eqId);
  _renderObraModal();
}
function removeEquipFromObra(eqId){
  syncObraFromForm();
  window._editingObra.equipamentosUsados = (window._editingObra.equipamentosUsados||[]).filter(x=>x!==eqId);
  _renderObraModal();
}

function addInventarioToObra(itemId){
  if(!itemId) return;
  syncObraFromForm();
  const item = inventarioById(itemId);
  if(!item) return;
  const o = window._editingObra;
  if(!Array.isArray(o.itensInventario)) o.itensInventario = [];
  const existing = o.itensInventario.find(row => row.inventoryId === itemId);
  if(existing){
    existing.quantidade = Number(existing.quantidade || 0) + 1;
  } else {
    o.itensInventario.push({
      id: uid(),
      inventoryId: item.id,
      nome: item.nome || '',
      unidade: item.unidade || 'un',
      quantidade: 1,
      precoUnitario: Number(item.precoUnitario || 0)
    });
  }
  _renderObraModal();
}
function removeInventarioFromObra(i){
  syncObraFromForm();
  if(Array.isArray(window._editingObra.itensInventario)) window._editingObra.itensInventario.splice(i,1);
  _renderObraModal();
}

function toggleFichaTipo(tipo){
  syncObraFromForm();
  const o = window._editingObra;
  if(tipo === 'itur') o.incluiFichaItur = !o.incluiFichaItur;
  if(tipo === 'ited') o.incluiFichaIted = !o.incluiFichaIted;
  // Inicialização defensiva ao ativar pela primeira vez
  if(o.incluiFichaIted || o.incluiFichaItur){
    if(!o.instalador) o.instalador = {nome:'',nif:'',numero:''};
    if(!o.itur) o.itur = {morada:'',codPostal:'',localidade:'',coordenadas:'',manualIted:''};
    if(!Array.isArray(o.cabos)) o.cabos = [];
    if(!Array.isArray(o.materiais)) o.materiais = [];
    if(!o.docObrig) o.docObrig = {ensaios:false,calibracao:false,projeto:false};
    if(o.docFacult === undefined) o.docFacult = '';
    if(o.refId === undefined) o.refId = '';
  }
  _renderObraModal();
}

// === Autocomplete Instalador/Cliente ===
function buildInstaladorPool(){
  const pool = new Map();
  state.obras.forEach(o => {
    const nome = (o.instalador && o.instalador.nome || '').trim();
    if(!nome) return;
    const key = nome.toLowerCase();
    if(!pool.has(key)){
      pool.set(key, {nome, nif:o.instalador.nif||'', numero:o.instalador.numero||'', origem:'instalador'});
    } else {
      const p = pool.get(key);
      if(!p.nif && o.instalador.nif) p.nif = o.instalador.nif;
      if(!p.numero && o.instalador.numero) p.numero = o.instalador.numero;
    }
  });
  state.clients.forEach(c => {
    const nome = (c.nome||'').trim();
    if(!nome) return;
    const key = nome.toLowerCase();
    if(!pool.has(key)){
      pool.set(key, {nome, nif:c.nif||'', numero:'', origem:'cliente'});
    }
  });
  return Array.from(pool.values());
}

function onInstaladorInput(){
  const inp = document.getElementById('o-inst-nome');
  const box = document.getElementById('inst-suggest');
  if(!inp || !box) return;
  const q = inp.value.trim().toLowerCase();
  const pool = buildInstaladorPool();
  let list = pool;
  if(q) list = pool.filter(p => p.nome.toLowerCase().includes(q));
  list = list.slice(0, 8);
  if(list.length === 0){ box.style.display = 'none'; return; }
  box.innerHTML = list.map((p,i) => {
    const badge = p.origem === 'cliente'
      ? '<span class="badge badge-blue" style="font-size:9px;">Cliente</span>'
      : '<span class="badge" style="background:var(--accent-soft);color:var(--accent);font-size:9px;">Instalador</span>';
    const sub = [p.nif && ('NIF '+p.nif), p.numero && ('Nº '+p.numero)].filter(Boolean).join(' · ') || '<em style="color:var(--muted);">sem dados adicionais</em>';
    return `<div onmousedown="pickInstalador(${i})" data-idx="${i}" style="padding:10px 14px;cursor:pointer;border-bottom:1px solid var(--line-soft);" onmouseover="this.style.background='var(--line-soft)'" onmouseout="this.style.background=''">
      <div style="display:flex;align-items:center;gap:8px;"><strong>${escapeHtml(p.nome)}</strong> ${badge}</div>
      <div style="font-size:12px;color:var(--muted);margin-top:2px;">${sub}</div>
    </div>`;
  }).join('');
  window._instPool = list;
  box.style.display = 'block';
}

function pickInstalador(idx){
  const p = (window._instPool||[])[idx];
  if(!p) return;
  const nome = document.getElementById('o-inst-nome');
  const nif = document.getElementById('o-inst-nif');
  const num = document.getElementById('o-inst-num');
  if(nome) nome.value = p.nome;
  if(nif && p.nif) nif.value = p.nif;
  if(num && p.numero) num.value = p.numero;
  hideInstaladorSuggestions();
}

function hideInstaladorSuggestions(){
  const box = document.getElementById('inst-suggest');
  if(box) box.style.display = 'none';
}

function toggleItedSection(checked){
  syncObraFromForm();
  window._editingObra.incluiFichaIted = checked;
  _renderObraModal();
}

function refreshCatalogRowStatus(){
  const o = window._editingObra;
  if(!o || (!o.incluiFichaIted && !o.incluiFichaItur)) return;
  // Sync current values from inputs into o without re-rendering
  document.querySelectorAll('[data-c]').forEach(el=>{
    const i=+el.dataset.i, k=el.dataset.c;
    if(!o.cabos[i]) o.cabos[i]={tecnologia:'',marca:'',classe:'',ref:''};
    if(k==='tec') o.cabos[i].tecnologia=el.value;
    if(k==='marca') o.cabos[i].marca=el.value;
    if(k==='classe') o.cabos[i].classe=el.value;
    if(k==='ref') o.cabos[i].ref=el.value;
  });
  document.querySelectorAll('[data-m]').forEach(el=>{
    const i=+el.dataset.i, k=el.dataset.m;
    if(!o.materiais[i]) o.materiais[i]={designacao:'',marca:'',ref:''};
    if(k==='des') o.materiais[i].designacao=el.value;
    if(k==='marca') o.materiais[i].marca=el.value;
    if(k==='ref') o.materiais[i].ref=el.value;
  });
  // Update icons in the cabo rows
  const caboRows = document.querySelectorAll('[data-c="tec"]');
  caboRows.forEach((el,_) => {
    const i = +el.dataset.i;
    const span = el.parentElement.querySelector('span[title]');
    if(span && o.cabos[i]){
      const s = catalogRowStatus(o.cabos[i], 'cabo');
      span.textContent = s.icon;
      span.title = s.title;
    }
  });
  const matRows = document.querySelectorAll('[data-m="des"]');
  matRows.forEach((el,_) => {
    const i = +el.dataset.i;
    const span = el.parentElement.querySelector('span[title]');
    if(span && o.materiais[i]){
      const s = catalogRowStatus(o.materiais[i], 'material');
      span.textContent = s.icon;
      span.title = s.title;
    }
  });
}

function syncObraFromForm(){
  const o = window._editingObra;
  if(!o) return;
  const val = id => { const el=document.getElementById(id); return el?el.value:''; };
  const chk = id => { const el=document.getElementById(id); return el?el.checked:false; };
  o.numero = parseInt(val('o-numero'))||o.numero;

    if(!o.itur) o.itur = {morada:'',codPostal:'',localidade:'',coordenadas:'',manualIted:''};
    if(!Array.isArray(o.cabos)) o.cabos = [];
    if(!Array.isArray(o.materiais)) o.materiais = [];
    if(!o.docObrig) o.docObrig = {ensaios:false,calibracao:false,projeto:false};
    if(o.docFacult === undefined) o.docFacult = '';
    if(o.refId === undefined) o.refId = '';

    if(document.getElementById('o-inst-nome')){

      o.instalador.nif = val('o-inst-nif');
      o.instalador.numero = val('o-inst-num');
    }
    if(document.getElementById('o-itur-morada')){
      o.itur.morada = val('o-itur-morada');
      o.itur.codPostal = val('o-itur-cp');
      o.itur.localidade = val('o-itur-loc');
      o.itur.coordenadas = val('o-itur-coord');
      o.itur.manualIted = val('o-itur-manual');
    }
    document.querySelectorAll('[data-c]').forEach(el=>{
      const i=+el.dataset.i, k=el.dataset.c;
      if(!o.cabos[i]) o.cabos[i]={tecnologia:'',marca:'',classe:'',ref:''};
      if(k==='tec') o.cabos[i].tecnologia=el.value;
      if(k==='marca') o.cabos[i].marca=el.value;
      if(k==='classe') o.cabos[i].classe=el.value;
      if(k==='ref') o.cabos[i].ref=el.value;
    });
    document.querySelectorAll('[data-m]').forEach(el=>{
      const i=+el.dataset.i, k=el.dataset.m;
      if(!o.materiais[i]) o.materiais[i]={designacao:'',marca:'',ref:''};
      if(k==='des') o.materiais[i].designacao=el.value;
      if(k==='marca') o.materiais[i].marca=el.value;
      if(k==='ref') o.materiais[i].ref=el.value;
    });
    if(document.getElementById('o-doc-ensaios')){
      o.docObrig.ensaios = chk('o-doc-ensaios');
      o.docObrig.calibracao = chk('o-doc-calibracao');

      o.docFacult = val('o-doc-facult');
    }
  }
}
