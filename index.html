// ============ 10c. CATÁLOGO SYNC ============
function catalogRowStatus(item, tipo){
  const designacao = (tipo === 'cabo' ? item.tecnologia : item.designacao) || '';
  if(!designacao && !item.marca && !item.ref){
    return {icon:'', title:''}; // linha vazia
  }
  const match = findCatalogMatch(item, tipo);
  if(!match){
    return {icon:'✨', title:'Novo · será adicionado ao catálogo ao guardar'};
  }
  // Verifica diferenças
  const diff = (a,b) => (a||'').trim().toLowerCase() !== (b||'').trim().toLowerCase();
  let hasDiff = false;
  if(item.marca && diff(match.marca, item.marca)) hasDiff = true;
  if(item.ref && diff(match.ref, item.ref)) hasDiff = true;
  if(tipo === 'cabo'){
    if(item.tecnologia && diff(match.tecnologia, item.tecnologia)) hasDiff = true;
    if(item.classe && diff(match.classe, item.classe)) hasDiff = true;
  } else {
    if(item.designacao && diff(match.designacao, item.designacao)) hasDiff = true;
  }
  if(hasDiff) return {icon:'⚠', title:'Difere do catálogo · será atualizado ao guardar'};
  return {icon:'⭐', title:'Já está no catálogo'};
}

function findCatalogMatch(item, tipo){
  // Procura primeiro por referência (mais fiável)
  if(item.ref){
    const byRef = state.catalog.find(c => c.tipo === tipo && c.ref && c.ref.toLowerCase() === item.ref.toLowerCase());
    if(byRef) return byRef;
  }
  // Senão, por marca + designação/tecnologia
  const designacao = (tipo === 'cabo' ? item.tecnologia : item.designacao) || '';
  if(!designacao && !item.marca) return null;
  return state.catalog.find(c => {
    if(c.tipo !== tipo) return false;
    const cDes = (tipo === 'cabo' ? c.tecnologia : c.designacao) || '';
    return cDes.toLowerCase() === designacao.toLowerCase()
        && (c.marca||'').toLowerCase() === (item.marca||'').toLowerCase();
  });
}

function normalizeObraForSave(o){
  if(!o) return o;
  o.numero = Number(o.numero) || 1;
  o.ano = Number(o.ano) || currentYear();
  o.valor = Number(o.valor) || 0;
  o.valorPago = Number(o.valorPago) || 0;
  if(!o.estado) o.estado = 'em_curso';
  if(!Array.isArray(o.pagamentos)) o.pagamentos = [];
  if(!Array.isArray(o.equipamentosUsados)) o.equipamentosUsados = [];
  if(o.orcamentoId === undefined) o.orcamentoId = '';
  if(!Array.isArray(o.itensInventario)) o.itensInventario = [];
  o.itensInventario = o.itensInventario
    .filter(row => row && row.inventoryId && Number(row.quantidade || 0) > 0)
    .map(row => {
      const item = inventarioById(row.inventoryId);
      return {
        id: row.id || uid(),
        inventoryId: row.inventoryId,
        nome: item ? (item.nome || '') : (row.nome || ''),
        unidade: item ? (item.unidade || 'un') : (row.unidade || 'un'),
        quantidade: Number(row.quantidade || 0),
        precoUnitario: item ? Number(item.precoUnitario || 0) : Number(row.precoUnitario || 0)
      };
    });
  o.stockReservado = !!o.stockReservado;
  if(o.stockReservadoEm === undefined) o.stockReservadoEm = '';
  o.stockBaixado = !!o.stockBaixado;
  if(o.stockBaixadoEm === undefined) o.stockBaixadoEm = '';
  if(!o.ficheiros) o.ficheiros = {};
  ['cobre','coaxial','fibra','fotos','outros'].forEach(k => { if(!Array.isArray(o.ficheiros[k])) o.ficheiros[k] = []; });
  if(o.incluiFichaIted || o.incluiFichaItur){
    if(!o.instalador) o.instalador = {nome:'',nif:'',numero:''};
    if(!o.itur) o.itur = {morada:'',codPostal:'',localidade:'',coordenadas:'',manualIted:''};
    if(!Array.isArray(o.cabos)) o.cabos = [];
    if(!Array.isArray(o.materiais)) o.materiais = [];
    if(!o.docObrig) o.docObrig = {ensaios:false,calibracao:false,projeto:false};
    if(o.docFacult === undefined) o.docFacult = '';
    if(o.refId === undefined) o.refId = '';
  }
  return o;
}

function validarBaixaStockObra(obra){
  const items = obraInventarioItems(obra).filter(row => row && row.inventoryId && Number(row.quantidade || 0) > 0);
  const problemas = [];
  items.forEach(row => {
    const item = inventarioById(row.inventoryId);
    const qtd = Number(row.quantidade || 0);
    if(!item){
      problemas.push(`${inventarioRowLabel(row)}: artigo não existe no inventário.`);
      return;
    }
    const stock = Number(item.quantidade || 0);
    if(qtd > stock){
      problemas.push(`${item.nome}: precisa de ${qtd} ${item.unidade || 'un'}, mas só existem ${stock} ${item.unidade || 'un'}.`);
    }
  });
  return {items, problemas};
}
async function aplicarBaixaStockObra(id){
  const obra = state.obras.find(x => x.id === id);
  if(!obra){ alert('Obra não encontrada.'); return false; }
  if(obra.stockBaixado){ alert('O stock desta obra já foi baixado.'); return false; }
  const check = validarBaixaStockObra(obra);
  if(check.items.length === 0){ alert('Esta obra não tem materiais do inventário associados.'); return false; }
  if(check.problemas.length > 0){
    alert('Não foi possível dar baixa no stock:\n\n' + check.problemas.join('\n'));
    return false;
  }
  const prevInventory = JSON.parse(JSON.stringify(state.inventory));
  const prevObras = JSON.parse(JSON.stringify(state.obras));
  try {
    check.items.forEach(row => {
      const item = inventarioById(row.inventoryId);
      if(item) item.quantidade = Math.max(0, Number(item.quantidade || 0) - Number(row.quantidade || 0));
    });
    obra.stockBaixado = true;
    obra.stockBaixadoEm = today();
    obra.stockReservado = false;
    obra.stockReservadoEm = '';
    await saveMany(['inventory','obras']);
    return true;
  } catch(e){
    state.inventory = prevInventory;
    state.obras = prevObras;
    alert('Erro ao dar baixa no stock. Alterações revertidas em memória.');
    console.error('aplicarBaixaStockObra failed:', e);
    return false;
  }
}
function baixarStockObra(id){
  const obra = state.obras.find(x => x.id === id);
  if(!obra) return;
  if(obra.stockBaixado){ alert('O stock desta obra já foi baixado.'); return; }
  const check = validarBaixaStockObra(obra);
  if(check.items.length === 0){ alert('Esta obra não tem materiais do inventário associados.'); return; }
  if(check.problemas.length > 0){
    alert('Antes de dar baixa, corrija o stock:\n\n' + check.problemas.join('\n'));
    return;
  }
  const resumo = check.items.map(row => {
    const item = inventarioById(row.inventoryId);
    return `• ${item.nome}: -${Number(row.quantidade || 0)} ${item.unidade || 'un'}`;
  }).join('\n');
  confirmAction(
    `Dar baixa no inventário da Obra ${obraLabel(obra)}?

${resumo}

Esta ação só deve ser feita uma vez.`,
    async () => { const ok = await aplicarBaixaStockObra(id); if(ok) openObra(id); },
    { okLabel:'📦 Dar baixa', cancelLabel:'Cancelar', okStyle:'background:var(--blue);color:#fff;' }
  );
}

function obraCatalogDiff(obra){
  // Devolve { novos: [...], alterados: [...] }
  const novos = [];
  const alterados = [];
  const seen = new Set(); // evita duplicados dentro da mesma obra

  const checkItem = (item, tipo) => {
    const designacao = (tipo === 'cabo' ? item.tecnologia : item.designacao) || '';
    if(!designacao && !item.marca && !item.ref) return; // linha vazia
    const key = tipo + '|' + (item.ref||'').toLowerCase() + '|' + designacao.toLowerCase() + '|' + (item.marca||'').toLowerCase();
    if(seen.has(key)) return;
    seen.add(key);

    const match = findCatalogMatch(item, tipo);
    if(!match){
      novos.push({tipo, item});
    } else {
      // Verifica se há diferenças
      const diffs = [];
      const cmp = (catalogVal, obraVal, field) => {
        catalogVal = (catalogVal||'').trim();
        obraVal = (obraVal||'').trim();
        if(obraVal && catalogVal !== obraVal) diffs.push({field, catalogVal, obraVal});
      };
      if(tipo === 'cabo'){
        cmp(match.tecnologia, item.tecnologia, 'Tecnologia');
        cmp(match.classe, item.classe, 'Classe RPC');
      } else {
        cmp(match.designacao, item.designacao, 'Designação');
      }
      cmp(match.marca, item.marca, 'Marca');
      cmp(match.ref, item.ref, 'Referência');
      if(diffs.length > 0){
        alterados.push({tipo, item, match, diffs});
      }
    }
  };

  (obra.cabos||[]).forEach(c => checkItem(c, 'cabo'));
  (obra.materiais||[]).forEach(m => checkItem(m, 'material'));
  return { novos, alterados };
}

function showCatalogSyncDialog(diff, onDone){
  if(diff.novos.length === 0 && diff.alterados.length === 0){
    onDone(); return;
  }
  const novosHtml = diff.novos.map((n,i) => {
    const desc = n.tipo === 'cabo'
      ? `<strong>${escapeHtml(n.item.tecnologia||'(sem tecnologia)')}</strong>${n.item.classe?' · '+escapeHtml(n.item.classe):''}`
      : `<strong>${escapeHtml(n.item.designacao||'(sem designação)')}</strong>`;
    const sub = `${n.item.marca?escapeHtml(n.item.marca):'<em style="color:var(--muted);">sem marca</em>'}${n.item.ref?' · Ref. '+escapeHtml(n.item.ref):''}`;
    return `
      <label class="file-item" style="cursor:pointer;">
        <input type="checkbox" data-novo="${i}" checked style="margin-right:4px;">
        <div style="flex:1;">
          <div>${n.tipo==='cabo'?'🔌':'📦'} ${desc}</div>
          <div class="text-xs" style="color:var(--muted);">${sub}</div>
        </div>
      </label>
    `;
  }).join('');

  const altHtml = diff.alterados.map((a,i) => {
    const nome = a.tipo === 'cabo' ? (a.item.tecnologia||a.match.tecnologia||'') : (a.item.designacao||a.match.designacao||'');
    const diffsTxt = a.diffs.map(d => `<div class="text-xs"><strong>${d.field}:</strong> <span style="color:var(--muted);text-decoration:line-through;">${escapeHtml(d.catalogVal||'(vazio)')}</span> → <span style="color:var(--ok);">${escapeHtml(d.obraVal)}</span></div>`).join('');
    return `
      <label class="file-item" style="cursor:pointer;align-items:flex-start;">
        <input type="checkbox" data-alt="${i}" checked style="margin-top:3px;margin-right:4px;">
        <div style="flex:1;">
          <div>${a.tipo==='cabo'?'🔌':'📦'} <strong>${escapeHtml(nome)}</strong> ${a.item.marca?'· '+escapeHtml(a.item.marca):''}</div>
          <div style="margin-top:5px;">${diffsTxt}</div>
        </div>
      </label>
    `;
  }).join('');

  openModal(`
    <div class="p-6">
      <h2 class="text-2xl font-bold mb-2">📖 Sincronizar com Catálogo</h2>
      <p class="text-sm mb-5" style="color:var(--ink-soft);">Encontrei artigos na ficha que podem ser guardados ou atualizados no catálogo. Desmarque o que não quiser sincronizar.</p>

      ${diff.novos.length > 0 ? `
        <h3 class="serif text-lg font-bold mb-3">✨ Novos artigos (${diff.novos.length})</h3>
        <div class="mb-5">${novosHtml}</div>
      ` : ''}

      ${diff.alterados.length > 0 ? `
        <h3 class="serif text-lg font-bold mb-3">🔄 Atualizações de artigos existentes (${diff.alterados.length})</h3>
        <div class="mb-5">${altHtml}</div>
      ` : ''}

      <div class="flex justify-end gap-2 mt-6">
        <button class="btn btn-ghost" id="cat-skip-btn">Não sincronizar</button>
        <button class="btn btn-primary" id="cat-apply-btn">Aplicar selecionados</button>
      </div>
    </div>
  `);

  document.getElementById('cat-skip-btn').onclick = () => { closeModal(true); onDone(); };
  document.getElementById('cat-apply-btn').onclick = async () => {
    // Adicionar novos selecionados
    document.querySelectorAll('[data-novo]').forEach(cb => {
      if(cb.checked){
        const n = diff.novos[+cb.dataset.novo];
        const newItem = {
          id: uid(),
          tipo: n.tipo,
          tecnologia: n.tipo === 'cabo' ? (n.item.tecnologia||'') : '',
          designacao: n.tipo !== 'cabo' ? (n.item.designacao||'') : '',
          marca: n.item.marca || '',
          ref: n.item.ref || '',
          classe: n.tipo === 'cabo' ? (n.item.classe||'') : '',
          notas: ''
        };
        state.catalog.push(newItem);
      }
    });
    // Aplicar alterações aos existentes
    document.querySelectorAll('[data-alt]').forEach(cb => {
      if(cb.checked){
        const a = diff.alterados[+cb.dataset.alt];
        const idx = state.catalog.findIndex(c => c.id === a.match.id);
        if(idx >= 0){
          a.diffs.forEach(d => {
            const fieldMap = {'Tecnologia':'tecnologia','Classe RPC':'classe','Designação':'designacao','Marca':'marca','Referência':'ref'};
            const k = fieldMap[d.field];
            if(k) state.catalog[idx][k] = d.obraVal;
          });
        }
      }
    });
    await save('catalog');
    closeModal(true);
    onDone();
  };
}

async function saveObra(){
  if(window._saving) return; window._saving = true;
  try {
    syncObraFromForm();
    const data = normalizeObraForSave(window._editingObra);
    const id = window._editingObraId;
    // Descrição não é obrigatória — permite guardar como rascunho
    if(!data.descricao || !data.descricao.trim()){
      data.descricao = '(Rascunho — sem descrição)';
    }
    let finalId = id;
    if(id){
      const i = state.obras.findIndex(o=>o.id===id);
      if(i >= 0) state.obras[i] = {...data, id};
      else state.obras.push({...data, id});
    } else {
      finalId = window._editingObraPreId || uid();
      // Recalcular número para evitar duplicados
      data.numero = nextObraNumForYear(data.ano);
      state.obras.push({...data, id:finalId});
      window._editingObraPreId = null;
    }
    await save('obras');
    clearDirty();

    // Verificar catálogo se a obra tiver ITED ou ITUR
    if(data.incluiFichaIted || data.incluiFichaItur){
      const diff = obraCatalogDiff(data);
      if(diff.novos.length > 0 || diff.alterados.length > 0){
        showCatalogSyncDialog(diff, () => { closeModal(true); renderView(); });
        return;
      }
    }
    closeModal(true);
    renderView();
  } catch(e){
    alert('Erro ao guardar a obra: ' + e.message);
    console.error('saveObra failed:', e);
  } finally { window._saving = false; }
}

function deleteObra(id){
  confirmAction('Eliminar esta obra? Esta ação não pode ser revertida.', async () => {
    if(window._saving) return; window._saving = true;
    const prevObras = JSON.parse(JSON.stringify(state.obras));
    const prevOrcamentos = JSON.parse(JSON.stringify(state.orcamentos || []));
    const o = state.obras.find(x=>x.id===id);
    const fileKeys = o ? flattenObraFileKeys(o) : [];
    try {
      state.obras = state.obras.filter(o=>o.id!==id);
      const linked = state.orcamentos.find(or => or.obraId === id || (o && o.orcamentoId && or.id === o.orcamentoId));
      if(linked){
        linked.obraId = '';
        if(linked.estado === 'convertido') linked.estado = 'aceite';
      }
      await saveMany(linked ? ['obras','orcamentos'] : ['obras']);

      // Só apaga ficheiros depois dos dados ficarem guardados com sucesso.
      for(const key of fileKeys){
        try { await deleteStoredFile(key); }
        catch(e){ console.warn('Falha ao apagar ficheiro órfão:', key, e); }
      }

      closeModal(true);
      renderView();
    } catch(e){
      state.obras = prevObras;
      state.orcamentos = prevOrcamentos;
      console.error('deleteObra failed:', e);
      alert('Falha ao eliminar obra. Alterações revertidas em memória.');
    } finally {
      window._saving = false;
    }
  });
}

function loadScriptOnce(src, testFn){
  return new Promise((resolve, reject) => {
    try {
      if(typeof testFn === 'function' && testFn()) return resolve(true);
      const existing = Array.from(document.scripts).find(s => s.src === src);
      if(existing){
        if(typeof testFn === 'function' && testFn()) return resolve(true);
        existing.addEventListener('load', () => resolve(true), {once:true});
        existing.addEventListener('error', () => reject(new Error('Não foi possível carregar a biblioteca externa.')), {once:true});
        setTimeout(() => resolve(!testFn || testFn()), 3500);
        return;
      }
      const s = document.createElement('script');
      s.src = src;
      s.async = true;
      s.onload = () => resolve(true);
      s.onerror = () => reject(new Error('Não foi possível carregar: ' + src));
      document.head.appendChild(s);
    } catch(e){ reject(e); }
  });
}

const _miniZipEncoder = new TextEncoder();
const _miniZipCrcTable = (() => {
  const table = new Uint32Array(256);
  for(let n=0;n<256;n++){
    let c = n;
    for(let k=0;k<8;k++) c = (c & 1) ? (0xedb88320 ^ (c >>> 1)) : (c >>> 1);
    table[n] = c >>> 0;
  }
  return table;
})();
function _miniZipCrc32(bytes){
  let c = 0xffffffff;
  for(let i=0;i<bytes.length;i++) c = _miniZipCrcTable[(c ^ bytes[i]) & 0xff] ^ (c >>> 8);
  return (c ^ 0xffffffff) >>> 0;
}
function _miniZipDosTimeDate(date){
  const d = date || new Date();
  const time = (d.getHours() << 11) | (d.getMinutes() << 5) | Math.floor(d.getSeconds()/2);
  const dosDate = ((d.getFullYear() - 1980) << 9) | ((d.getMonth()+1) << 5) | d.getDate();
  return {time, date:dosDate};
}
function _miniZipHeader(size){
  const buf = new ArrayBuffer(size);
  return {buf, view:new DataView(buf)};
}
function _miniZipWrite(view, offset, values){
  values.forEach(v => {
    if(v.size === 2){ view.setUint16(offset, v.value, true); offset += 2; }
    else { view.setUint32(offset, v.value, true); offset += 4; }
  });
}
async function _miniZipBytes(content){
  if(content instanceof Uint8Array) return content;
  if(content instanceof ArrayBuffer) return new Uint8Array(content);
  if(content instanceof Blob) return new Uint8Array(await content.arrayBuffer());
  if(typeof content === 'string') return _miniZipEncoder.encode(content);
  return _miniZipEncoder.encode(String(content ?? ''));
}
class SimpleZip{
  constructor(){ this.files = []; }
  file(name, content){ this.files.push({name:String(name||'ficheiro.txt'), content}); }
  async generateAsync(opts, onUpdate){
    const chunks = [];
    const central = [];
    let offset = 0;
    const total = Math.max(1, this.files.length);
    for(let i=0;i<this.files.length;i++){
      const f = this.files[i];
      const nameBytes = _miniZipEncoder.encode(f.name.replace(/^\/+/,''));
      const bytes = await _miniZipBytes(f.content);
      const crc = _miniZipCrc32(bytes);
      const dt = _miniZipDosTimeDate(new Date());
      const local = _miniZipHeader(30);
      _miniZipWrite(local.view, 0, [
        {size:4,value:0x04034b50},{size:2,value:20},{size:2,value:0},{size:2,value:0},
        {size:2,value:dt.time},{size:2,value:dt.date},{size:4,value:crc},{size:4,value:bytes.length},
        {size:4,value:bytes.length},{size:2,value:nameBytes.length},{size:2,value:0}
      ]);
      chunks.push(local.buf, nameBytes, bytes);
      const centralHeader = _miniZipHeader(46);
      _miniZipWrite(centralHeader.view, 0, [
        {size:4,value:0x02014b50},{size:2,value:20},{size:2,value:20},{size:2,value:0},{size:2,value:0},
        {size:2,value:dt.time},{size:2,value:dt.date},{size:4,value:crc},{size:4,value:bytes.length},
        {size:4,value:bytes.length},{size:2,value:nameBytes.length},{size:2,value:0},{size:2,value:0},
        {size:2,value:0},{size:2,value:0},{size:4,value:0},{size:4,value:offset}
      ]);
      central.push(centralHeader.buf, nameBytes);
      offset += local.buf.byteLength + nameBytes.length + bytes.length;
      if(typeof onUpdate === 'function') onUpdate({percent: Math.round(((i+1)/total)*100)});
    }
    const centralOffset = offset;
    let centralSize = 0;
    central.forEach(c => { centralSize += c.byteLength || c.length || 0; chunks.push(c); });
    const end = _miniZipHeader(22);
    _miniZipWrite(end.view, 0, [
      {size:4,value:0x06054b50},{size:2,value:0},{size:2,value:0},{size:2,value:this.files.length},
      {size:2,value:this.files.length},{size:4,value:centralSize},{size:4,value:centralOffset},{size:2,value:0}
    ]);
    chunks.push(end.buf);
    return new Blob(chunks, {type:'application/zip'});
  }
}
function createZipEngine(){
  return (typeof JSZip !== 'undefined') ? new JSZip() : new SimpleZip();
}


async function ensureZipDependencies(needPdf, progress){
  if(typeof JSZip === 'undefined'){
    try {
      if(progress) progress('A carregar biblioteca ZIP...');
      await loadScriptOnce('https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js', () => typeof JSZip !== 'undefined');
    } catch(e){
      console.warn('JSZip externo não carregou; a usar ZIP interno.', e);
    }
  }
  if(typeof JSZip === 'undefined' && progress) progress('A usar motor ZIP interno...');

  let pdfReady = false;
  if(needPdf){
    try {
      if(typeof html2canvas === 'undefined'){
        if(progress) progress('A carregar gerador de imagem para PDF...');
        await loadScriptOnce('https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js', () => typeof html2canvas !== 'undefined');
      }
      if(!window.jspdf || !window.jspdf.jsPDF){
        if(progress) progress('A carregar gerador de PDF...');
        await loadScriptOnce('https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js', () => !!(window.jspdf && window.jspdf.jsPDF));
      }
      pdfReady = (typeof html2canvas !== 'undefined' && !!(window.jspdf && window.jspdf.jsPDF));
    } catch(e){
      console.warn('Bibliotecas PDF não carregaram; fichas serão guardadas como HTML.', e);
      pdfReady = false;
    }
  }
  return { pdfReady };
}

async function exportObraZIP(id, isFinal){

  if(!o){ alert('Obra não encontrada'); return; }

  const overlay = document.createElement('div');
  overlay.className = 'modal-bg';
  overlay.style.zIndex = '90';
  overlay.innerHTML = '<div class="modal" style="max-width:380px;"><div class="p-6 text-center"><div style="font-size:36px;margin-bottom:8px;">📦</div><h3 class="text-xl font-bold mb-2">A gerar ZIP...</h3><p class="text-sm" style="color:var(--muted);" id="zip-progress">A preparar</p></div></div>';
  document.body.appendChild(overlay);
  const progress = (msg) => { const p = document.getElementById('zip-progress'); if(p) p.textContent = msg; };
  let keepOverlay = false;

  try {
    const tiposFicha = [];
    if(o.incluiFichaItur) tiposFicha.push('ITUR');
    if(o.incluiFichaIted) tiposFicha.push('ITED');

    const deps = await ensureZipDependencies(tiposFicha.length > 0, progress);

    const zip = createZipEngine();
    const cliente = state.clients.find(c=>c.id===o.clienteId);
    const obraTag = obraLabel(o);
    let indice = ['INDICE - Obra ' + obraTag, '='.repeat(40), ''];
    indice.push('Data: ' + fmtDate(o.data));
    if(cliente) indice.push('Cliente: ' + cliente.nome);
    indice.push('Descricao: ' + (o.descricao || '-'));
    indice.push('Valor: ' + fmt(o.valor));
    indice.push('');

    // Gerar PDFs para cada tipo de ficha ativo
    for(let idx=0; idx<tiposFicha.length; idx++){
      const tipo = tiposFicha[idx];
      const prefix = String(idx+1).padStart(2,'0');
      progress('A gerar Ficha ' + tipo + ' em PDF...');
      const tempDiv = document.createElement('div');
      tempDiv.style.position = 'fixed';
      tempDiv.style.left = '-10000px';
      tempDiv.style.top = '0';
      tempDiv.innerHTML = renderItedSheet(o, tipo);
      document.body.appendChild(tempDiv);
      try {
        if(deps.pdfReady){
          const canvas = await html2canvas(tempDiv.firstElementChild, {scale:2, backgroundColor:'#ffffff'});
          const { jsPDF } = window.jspdf;
          const pdf = new jsPDF('p','mm','a4');
          const pageW = pdf.internal.pageSize.getWidth();
          const imgW = pageW - 20;
          const imgH = canvas.height * imgW / canvas.width;
          pdf.addImage(canvas.toDataURL('image/png'), 'PNG', 10, 10, imgW, imgH);
          const fname = prefix + '_Ficha_' + tipo + '.pdf';
          zip.file(fname, pdf.output('blob'));
          indice.push(fname);
        } else {
          const fname = prefix + '_Ficha_' + tipo + '.html';
          zip.file(fname, '<!doctype html><html><head><meta charset="utf-8"><title>Ficha '+tipo+'</title></head><body>' + renderItedSheet(o, tipo) + '</body></html>');
          indice.push(fname + ' (PDF indisponível neste navegador/preview)');
        }
      } finally { document.body.removeChild(tempDiv); }
    }

    const cats = { cobre:'02_Testes/Cobre', coaxial:'02_Testes/Coaxial', fibra:'02_Testes/Fibra' };
    for(const [k, folder] of Object.entries(cats)){
      for(const f of ((o.ficheiros && o.ficheiros[k]) || [])){
        progress('A juntar: ' + f.name);
        const data = await readFile(f.key);
        if(data){ zip.file(folder + '/' + f.name, dataUrlToBlob(data)); indice.push(folder + '/' + f.name); }
      }
    }

    const equipsUsados = (o.equipamentosUsados||[]).map(eqId => state.equipment.find(e=>e.id===eqId)).filter(Boolean);
    for(const eq of equipsUsados){
      const safeName = String(eq.nome || 'Equipamento').replace(/[\/\\:*?"<>|]/g,'_');
      const folder = '03_Equipamentos_Utilizados/' + safeName;
      let info = ['Equipamento: ' + (eq.nome || '')];
      if(eq.tipo) info.push('Tipo: ' + eq.tipo);
      if(eq.numeroSerie) info.push('Nº Série: ' + eq.numeroSerie);
      if(eq.dataCompra) info.push('Data de compra: ' + fmtDate(eq.dataCompra));
      if(eq.licencas && eq.licencas.length){
        info.push(''); info.push('Licencas / Calibracoes:');
        eq.licencas.forEach(l => info.push('  - ' + (l.nome||'') + (l.dataInicio?' · inicio '+fmtDate(l.dataInicio):'') + (l.dataFim?' · valido ate '+fmtDate(l.dataFim):'')));
      }
      zip.file(folder + '/INFO.txt', info.join('\n'));
      indice.push(folder + '/INFO.txt');
      for(const f of (eq.ficheiros||[])){
        progress('A juntar: ' + f.name);
        const data = await readFile(f.key);
        if(data){ zip.file(folder + '/' + f.name, dataUrlToBlob(data)); indice.push(folder + '/' + f.name); }
      }
    }

    for(const f of ((o.ficheiros && o.ficheiros.fotos) || [])){
      progress('A juntar: ' + f.name);
      const data = await readFile(f.key);
      if(data){ zip.file('04_Fotos/' + f.name, dataUrlToBlob(data)); indice.push('04_Fotos/' + f.name); }
    }
    for(const f of ((o.ficheiros && o.ficheiros.outros) || [])){
      progress('A juntar: ' + f.name);
      const data = await readFile(f.key);
      if(data){ zip.file('05_Outros_Documentos/' + f.name, dataUrlToBlob(data)); indice.push('05_Outros_Documentos/' + f.name); }
    }

    zip.file('INDICE.txt', indice.join('\n'));
    progress('A comprimir...');
    const blob = await zip.generateAsync({type:'blob'}, m => progress('A comprimir... ' + Math.round(m.percent) + '%'));
    const filename = 'TRITED_Obra_' + obraTag + (isFinal ? '_FINAL' : '') + '.zip';
    showZipReadyOverlay(overlay, blob, filename);
    keepOverlay = true;
  } catch(e){
    console.error('Erro ao gerar ZIP:', e);
    alert('Erro ao gerar ZIP: ' + (e && e.message ? e.message : e));
  } finally {
    if(!keepOverlay && overlay && overlay.parentNode) overlay.remove();
  }
}

async function exportObraPDF(id, tipo){
  const o = state.obras.find(x=>x.id===id);
  tipo = tipo || (o.incluiFichaItur ? 'ITUR' : 'ITED');
  const el = document.getElementById('ited-preview').firstElementChild;
  try {
    const canvas = await html2canvas(el, {scale:2, backgroundColor:'#ffffff'});
    const imgData = canvas.toDataURL('image/png');
    const { jsPDF } = window.jspdf;
    const pdf = new jsPDF('p','mm','a4');
    const pageW = pdf.internal.pageSize.getWidth();
    const pageH = pdf.internal.pageSize.getHeight();
    const imgW = pageW - 20;
    const imgH = canvas.height * imgW / canvas.width;
    if(imgH < pageH - 20){
      pdf.addImage(imgData, 'PNG', 10, 10, imgW, imgH);
    } else {
      let remaining = imgH;
      let sY = 0;
      const pagePx = (pageH - 20) * canvas.width / imgW;
      while(remaining > 0){
        const slice = document.createElement('canvas');
        slice.width = canvas.width;
        slice.height = Math.min(pagePx, canvas.height - sY);
        slice.getContext('2d').drawImage(canvas, 0, sY, canvas.width, slice.height, 0, 0, canvas.width, slice.height);
        const sliceImg = slice.toDataURL('image/png');
        const sliceH = slice.height * imgW / canvas.width;
        pdf.addImage(sliceImg, 'PNG', 10, 10, imgW, sliceH);
        sY += slice.height;
        remaining -= sliceH;
        if(remaining > 0) pdf.addPage();
      }
    }
    pdf.save(`TRITED_Obra_${obraLabel(o)}_Ficha_${tipo}.pdf`);
  } catch(e){ alert('Erro ao gerar PDF: '+e.message); }
}

function setObrasFilter(f){ obrasFilter = f; renderView(); }

function viewObras(){
  if(state.obras.length === 0){
    return `
    <div class="flex items-center justify-between mb-6">
      <h2 class="text-2xl font-bold">Obras</h2>
      <button class="btn btn-accent" onclick="editObra()">+ Nova Obra</button>
    </div>
    <div class="card empty"><div class="empty-icon">🔨</div>Sem obras. Clique em "+ Nova Obra" para criar a primeira.</div>`;
  }

  // Estados considerados "em aberto" (não concluídas nem canceladas)
  const ABERTAS = ['em_curso','pausada','aguarda_material','espera_cliente','falta_termo','pronto_faturar'];
  const abertasCount = state.obras.filter(o => ABERTAS.includes(o.estado||'em_curso')).length;
  const concluidasCount = state.obras.filter(o => o.estado === 'concluida').length;
  const canceladasCount = state.obras.filter(o => o.estado === 'cancelada').length;
  const aguardaMatCount = state.obras.filter(o => o.estado === 'aguarda_material').length;
  const esperaClienteCount = state.obras.filter(o => o.estado === 'espera_cliente').length;
  const faltaTermoCount = state.obras.filter(o => o.estado === 'falta_termo').length;
  const prontoFaturarCount = state.obras.filter(o => o.estado === 'pronto_faturar').length;

  // Filter
  const filtered = state.obras.filter(o => {
    const e = o.estado || 'em_curso';
    if(obrasFilter === 'todas') return true;
    if(obrasFilter === 'abertas') return ABERTAS.includes(e);
    if(obrasFilter === 'concluidas') return e === 'concluida';
    if(obrasFilter === 'canceladas') return e === 'cancelada';
    if(obrasFilter === 'aguarda_material') return e === 'aguarda_material';
    if(obrasFilter === 'espera_cliente') return e === 'espera_cliente';
    if(obrasFilter === 'falta_termo') return e === 'falta_termo';
    if(obrasFilter === 'pronto_faturar') return e === 'pronto_faturar';
    return true;
  });

  // Group by year
  const byYear = {};
  filtered.forEach(o => {
    const y = Number(o.ano) || currentYear();
    (byYear[y] = byYear[y] || []).push(o);
  });
  const years = Object.keys(byYear).map(Number).sort((a,b)=>b-a);

  const totalDivida = state.obras.reduce((a,o)=>a+Math.max(0,Number(o.valor||0)-Number(o.valorPago||0)),0);
  const totalRecebido = state.obras.reduce((a,o)=>a+Number(o.valorPago||0),0);

  const filterBtn = (key, label, count, color) => `
    <button class="btn ${obrasFilter===key?'btn-primary':'btn-ghost'}" onclick="setObrasFilter('${key}')" style="${obrasFilter!==key && color?'color:'+color:''}">
      ${label} <span class="badge ${obrasFilter===key?'badge-neutral':''}" style="${obrasFilter===key?'background:rgba(255,255,255,.2);color:#fff;':''}margin-left:4px;">${count}</span>
    </button>
  `;

  return `
  <div class="flex items-center justify-between mb-5 flex-wrap gap-3">
    <div>
      <h2 class="text-2xl font-bold">Obras</h2>
      <p class="text-sm" style="color:var(--muted);">${state.obras.length} obra(s) · Por receber <span style="color:var(--accent);font-weight:600;">${fmt(totalDivida)}</span> · Recebido <span style="color:var(--ok);font-weight:600;">${fmt(totalRecebido)}</span></p>
    </div>
    <button class="btn btn-accent" onclick="editObra()">+ Nova Obra</button>
  </div>

  <div class="mb-6">
    <div class="flex gap-2 mb-3 flex-wrap">
      ${filterBtn('todas','Todas', state.obras.length)}
      ${filterBtn('abertas','🔨 Em aberto', abertasCount, 'var(--blue)')}
      ${filterBtn('concluidas','✓ Concluídas', concluidasCount, 'var(--ok)')}
      ${filterBtn('canceladas','✕ Canceladas', canceladasCount, 'var(--danger)')}
    </div>
    <div class="flex gap-2 flex-wrap">
      ${filterBtn('aguarda_material','📦 Aguarda material', aguardaMatCount)}
      ${filterBtn('espera_cliente','⏳ À espera do cliente', esperaClienteCount)}
      ${filterBtn('falta_termo','📝 Falta termo', faltaTermoCount)}
      ${filterBtn('pronto_faturar','💶 Pronto p/ faturar', prontoFaturarCount)}
    </div>
  </div>

  ${filtered.length === 0 ? `<div class="card empty"><div class="empty-icon">🔍</div>Nenhuma obra neste filtro</div>` : ''}

  ${years.map(y => {
    const obs = [...byYear[y]].sort((a,b)=>(Number(b.numero)||0)-(Number(a.numero)||0));
    const yearDivida = obs.reduce((a,o)=>a+Math.max(0,Number(o.valor||0)-Number(o.valorPago||0)),0);
    const yearTotal = obs.reduce((a,o)=>a+Number(o.valor||0),0);
    return `
      <div class="card mb-6">
        <div class="flex items-center justify-between p-5 pb-3" style="border-bottom:1px solid var(--line);">
          <div>
            <h3 class="text-xl font-bold serif">${y}</h3>
            <p class="text-xs mt-1" style="color:var(--muted);">${obs.length} obra(s) · Total ${fmt(yearTotal)}${yearDivida>0?' · Por receber <span style="color:var(--accent);font-weight:600;">'+fmt(yearDivida)+'</span>':''}</p>
          </div>
          <span class="badge badge-blue">${y}</span>
        </div>
        <table>
          <thead><tr><th>Nº</th><th>Data</th><th>Cliente</th><th>Descrição</th><th>Valor</th><th>Estado</th><th>Pagamento</th></tr></thead>
          <tbody>
            ${obs.map(o => {
              const c = state.clients.find(x=>x.id===o.clienteId);
              const pay = paymentStatus(o);
              const est = obraEstado(o);
              return `<tr class="clickable" onclick="openObra('${o.id}')">
                <td class="obra-num">${obraLabel(o)}</td>
                <td>${fmtDate(o.data)}</td>
                <td>${escapeHtml(c?c.nome:'—')}</td>
                <td>${escapeHtml((o.descricao||'').slice(0,55))}${fichaBadges(o)}</td>
                <td class="font-semibold">${fmt(o.valor)}</td>
                <td><span class="badge ${est.cls}">${est.label}</span></td>
                <td><span class="badge ${pay.cls}">${pay.label}</span></td>
              </tr>`;
            }).join('')}
          </tbody>
        </table>
      </div>
    `;
  }).join('')}`;
}

  if(canEditCatalog()) return editCatItem(id);
  return viewCatItem(id);
}

    <div class="p-6">

        <div>
          <h2 class="text-2xl font-bold">${escapeHtml(nome)}</h2>

      </div>
      <div class="grid-2">
        <div class="section-box"><div class="label">Marca / Modelo</div><div class="font-semibold">${escapeHtml(c.marca||'—')}</div></div>
        <div class="section-box"><div class="label">Referência</div><div class="font-semibold">${escapeHtml(c.ref||'—')}</div></div>

function editCatItem(id){
  if(!canEditCatalog()){ alert('Sem permissão para alterar o catálogo.'); return; }
  const c = id ? state.catalog.find(x=>x.id===id) : {tipo:'material',tecnologia:'',designacao:'',marca:'',ref:'',classe:'',unidade:'un',precoUnit:0,notas:''};
  window._editingCat = JSON.parse(JSON.stringify(c));
  window._editingCatId = id || null;
  _renderCatItemModal();
}

function _renderCatItemModal(){
  const c = window._editingCat;
  const id = window._editingCatId;
  const isCabo = c.tipo === 'cabo';
  openModal(`
    <div class="p-6">
      <h2 class="text-2xl font-bold mb-5">${id?'Editar':'Novo'} Artigo do Catálogo</h2>

      <div class="mb-4">
        <label class="label">Tipo</label>
        <div class="flex gap-2">
          <button class="btn ${isCabo?'btn-primary':'btn-ghost'}" onclick="switchCatType('cabo')">Cabo</button>
          <button class="btn ${!isCabo?'btn-primary':'btn-ghost'}" onclick="switchCatType('material')">Material / Dispositivo</button>
        </div>
      </div>

      ${isCabo ? `
        <div class="grid-2">
          <div><label class="label">Tecnologia *</label><input class="input" id="cat-tec" value="${escapeAttr(c.tecnologia||'')}" placeholder="ex: Pares de Cobre, Fibra Ótica"></div>
          <div><label class="label">Classe RPC</label><input class="input" id="cat-classe" value="${escapeAttr(c.classe||'')}" placeholder="ex: Eca, Dca-s2"></div>
          <div><label class="label">Marca e Modelo</label><input class="input" id="cat-marca" value="${escapeAttr(c.marca||'')}"></div>
          <div><label class="label">Referência do Produto</label><input class="input" id="cat-ref" value="${escapeAttr(c.ref||'')}"></div>
          <div><label class="label">Unidade p/ orçamento</label><input class="input" id="cat-unidade" value="${escapeAttr(catalogUnit(c))}" placeholder="un, m, h..."></div>
          <div><label class="label">Preço Unitário (€)</label><input class="input" type="number" min="0" step="0.01" id="cat-preco" value="${catalogPrice(c)}"></div>
        </div>
      ` : `
        <div class="grid-2">
          <div><label class="label">Designação *</label><input class="input" id="cat-des" value="${escapeAttr(c.designacao||'')}" placeholder="ex: Tomada RJ45, Repartidor"></div>
          <div><label class="label">Marca e Modelo</label><input class="input" id="cat-marca" value="${escapeAttr(c.marca||'')}"></div>
          <div><label class="label">Referência do Produto</label><input class="input" id="cat-ref" value="${escapeAttr(c.ref||'')}"></div>
          <div><label class="label">Unidade p/ orçamento</label><input class="input" id="cat-unidade" value="${escapeAttr(catalogUnit(c))}" placeholder="un, m, h..."></div>
          <div><label class="label">Preço Unitário (€)</label><input class="input" type="number" min="0" step="0.01" id="cat-preco" value="${catalogPrice(c)}"></div>
        </div>
      `}

      <div class="mt-3"><label class="label">Notas / Especificações</label><textarea class="input" id="cat-notas" rows="3" placeholder="Características técnicas, observações...">${escapeHtml(c.notas||'')}</textarea></div>

      <div class="flex justify-between mt-6">
        ${id?`<button class="btn btn-danger" onclick="deleteCatItem('${id}')">Eliminar</button>`:'<div></div>'}
        <div class="flex gap-2">
          <button class="btn btn-ghost" onclick="closeModal(true)">Cancelar</button>
          <button class="btn btn-primary" onclick="saveCatItem()">Guardar</button>
        </div>
      </div>
    </div>
  `);
}

function switchCatType(tipo){
  syncCatItemFromForm();
  window._editingCat.tipo = tipo;
  _renderCatItemModal();
}

function syncCatItemFromForm(){
  const c = window._editingCat;
  const val = id => { const el=document.getElementById(id); return el?el.value.trim():''; };
  if(c.tipo === 'cabo'){
    c.tecnologia = val('cat-tec');
    c.classe = val('cat-classe');
    c.designacao = '';
  } else {
    c.designacao = val('cat-des');
    c.tecnologia = '';
    c.classe = '';
  }
  c.marca = val('cat-marca');
  c.ref = val('cat-ref');
  c.unidade = val('cat-unidade') || 'un';
  c.precoUnit = parseFloat(val('cat-preco')) || 0;
  c.notas = val('cat-notas');
}

async function saveCatItem(){
  if(!canEditCatalog()){ alert('Sem permissão para alterar o catálogo.'); return; }
  if(window._saving) return; window._saving = true;
  try {
    syncCatItemFromForm();
    const c = window._editingCat;
    const id = window._editingCatId;
    if(c.tipo === 'cabo' && !c.tecnologia){ alert('Tecnologia é obrigatória'); return; }
    if(c.tipo !== 'cabo' && !c.designacao){ alert('Designação é obrigatória'); return; }
    if(id){
      const i = state.catalog.findIndex(x=>x.id===id);
      if(i >= 0) state.catalog[i] = {...c, id};
    } else {
      state.catalog.push({...c, id:uid()});
    }
    await save('catalog');
    clearDirty();
    closeModal(true);
  } catch(e){
    console.error('saveCatItem failed:', e);
  } finally { window._saving = false; }
}

function deleteCatItem(id){
  if(!canEditCatalog()){ alert('Sem permissão para alterar o catálogo.'); return; }
  confirmAction('Eliminar este artigo do catálogo?', async () => {
    state.catalog = state.catalog.filter(x=>x.id!==id);
    await save('catalog');
    closeModal(true);
  });
}

function editItem(id){
  const it = id ? state.inventory.find(x=>x.id===id) : {nome:'',categoria:'',quantidade:0,unidade:'un',precoUnitario:0,notas:''};
  openModal(`
    <div class="p-6">
      <h2 class="text-2xl font-bold mb-5">${id?'Editar':'Novo'} Artigo</h2>
      <div class="grid-2">
        <div><label class="label">Nome *</label><input class="input" id="i-nome" value="${escapeAttr(it.nome)}"></div>
        <div><label class="label">Categoria</label><input class="input" id="i-cat" value="${escapeAttr(it.categoria||'')}" placeholder="ex: Cabos, Tomadas"></div>
        <div><label class="label">Quantidade</label><input class="input" type="number" step="0.01" id="i-qt" value="${it.quantidade||0}"></div>
        <div><label class="label">Unidade</label><input class="input" id="i-un" value="${escapeAttr(it.unidade||'un')}" placeholder="un, m, kg..."></div>
        <div><label class="label">Preço Unitário (€)</label><input class="input" type="number" step="0.01" id="i-preco" value="${it.precoUnitario||0}"></div>
      </div>
      <div class="mt-3"><label class="label">Notas</label><textarea class="input" id="i-notas" rows="2">${escapeHtml(it.notas||'')}</textarea></div>
      <div class="flex justify-between mt-6">
        ${id?`<button class="btn btn-danger" onclick="deleteItem('${id}')">Eliminar</button>`:'<div></div>'}
        <div class="flex gap-2">
          <button class="btn btn-ghost" onclick="closeModal(true)">Cancelar</button>
          <button class="btn btn-primary" onclick="saveItem('${id||''}')">Guardar</button>
        </div>
      </div>
    </div>
  `);
}
async function saveItem(id){
  if(window._saving) return; window._saving = true;
  try {
    const data = {
      nome: document.getElementById('i-nome').value.trim(),
      categoria: document.getElementById('i-cat').value.trim(),
      quantidade: parseFloat(document.getElementById('i-qt').value)||0,
      unidade: document.getElementById('i-un').value.trim()||'un',
      precoUnitario: parseFloat(document.getElementById('i-preco').value)||0,
      notas: document.getElementById('i-notas').value.trim(),
    };
    if(!data.nome){ alert('Nome é obrigatório'); return; }
    if(id){
      const i = state.inventory.findIndex(x=>x.id===id);
      if(i >= 0) state.inventory[i] = {...state.inventory[i], ...data};
    } else {
      state.inventory.push({id:uid(), ...data});
    }
    await save('inventory');
    clearDirty();
    closeModal(true); renderView();
  } catch(e){
    console.error('saveItem failed:', e);
  } finally { window._saving = false; }
}
function deleteItem(id){
  confirmAction('Eliminar este artigo do inventário?', async () => {
    state.inventory = state.inventory.filter(x=>x.id!==id);
    await save('inventory'); closeModal(true); renderView();
  });
}

function viewEquipamentos(){
  return `

    <div><h2 class="text-2xl font-bold">Equipamentos & Licenças</h2><p class="text-sm" style="color:var(--muted);">${state.equipment.length} equipamento(s) · lembretes 30 dias antes de expirar</p></div>

  </div>
  ${state.equipment.length===0
    ? `<div class="card empty"><div class="empty-icon">🔧</div>Sem equipamentos registados.</div>`
    : state.equipment.map(eq=>{
        const licsHtml = (eq.licencas||[]).map(l=>{

// ============ 15. MODAL ============
function openModal(html){
  let m = document.getElementById('modal');
  if(!m){
    m = document.createElement('div');
    m.id = 'modal';
    m.className = 'modal-bg';
    m.addEventListener('click', e=>{ if(e.target===m) closeModal(true); });
    // Mark dirty on any form change inside modal
    m.addEventListener('input', function(){ markDirty(); });
    document.body.appendChild(m);
  }
  clearDirty();
  m.innerHTML = `<div class="modal" onclick="event.stopPropagation()">${html}</div>`;
  m.style.display = 'flex';
}
function closeModal(skipDirtyCheck = true){
  // Fecha sempre por defeito.
  // Só pede confirmação se alguma chamada usar closeModal(false).
  if(skipDirtyCheck === false && hasDirty()){
    if(!confirm('Tem alterações por guardar. Quer mesmo fechar?')) return;
  }
  clearDirty();
  const m = document.getElementById('modal');
  if(m) m.style.display='none';
  renderView();
}

// Custom confirmation modal (replaces native confirm() which can be blocked in embedded environments)
function confirmAction(message, onConfirm, opts){
  opts = opts || {};
  const okLabel = opts.okLabel || 'Eliminar';
  const cancelLabel = opts.cancelLabel || 'Cancelar';
  const okStyle = opts.okStyle || 'background:var(--danger);color:#fff;';
  const wrap = document.createElement('div');
  wrap.className = 'modal-bg';
  wrap.style.zIndex = '70';
  wrap.innerHTML = `
    <div class="modal" style="max-width:440px;" onclick="event.stopPropagation()">
      <div class="p-6">
        <h3 class="text-xl font-bold mb-3">Confirmar</h3>
        <p class="text-sm mb-5" style="color:var(--ink-soft);line-height:1.5;white-space:pre-line;">${escapeHtml(message)}</p>
        <div class="flex justify-end gap-2">
          <button class="btn btn-ghost" data-act="cancel">${escapeHtml(cancelLabel)}</button>
          <button class="btn" data-act="ok" style="${okStyle}">${escapeHtml(okLabel)}</button>
        </div>
      </div>
    </div>
  `;
  document.body.appendChild(wrap);
  const close = () => wrap.remove();
  wrap.querySelector('[data-act="cancel"]').onclick = () => { close(); if(opts.onCancel) try{opts.onCancel();}catch(e){} };
  wrap.querySelector('[data-act="ok"]').onclick = async () => {
    close();
    try { await Promise.resolve(onConfirm()); }
    catch(e){ alert('Erro: '+e.message); }
  };
  wrap.addEventListener('click', e => { if(e.target === wrap){ close(); if(opts.onCancel) try{opts.onCancel();}catch(e){} } });
}

// ============ 15b. UTILS ============
function escapeHtml(s){ return String(s==null?'':s).replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function escapeAttr(s){ return escapeHtml(s); }

function _searchNorm(v){
  return String(v||'').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[^a-z0-9]+/g,' ').trim();
}
function _searchHas(hay, q){
  const h = _searchNorm(hay);
  const n = _searchNorm(q);
  return n && h.includes(n);
}
function _searchPush(results, area, type, label, sub, onclick, hay, q){
  if(!canAccessTab(area)) return;
  if(_searchHas(hay, q)) results.push({type,label,sub,onclick});
}
function _allObraFiles(o){
  if(!o || !o.ficheiros) return [];
  return Object.keys(o.ficheiros).flatMap(k => Array.isArray(o.ficheiros[k]) ? o.ficheiros[k].map(f => ({...f, grupo:k})) : []);
}

// ============ 15c. FILE STORAGE ============
const fmtSize = (b) => b < 1024 ? b+' B' : b < 1048576 ? (b/1024).toFixed(1)+' KB' : (b/1048576).toFixed(1)+' MB';

async function storeFile(file){
  if(file.size > 4500000){ throw new Error('Ficheiro "'+file.name+'" excede 4.5 MB.'); }
  const dataUrl = await new Promise((res,rej)=>{
    const r = new FileReader();
    r.onload = () => res(r.result);
    r.onerror = () => rej(new Error('Erro a ler ficheiro'));
    r.readAsDataURL(file);
  });
  const id = uid();
  const key = 'file:'+id;
  await window.storage.set(key, dataUrl);
  return { id, key, name: file.name, size: file.size, type: file.type || 'application/octet-stream' };
}

async function readFile(key){
  try { const r = await window.storage.get(key); return r ? r.value : null; }
  catch(e){ return null; }
}

async function deleteStoredFile(key){
  try { await window.storage.delete(key); } catch(e){}
}

function dataUrlToBlob(dataUrl){
  const [meta, b64] = dataUrl.split(',');
  const mime = (meta.match(/:(.*?);/)||[])[1] || 'application/octet-stream';
  const bin = atob(b64);
  const arr = new Uint8Array(bin.length);
  for(let i=0;i<bin.length;i++) arr[i] = bin.charCodeAt(i);
  return new Blob([arr], {type: mime});
}

async function downloadStoredFile(fmeta){
  const dataUrl = await readFile(fmeta.key);
  if(!dataUrl){ alert('Ficheiro não encontrado'); return; }
  const a = document.createElement('a');
  a.href = dataUrl;
  a.download = fmeta.name;
  a.click();
}

// Generic dropzone renderer used by obra and equip modals
// target = {obj, listKey}  obj is the in-memory object being edited, listKey is the array prop
function renderDropZone(zoneId, label, listArr, onChange){
  return `
    <div class="dropzone" id="${zoneId}" onclick="document.getElementById('${zoneId}-input').click()">
      <input type="file" id="${zoneId}-input" multiple style="display:none" onchange="window['${zoneId}_handle'](this.files)">
      <div class="dropzone-icon">📎</div>
      <div class="dropzone-text"><strong>${label}</strong> · clique ou arraste ficheiros aqui</div>
      <div class="dropzone-text" style="font-size:11px;margin-top:2px;">máx. 4.5 MB por ficheiro</div>
    </div>
    <div id="${zoneId}-list">
      ${(listArr||[]).map((f,i)=>`
        <div class="file-item">
          <span style="font-size:16px;">${f.type && f.type.startsWith('image/') ? '🖼️' : '📄'}</span>
          <span class="file-name" onclick="downloadStoredFile(${JSON.stringify(f).replace(/"/g,'&quot;')})" style="cursor:pointer;text-decoration:underline;">${escapeHtml(f.name)}</span>
          <span class="file-size">${fmtSize(f.size)}</span>
          <button class="icon-btn" onclick="window['${zoneId}_remove'](${i})" title="Remover">✕</button>
        </div>
      `).join('')}
    </div>
  `;
}

function attachDropZone(zoneId, listArr, onUpdate){
  const zone = document.getElementById(zoneId);
  if(!zone) return;
  const handle = async (files) => {
    for(const f of files){
      try {
        const meta = await storeFile(f);
        listArr.push(meta);
      } catch(e){ alert(e.message); }
    }
    onUpdate();
  };
  window[zoneId+'_handle'] = handle;
  window[zoneId+'_remove'] = async (i) => {
    const f = listArr[i];
    if(f && f.key) await deleteStoredFile(f.key);
    listArr.splice(i,1);
    onUpdate();
  };
  ['dragenter','dragover'].forEach(ev => zone.addEventListener(ev, e => { e.preventDefault(); zone.classList.add('over'); }));
  ['dragleave','drop'].forEach(ev => zone.addEventListener(ev, e => { e.preventDefault(); zone.classList.remove('over'); }));
  zone.addEventListener('drop', e => { if(e.dataTransfer.files.length) handle(e.dataTransfer.files); });
}

              <td style="text-align:center;"><span class="badge ${(contadorMes[w.id]||0)>0?'badge-blue':'badge-neutral'}">${contadorMes[w.id]||0}</span></td>

                <button class="btn btn-ghost" onclick="editTrabalhador('${w.id}')" style="padding:5px 10px;font-size:12px;">Editar</button>
                <button class="btn btn-danger" onclick="deleteTrabalhador('${w.id}')" style="padding:5px 10px;font-size:12px;">🗑</button>
              </td>
            </tr>
          `).join('')}
        </tbody>
      </table>`;

  return `
  <div class="flex items-center justify-between mb-6 flex-wrap gap-3">
    <div>
      <h2 class="text-2xl font-bold">👷 Trabalhadores</h2>
      <p class="text-sm" style="color:var(--muted);">Gestão de presenças nas obras · ${state.workers.length} trabalhador(es)</p>
    </div>
    <div class="flex gap-2 flex-wrap">
      <button class="btn btn-ghost" onclick="exportarFolhaDias()">📊 Exportar Folha de Dias</button>
      <button class="btn btn-accent" onclick="editTrabalhador()">+ Novo Trabalhador</button>
    </div>
  </div>

  <div class="card mb-5">
    ${trabsHtml}
  </div>

  <div class="card p-5">
    <div class="text-xs" style="color:var(--ink-soft);line-height:1.7;">
      <strong style="color:var(--ink);">💡 Como funciona:</strong><br>
      • Adicione os trabalhadores aqui (apenas o nome — sem salários nem dados sensíveis).<br>
      • Em cada obra, na ficha, marque <strong>quem esteve presente</strong> nesse dia.<br>
      • A app conta cada dia <strong>uma única vez</strong>, mesmo que o trabalhador tenha visitado várias obras nesse dia.<br>
      • No fim do mês, clique em <strong>"📊 Exportar Folha de Dias"</strong> para ter o ficheiro Excel/CSV com tudo.<br>
      • Os valores de salário <strong>não estão na app</strong> — calcule no Excel exportado, em privado.
    </div>
  </div>
  `;
}

// === Editar / Criar trabalhador ===
function editTrabalhador(id){
  _ensureWorkersStorage();
  const w = id ? state.workers.find(x => x.id === id) : {nome:'', notas:''};
  if(!w){ return; }
  openModal(`
    <div class="p-6">
      <div class="flex items-center justify-between mb-5">
        <h2 class="text-2xl font-bold">${id?'Editar':'Novo'} Trabalhador</h2>
        <button class="icon-btn text-xl" onclick="closeModal(true)">✕</button>
      </div>
      <div class="grid-2 mb-4">
        <div><label class="label">Nome *</label><input class="input" id="w-nome" value="${escapeAttr(w.nome||'')}" placeholder="ex: João Ferreira" autofocus></div>
        <div><label class="label">Notas (opcional)</label><input class="input" id="w-notas" value="${escapeAttr(w.notas||'')}" placeholder="ex: Especialista fibra"></div>
      </div>
      <div class="flex justify-between mt-6">
        ${id?`<button class="btn btn-danger" onclick="deleteTrabalhador('${id}')">Eliminar</button>`:'<div></div>'}
        <div class="flex gap-2">
          <button class="btn btn-ghost" onclick="closeModal(true)">Cancelar</button>
          <button class="btn btn-primary" onclick="saveTrabalhador('${id||''}')">Guardar</button>
        </div>
      </div>
    </div>
  `);
}

async function saveTrabalhador(id){
  if(window._saving) return; window._saving = true;
  try {
    _ensureWorkersStorage();
    const nome = document.getElementById('w-nome').value.trim();
    if(!nome){ alert('O nome é obrigatório.'); return; }
    const notas = document.getElementById('w-notas').value.trim();
    if(id){
      const i = state.workers.findIndex(x => x.id === id);
      if(i >= 0) state.workers[i] = {...state.workers[i], nome, notas};
    } else {
      state.workers.push({id: uid(), nome, notas});
    }
    await save('workers');
    clearDirty();
    closeModal(true);
    renderView();
  } catch(e){
    console.error('saveTrabalhador failed:', e);
  } finally { window._saving = false; }
}

function deleteTrabalhador(id){
  _ensureWorkersStorage();
  const w = state.workers.find(x => x.id === id);
  if(!w) return;
  const presCount = state.presencas.filter(p => p.workerId === id).length;
  let msg = `Eliminar o trabalhador "${w.nome}"?`;
  if(presCount > 0){
    msg += `\n\n⚠️ ATENÇÃO: este trabalhador tem ${presCount} presença(s) registada(s) em obras.\n\nAs presenças serão também eliminadas e perderá esse histórico.`;
  } else {
    msg += `\n\nNão tem presenças registadas. Pode eliminar sem perder nada.`;
  }
  confirmAction(msg, async () => {
    const prevWorkers = JSON.parse(JSON.stringify(state.workers));
    const prevPresencas = JSON.parse(JSON.stringify(state.presencas));
    state.workers = state.workers.filter(x => x.id !== id);
    state.presencas = state.presencas.filter(p => p.workerId !== id);
    try {
      await saveMany(['workers','presencas']);
    } catch(e){
      state.workers = prevWorkers;
      state.presencas = prevPresencas;
      _warn('Falha ao eliminar trabalhador. Alterações revertidas em memória.');
      return;
    }
    closeModal(true);
    renderView();
  }, { okLabel: 'Eliminar', cancelLabel: 'Cancelar' });
}

// === Presenças nas obras ===
function presencasObraHtml(obraId){
  _ensureWorkersStorage();
  const presObra = state.presencas.filter(p => p.obraId === obraId);
  // Agrupar por data DESC
  const porData = {};
  presObra.forEach(p => {
    if(!porData[p.data]) porData[p.data] = [];
    porData[p.data].push(p);
  });
  const datas = Object.keys(porData).sort().reverse();
  const hoje = today();

  const semWorkers = state.workers.length === 0;

  const histHtml = datas.length === 0
    ? `<div class="text-xs" style="color:var(--muted);padding:8px 0;">Sem presenças registadas nesta obra.</div>`
    : datas.slice(0,30).map(d => {
        const list = porData[d];
        return `
          <div class="flex items-center gap-2 flex-wrap py-2" style="border-bottom:1px solid var(--line-soft);">
            <span style="font-size:12px;color:var(--ink-soft);min-width:90px;font-weight:600;">${fmtDate(d)}</span>
            <div class="flex gap-1 flex-wrap" style="flex:1;">
              ${list.map(p => {
                const w = state.workers.find(x => x.id === p.workerId);
                const nome = w ? w.nome : '(eliminado)';
                return `<span class="chip" style="background:var(--blue-soft);color:var(--blue);">
                  ${escapeHtml(nome)}
                  <button onclick="removerPresenca('${p.id}','${obraId}')" style="background:none;border:none;color:var(--blue);cursor:pointer;padding:0 2px;font-size:13px;opacity:.7;" title="Remover">✕</button>
                </span>`;
              }).join('')}
            </div>
          </div>
        `;
      }).join('');

  return `
  <div class="card p-5 mb-4">
    <div class="flex items-center justify-between mb-3">
      <h3 class="serif text-lg font-bold">👷 Presenças</h3>
      ${semWorkers
        ? `<button class="btn btn-ghost" onclick="switchTab('trabalhadores')" style="font-size:12px;">+ Adicionar trabalhadores primeiro →</button>`
        : ''
      }
    </div>
    ${semWorkers
      ? `<div class="text-xs" style="color:var(--muted);">Crie trabalhadores no separador "Trabalhadores" para começar a registar presenças.</div>`
      : `
        <div class="flex gap-2 mb-3 flex-wrap items-start">
          <div style="flex:1;min-width:200px;position:relative;">
            <input type="text" class="input" id="pres-search-${obraId}" placeholder="🔍 Procurar trabalhador por nome..." autocomplete="off"
              oninput="onPresencaSearch('${obraId}')"
              onfocus="onPresencaSearch('${obraId}')"
              onblur="setTimeout(() => hidePresencaSuggest('${obraId}'), 180)">
            <div id="pres-suggest-${obraId}" style="position:absolute;top:100%;left:0;right:0;background:var(--card);border:1px solid var(--line);border-radius:10px;box-shadow:var(--shadow-lg);z-index:40;max-height:260px;overflow-y:auto;display:none;margin-top:4px;"></div>
          </div>
          <input type="date" class="input" id="pres-data-${obraId}" value="${hoje}" style="max-width:170px;" title="Data da presença">
        </div>
        ${histHtml}
      `
    }
  </div>
  `;
}

function onPresencaSearch(obraId){
  const inp = document.getElementById('pres-search-' + obraId);
  const box = document.getElementById('pres-suggest-' + obraId);
  if(!inp || !box) return;
  const q = inp.value.trim().toLowerCase();
  const dataEl = document.getElementById('pres-data-' + obraId);
  const data = dataEl ? dataEl.value : today();
  // Lista de trabalhadores disponíveis (excluindo os já marcados nessa data nessa obra)
  const disponiveis = state.workers.filter(w => {
    return !state.presencas.some(p => p.obraId === obraId && p.data === data && p.workerId === w.id);
  });
  // Filtrar: se tem query, procurar substring case-insensitive; senão mostrar todos
  let list = disponiveis;
  if(q){
    list = disponiveis.filter(w => w.nome.toLowerCase().includes(q));
  }
  list = list.slice(0, 10);
  if(list.length === 0){
    box.innerHTML = `<div style="padding:12px 14px;color:var(--muted);font-size:13px;">
      ${q ? 'Nenhum trabalhador encontrado com "' + escapeHtml(q) + '"' : 'Todos os trabalhadores já estão marcados nesta data.'}
    </div>`;
    box.style.display = 'block';
    return;
  }
  // Destacar a parte do nome que corresponde à pesquisa
  const highlight = (nome) => {
    if(!q) return escapeHtml(nome);
    const idx = nome.toLowerCase().indexOf(q);
    if(idx < 0) return escapeHtml(nome);
    const before = escapeHtml(nome.substring(0, idx));
    const match = escapeHtml(nome.substring(idx, idx + q.length));
    const after = escapeHtml(nome.substring(idx + q.length));
    return before + '<mark style="background:var(--accent-soft);color:var(--accent);padding:0 2px;border-radius:3px;">' + match + '</mark>' + after;
  };
  box.innerHTML = list.map(w => `
    <div onmousedown="pickPresenca('${obraId}', '${w.id}')" style="padding:10px 14px;cursor:pointer;border-bottom:1px solid var(--line-soft);display:flex;align-items:center;gap:10px;" onmouseover="this.style.background='var(--line-soft)'" onmouseout="this.style.background=''">
      <span style="display:inline-flex;align-items:center;justify-content:center;width:28px;height:28px;border-radius:50%;background:var(--blue-soft);color:var(--blue);font-weight:700;font-size:12px;">${escapeHtml(w.nome.charAt(0).toUpperCase())}</span>
      <div style="flex:1;">
        <div style="font-weight:500;">${highlight(w.nome)}</div>
        ${w.notas ? `<div style="font-size:11px;color:var(--muted);">${escapeHtml(w.notas)}</div>` : ''}
      </div>
      <span style="color:var(--ok);font-size:16px;">+</span>
    </div>
  `).join('');
  box.style.display = 'block';
}

function hidePresencaSuggest(obraId){
  const box = document.getElementById('pres-suggest-' + obraId);
  if(box) box.style.display = 'none';
}

async function pickPresenca(obraId, workerId){
  if(!workerId) return;
  _ensureWorkersStorage();
  const dataInput = document.getElementById('pres-data-' + obraId);
  const data = dataInput ? dataInput.value : today();
  if(!data){ alert('Indique uma data.'); return; }
  const exists = state.presencas.find(p => p.obraId === obraId && p.workerId === workerId && p.data === data);
  if(!exists){
    state.presencas.push({ id: uid(), obraId, workerId, data });
    await save('presencas');
  }
  hidePresencaSuggest(obraId);
  // Limpar campo de pesquisa e re-render
  const inp = document.getElementById('pres-search-' + obraId);
  if(inp) inp.value = '';
  // Re-render apenas o container de presenças (está em 2 sítios possíveis)
  const editContainer = document.getElementById('o-presencas-container');
  if(editContainer){
    editContainer.innerHTML = presencasObraHtml(obraId);
  } else if(typeof openObra === 'function'){
    openObra(obraId);
  }
}

async function removerPresenca(presencaId, obraId){
  _ensureWorkersStorage();
  state.presencas = state.presencas.filter(p => p.id !== presencaId);
  await save('presencas');
  if(typeof openObra === 'function') openObra(obraId);
}

  _ensureWorkersStorage();
  if(state.presencas.length === 0){
    alert('Ainda não há presenças registadas. Adicione presenças nas obras primeiro.');
    return;
  }
  // Pedir período
  const meses = [...new Set(state.presencas.map(p => (p.data||'').slice(0,7)).filter(Boolean))].sort().reverse();
  const opts = meses.map(m => {
    const [y,mo] = m.split('-');
    const nome = ['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'][+mo-1];
    return `<option value="${m}">${nome} ${y}</option>`;
  }).join('');
  openModal(`
    <div class="p-6">
      <h2 class="text-2xl font-bold mb-4">📊 Exportar Folha de Dias</h2>
      <p class="text-sm mb-4" style="color:var(--ink-soft);">Escolha o período. Será gerado um ficheiro CSV (abre em Excel ou LibreOffice) com o resumo e o detalhe diário, sem valores de salário.</p>
      <div class="grid-2 mb-5">
        <div>
          <label class="label">Mês</label>
          <select class="select" id="exp-mes">
            <option value="todos">Todos os meses</option>
            ${opts}
          </select>
        </div>
        <div>
          <label class="label">Trabalhador</label>
          <select class="select" id="exp-worker">
            <option value="todos">Todos</option>
            ${state.workers.map(w => `<option value="${w.id}">${escapeHtml(w.nome)}</option>`).join('')}
          </select>
        </div>
      </div>
      <div class="flex justify-end gap-2">
        <button class="btn btn-ghost" onclick="closeModal(true)">Cancelar</button>
        <button class="btn btn-primary" onclick="_doExportarDias()">📥 Descarregar CSV</button>
      </div>
    </div>
  `);
}

function _doExportarDias(){
  const mes = document.getElementById('exp-mes').value;
  const wid = document.getElementById('exp-worker').value;

  let pres = state.presencas.slice();
  if(mes && mes !== 'todos') pres = pres.filter(p => (p.data||'').startsWith(mes));
  if(wid && wid !== 'todos') pres = pres.filter(p => p.workerId === wid);

  if(pres.length === 0){
    alert('Sem presenças para o filtro selecionado.');
    return;
  }

  // Construir resumo: contar dias únicos por trabalhador
  const diasUnicos = {};
  pres.forEach(p => {
    const k = p.workerId + '|' + p.data;
    diasUnicos[k] = true;
  });
  const totaisPorTrab = {};
  Object.keys(diasUnicos).forEach(k => {
    const wid = k.split('|')[0];
    totaisPorTrab[wid] = (totaisPorTrab[wid]||0) + 1;
  });

  // Construir detalhe: agrupar por (data, trabalhador), juntar obras
  const detalheMap = {};
  pres.forEach(p => {
    const k = p.workerId + '|' + p.data;
    if(!detalheMap[k]) detalheMap[k] = {workerId: p.workerId, data: p.data, obras: []};
    const o = state.obras.find(x => x.id === p.obraId);
    if(o) detalheMap[k].obras.push(obraLabel(o));
  });
  const detalheLista = Object.values(detalheMap).sort((a,b) => (a.data||'').localeCompare(b.data||'') || (a.workerId).localeCompare(b.workerId));

  // Construir CSV
  const csv = [];
  const periodLabel = mes === 'todos' ? 'Todos os períodos' : (() => {
    const [y,mo] = mes.split('-');
    return ['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'][+mo-1] + ' ' + y;
  })();

  csv.push('TRITED — Folha de Dias Trabalhados');
  csv.push('Período;' + periodLabel);
  csv.push('Exportado em;' + fmtDate(today()));
  csv.push('');
  csv.push('=== RESUMO POR TRABALHADOR ===');
  csv.push('Trabalhador;Total de Dias;Notas');
  state.workers.forEach(w => {
    const total = totaisPorTrab[w.id] || 0;
    if(total === 0 && wid !== 'todos' && wid !== w.id) return;
    if(total === 0) return;
    csv.push([w.nome, total, w.notas||''].map(_csvCell).join(';'));
  });
  csv.push('');
  csv.push('=== DETALHE DIÁRIO ===');
  csv.push('Data;Dia da Semana;Trabalhador;Obras Visitadas');
  const diasSemana = ['Dom','Seg','Ter','Qua','Qui','Sex','Sáb'];
  detalheLista.forEach(d => {
    const w = state.workers.find(x => x.id === d.workerId);
    const dt = new Date(d.data + 'T00:00:00');
    csv.push([
      fmtDate(d.data),
      diasSemana[dt.getDay()],
      w ? w.nome : '(eliminado)',
      d.obras.join(', ')
    ].map(_csvCell).join(';'));
  });
  csv.push('');
  csv.push('Nota: Cada dia conta uma única vez por trabalhador, mesmo que tenha visitado várias obras.');
  csv.push('Para calcular salário: multiplique a coluna "Total de Dias" pela diária de cada trabalhador (em privado).');

  // BOM para Excel reconhecer UTF-8 com acentos
  const BOM = '\uFEFF';
  const blob = new Blob([BOM + csv.join('\n')], {type: 'text/csv;charset=utf-8;'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  const periodTag = mes === 'todos' ? 'todos' : mes;
  a.download = 'TRITED_Dias_' + periodTag + '.csv';
  a.click();
  closeModal(true);
}

function _csvCell(v){
  v = String(v == null ? '' : v);
  if(v.includes(';') || v.includes('"') || v.includes('\n')){
    return '"' + v.replace(/"/g,'""') + '"';
  }
  return v;
}

// ============ 17. ORÇAMENTOS ============

function _ensureOrcStorage(){
  if(!Array.isArray(state.orcamentos)) state.orcamentos = [];
  const validStates = ORC_ESTADOS.map(e => e[0]);
  state.orcamentos.forEach(o => {
    normalizeOrcItems(o);
    if(!o.estado) o.estado = 'rascunho';
    if(o.estado === 'aprovado') o.estado = 'aceite';
    if(o.estado === 'convertido_obra') o.estado = 'convertido';
    if(!validStates.includes(o.estado)) o.estado = 'rascunho';
    if(!o.validade) o.validade = 30;
    if(o.obraId === undefined) o.obraId = '';
  });
}

const orcLabel = (o) => 'ORC-' + String(o.numero||0).padStart(2,'0') + '-' + String(o.ano||currentYear()).slice(-2);
const nextOrcNumForYear = (ano) => (state.orcamentos.filter(o=>Number(o.ano)===Number(ano)).reduce((m,o)=>Math.max(m, Number(o.numero)||0), 0)) + 1;
function orcamentoById(id){ return state.orcamentos.find(x => x.id === id) || null; }
function obraById(id){ return state.obras.find(x => x.id === id) || null; }
function orcObra(o){
  if(!o) return null;
  if(o.obraId){
    const direct = obraById(o.obraId);
    if(direct) return direct;
  }
  return state.obras.find(ob => ob.orcamentoId === o.id) || null;
}
function orcObraBadge(o){
  const obra = orcObra(o);
  return obra
    ? `<button class="btn btn-ghost" onclick="event.stopPropagation();openObra('${obra.id}')">🔨 Obra ${obraLabel(obra)}</button>`
    : '<span class="badge badge-neutral">—</span>';
}
function orcTotalComIva(o){
  const sub = orcSubtotal(o);
  return sub * (1 + (Number(o.iva)||23)/100);
}
function orcNormalizaTxt(v){
  return String(v || '').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[^a-z0-9]+/g,' ').trim();
}
function catalogInventoryId(c){
  return c && (c.inventoryId || c.inventarioId || c.stockId || c.itemInventarioId || '');
}
function findInventarioParaOrcItem(it){
  const c = it.catalogId ? state.catalog.find(x => x.id === it.catalogId) : null;
  const directId = catalogInventoryId(c);
  if(directId){
    const inv = inventarioById(directId);
    if(inv) return inv;
  }
  const ref = c && c.ref ? orcNormalizaTxt(c.ref) : '';
  if(ref){
    const byRef = state.inventory.find(inv => orcNormalizaTxt(inv.ref || inv.referencia || inv.codigo || '') === ref);
    if(byRef) return byRef;
  }
  const nomes = [];
  if(c){
    nomes.push(c.nome, c.designacao, c.tecnologia, catalogDesc(c));
  }
  nomes.push(it.descricao);
  const keys = nomes.map(orcNormalizaTxt).filter(Boolean);
  if(!keys.length) return null;
  return state.inventory.find(inv => {
    const invNome = orcNormalizaTxt(inv.nome || inv.designacao || '');
    if(!invNome) return false;
    return keys.some(k => invNome === k || (k.length >= 6 && invNome.includes(k)) || (invNome.length >= 6 && k.includes(invNome)));
  }) || null;
}
function orcDescricaoParaObra(o){
  const cl = o.clienteId ? state.clients.find(c => c.id === o.clienteId) : null;
  const linhas = [];
  linhas.push('OBRA CRIADA A PARTIR DE ORÇAMENTO');
  linhas.push('');
  linhas.push('Orçamento: ' + orcLabel(o));
  if(cl || o.clienteNome) linhas.push('Cliente: ' + (cl ? cl.nome : o.clienteNome));
  if(o.data) linhas.push('Data do orçamento: ' + fmtDate(o.data));
  const limite = orcValidadeData(o);
  if(limite) linhas.push('Validade do orçamento: ' + fmtDate(limite));
  linhas.push('Valor aprovado: ' + fmt(orcTotalComIva(o)) + ' c/ IVA');
  if(o.descricao) linhas.push('', 'Resumo:', o.descricao);
  const itens = (o.itens||[]).filter(it => (it.descricao||'').trim());
  if(itens.length){
    linhas.push('', 'Materiais / serviços previstos:');
    itens.forEach((it, idx) => {
      const qtd = Number(it.quantidade||0);
      const un = it.unidade || 'un';
      const desc = it.descricao || '';
      const total = orcLineTotal(it);
      const desconto = Number(it.desconto||0) ? ` · desc. ${Number(it.desconto||0)}%` : '';
      linhas.push(`${idx+1}. ${desc} — ${qtd} ${un} × ${fmt(it.precoUnit||0)}${desconto} = ${fmt(total)}`);
    });
  }
  if(o.condicoes) linhas.push('', 'Condições:', o.condicoes);
  return linhas.join('\n');
}
function orcItensInventarioParaObra(o){
  const rows = [];
  const seen = new Set();
  (o.itens||[]).forEach(it => {
    const inv = findInventarioParaOrcItem(it);
    const qtd = Number(it.quantidade || 0);
    if(!inv || qtd <= 0) return;
    const key = inv.id;
    const existing = rows.find(r => r.inventoryId === key);
    if(existing){
      existing.quantidade += qtd;
      return;
    }
    rows.push({
      id: uid(),
      inventoryId: inv.id,
      nome: inv.nome || it.descricao || '',
      unidade: inv.unidade || it.unidade || 'un',
      quantidade: qtd,
      precoUnitario: Number(inv.precoUnitario || it.precoUnit || 0),
      origemOrcamentoItem: it.catalogId || ''
    });
    seen.add(key);
  });
  return rows;
}
function orcMateriaisParaObra(o){
  return (o.itens||[]).filter(it => (it.descricao||'').trim()).map(it => ({
    designacao: it.descricao || '',
    marca: '',
    ref: '',
    quantidade: Number(it.quantidade || 0),
    unidade: it.unidade || 'un',
    precoUnit: Number(it.precoUnit || 0),
    desconto: Number(it.desconto || 0),
    catalogId: it.catalogId || ''
  }));
}
function orcamentoJaConvertido(o){
  if(!o) return false;
  return !!(orcObra(o) || o.obraId || o.estado === 'convertido');
}

const ORC_ESTADOS = [
  ['rascunho','📝 Rascunho'],
  ['enviado','📤 Enviado'],
  ['aceite','✅ Aceite'],
  ['recusado','❌ Recusado'],
  ['expirado','⏰ Expirado'],
  ['convertido','🔨 Convertido em obra'],
];
const ORC_ESTADO_CLASSES = {
  rascunho:'badge-neutral',
  enviado:'badge-blue',
  aceite:'badge-green',
  recusado:'badge-red',
  expirado:'badge-warn',
  convertido:'badge-ok'
};
const ORC_ESTADOS_FINAIS = ['aceite','recusado','convertido'];
function orcValidadeData(o){
  if(!o || !o.data) return '';
  try {
    const d = new Date(o.data + 'T00:00:00');
    d.setDate(d.getDate() + (Number(o.validade)||30));
    return d.toISOString().slice(0,10);
  } catch(e){ return ''; }
}
function orcEstadoKey(o){
  if(!o) return 'rascunho';
  const raw = o.estado || 'rascunho';
  if(raw === 'expirado') return 'expirado';
  if(!ORC_ESTADOS_FINAIS.includes(raw)){
    const limite = orcValidadeData(o);
    if(limite && limite < today()) return 'expirado';
  }
  return ORC_ESTADOS.some(e=>e[0]===raw) ? raw : 'rascunho';
}
function orcEstadoLabel(key){
  const est = ORC_ESTADOS.find(e=>e[0]===key) || ORC_ESTADOS[0];
  return est[1];
}
function orcEstadoBadge(o){
  const key = typeof o === 'string' ? o : orcEstadoKey(o);
  return `<span class="badge ${ORC_ESTADO_CLASSES[key]||'badge-neutral'}">${orcEstadoLabel(key)}</span>`;
}
function setOrcamentosFilter(filtro){
  window._orcEstadoFilter = filtro || 'todos';
  renderView();
}

function catalogUnit(c){
  return (c && (c.unidade || c.un || c.medida)) || 'un';
}
function catalogPrice(c){
  if(!c) return 0;
  return Number(c.precoUnit ?? c.precoUnitario ?? c.preco ?? c.valor ?? 0) || 0;
}
function catalogDesc(c){
  if(!c) return '';
  let nome = c.tecnologia || c.designacao || c.nome || '';
  const extra = [];
  if(c.marca) extra.push(c.marca);
  if(c.ref) extra.push('Ref: ' + c.ref);
  return extra.length ? nome + ' — ' + extra.join(' · ') : nome;
}
function orcLineTotal(it){
  const bruto = (Number(it.quantidade)||0) * (Number(it.precoUnit)||0);
  const desconto = Math.max(0, Math.min(100, Number(it.desconto)||0));
  return bruto * (1 - desconto/100);
}
function orcSubtotal(o){
  return (o.itens||[]).reduce((s,it)=> s + orcLineTotal(it), 0);
}
function normalizeOrcItems(o){
  if(!Array.isArray(o.itens)) o.itens = [];
  o.itens = o.itens.map(it => ({
    descricao: it.descricao || '',
    unidade: it.unidade || 'un',
    quantidade: Number(it.quantidade)||0,
    precoUnit: Number(it.precoUnit)||0,
    desconto: Number(it.desconto)||0,
    catalogId: it.catalogId || ''
  }));
}

async function setOrcEstado(id, estado){
  if(estado === 'convertido'){ converterOrcamentoEmObra(id); return; }
  const o = state.orcamentos.find(x=>x.id===id);
  if(!o) return;
  o.estado = estado;
  if(estado === 'enviado') o.dataEnvio = today();
  if(estado === 'aceite') o.dataAceite = today();
  if(estado === 'recusado') o.dataRecusa = today();
  if(estado === 'expirado') o.dataExpirado = today();
  if(estado === 'convertido') o.dataConvertido = today();
  await save('orcamentos');
  viewOrcamento(id);
}

async function _converterOrcamentoEmObraNow(id){
  if(window._saving) return;
  window._saving = true;
  const prevObras = JSON.parse(JSON.stringify(state.obras));
  const prevOrcamentos = JSON.parse(JSON.stringify(state.orcamentos));
  try {
    _ensureOrcStorage();
    const o = state.orcamentos.find(x=>x.id===id);
    if(!o){ alert('Orçamento não encontrado.'); return; }
    const existente = orcObra(o);
    if(existente){ openObra(existente.id); return; }
    if(orcamentoJaConvertido(o)){
      alert('Este orçamento já foi convertido em obra.');
      viewOrcamento(id);
      return;
    }
    normalizeOrcItems(o);
    const ano = currentYear();
    const obraId = uid();
    const itensInventario = orcItensInventarioParaObra(o);
    const novaObra = normalizeObraForSave({
      id: obraId,
      numero: nextObraNumForYear(ano),
      ano,
      clienteId: o.clienteId || '',
      data: today(),
      dataConclusao: '',
      descricao: orcDescricaoParaObra(o),
      observacoes: 'Criada automaticamente a partir do orçamento ' + orcLabel(o),
      valor: orcTotalComIva(o),
      valorPago: 0,
      dataPagamento: '',
      pagamentos: [],
      estado: 'em_curso',
      incluiFichaIted: false,
      incluiFichaItur: false,
      refId: '',
      instalador: {nome:'',nif:'',numero:''},
      itur: {morada:'',codPostal:'',localidade:'',coordenadas:'',manualIted:''},
      cabos: [],
      materiais: orcMateriaisParaObra(o),
      docObrig: {ensaios:false,calibracao:false,projeto:false},
      docFacult: '',
      equipamentosUsados: [],
      itensInventario,
      stockReservado: false,
      stockReservadoEm: '',
      stockBaixado: false,
      stockBaixadoEm: '',
      ficheiros: {cobre:[], coaxial:[], fibra:[], fotos:[], outros:[]},
      orcamentoId: o.id
    });

    let reservaMsg = '';
    if(itensInventario.length > 0){
      const reserva = validarReservaStockObra(novaObra);
      if(reserva.problemas.length === 0){
        novaObra.stockReservado = true;
        novaObra.stockReservadoEm = today();
        reservaMsg = 'Stock reservado automaticamente.';
      } else {
        reservaMsg = 'A obra foi criada, mas o stock não foi reservado automaticamente:\n' + reserva.problemas.join('\n');
      }
    } else {
      reservaMsg = 'A obra foi criada. Nenhum item do orçamento correspondeu ao inventário para reserva automática.';
    }

    state.obras.push(novaObra);
    o.obraId = obraId;
    o.estado = 'convertido';
    o.dataConvertido = today();
    await saveMany(['obras','orcamentos']);
    clearDirty();
    if(reservaMsg) alert(reservaMsg);
    openObra(obraId);
  } catch(e){
    state.obras = prevObras;
    state.orcamentos = prevOrcamentos;
    alert('Erro ao converter orçamento em obra: ' + e.message);
    console.error('converterOrcamentoEmObra failed:', e);
  } finally { window._saving = false; }
}

function converterOrcamentoEmObra(id){
  const o = state.orcamentos.find(x=>x.id===id);
  if(!o) return;
  const existente = orcObra(o);
  if(existente){ openObra(existente.id); return; }
  if(orcamentoJaConvertido(o)){
    alert('Este orçamento já foi convertido em obra.');
    viewOrcamento(id);
    return;
  }
  const invCount = orcItensInventarioParaObra(o).length;
  confirmAction(
    `Converter o orçamento ${orcLabel(o)} em obra?

Será criada uma nova obra com o próximo número disponível, ficará associada a este orçamento, copiará os itens para a obra e tentará reservar stock automaticamente.

Itens com ligação ao inventário encontrados: ${invCount}`,
    () => _converterOrcamentoEmObraNow(id),
    {okLabel:'✅ Converter em Obra', cancelLabel:'Cancelar', okStyle:'background:var(--ok);color:#fff;'}
  );
}

      </div>

    <div class="grid-2 mb-3">
      <div><label class="label">Morada</label><input class="input" id="orc-cl-morada" value="${escapeAttr(o.clienteMorada||'')}"></div>
