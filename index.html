    <div class="flex gap-2 mb-2 px-2 text-xs font-semibold" style="color:var(--muted);">
      <div style="flex:2;min-width:200px;">Descrição</div>
      <div style="width:70px;text-align:center;">Un.</div>
      <div style="width:80px;text-align:center;">Qtd.</div>
      <div style="width:110px;text-align:center;">Preço Un.</div>
      <div style="width:78px;text-align:center;">Desc. %</div>
      <div style="width:100px;text-align:right;">Total</div>
      <div style="width:28px;"></div>

    <div class="flex gap-2 mt-2 flex-wrap"><button class="btn btn-accent" onclick="openOrcCatalogPicker()">+ Adicionar do Catálogo</button><button class="btn btn-ghost" onclick="addOrcItem()">+ Linha manual</button></div>

    <div style="border-top:2px solid var(--line);margin-top:16px;padding-top:12px;">
      <div class="flex justify-between text-sm"><span>Subtotal</span><span id="orc-subtotal">${fmt(sub)}</span></div>
      <div class="flex items-center justify-between text-sm mt-1">
        <span>IVA <input type="number" class="input" id="orc-iva" value="${o.iva||23}" style="width:60px;display:inline;text-align:center;padding:2px 6px;" oninput="window._editingOrc.iva=+this.value; _updateOrcTotals()">%</span>

      <div class="flex justify-between mt-2" style="font-size:20px;font-weight:700;"><span>TOTAL</span><span id="orc-total" style="color:var(--accent);">${fmt(total)}</span></div>
    </div>

    <div class="grid-2 mt-4">
      <div><label class="label">Condições de Pagamento</label><textarea class="input" id="orc-condicoes" rows="2">${escapeHtml(o.condicoes||'')}</textarea></div>
      <div><label class="label">Notas</label><textarea class="input" id="orc-notas" rows="2">${escapeHtml(o.notas||'')}</textarea></div>
    </div>

    <div class="flex justify-end gap-2 mt-5">
      <button class="btn btn-ghost" onclick="closeModal(true)">Cancelar</button>

}

function _updateOrcTotals(){
  const o = window._editingOrc;
  const sub = orcSubtotal(o);
  const ivaVal = sub * (o.iva||23)/100;
  const total = sub + ivaVal;
  const elSub = document.getElementById('orc-subtotal');
  const elIva = document.getElementById('orc-iva-val');
  const elTotal = document.getElementById('orc-total');
  if(elSub) elSub.textContent = fmt(sub);
  if(elIva) elIva.textContent = fmt(ivaVal);
  if(elTotal) elTotal.textContent = fmt(total);
  o.itens.forEach((it,i) => {
    const el = document.getElementById('orc-line-total-' + i);
    if(el) el.textContent = fmt(orcLineTotal(it));
  });
}

function onOrcClienteChange(clienteId){
  const c = state.clients.find(x=>x.id===clienteId);
  const o = window._editingOrc;
  o.clienteId = clienteId;
  if(c){
    o.clienteNome = c.nome||''; o.clienteNif = c.nif||''; o.clienteMorada = c.morada||''; o.clienteContacto = c.contacto||'';
    document.getElementById('orc-cl-nome').value = c.nome||'';
    document.getElementById('orc-cl-nif').value = c.nif||'';
    document.getElementById('orc-cl-morada').value = c.morada||'';
    document.getElementById('orc-cl-contacto').value = c.contacto||'';
  }
}

function addOrcItem(){
  _syncOrcFromForm();
  window._editingOrc.itens.push({descricao:'', unidade:'un', quantidade:1, precoUnit:0, desconto:0, catalogId:''});
  _renderOrcModal();
}
function removeOrcItem(idx){
  _syncOrcFromForm();
  if(window._editingOrc.itens.length <= 1){ alert('O orçamento precisa de pelo menos 1 item.'); return; }
  window._editingOrc.itens.splice(idx, 1);
  _renderOrcModal();
}

function onOrcItemSearch(idx, val){
  const box = document.getElementById('orc-suggest-' + idx);
  if(!box) return;
  const q = (val||'').trim().toLowerCase();
  if(!q || q.length < 2){ box.style.display = 'none'; return; }
  const cats = state.catalog.filter(c => {
    const hay = ((c.tecnologia||'')+(c.designacao||'')+(c.marca||'')+(c.ref||'')).toLowerCase();
    return hay.includes(q);
  }).slice(0, 8);
  if(cats.length === 0){ box.style.display = 'none'; return; }
  box.innerHTML = cats.map(c => {
    const nome = c.tecnologia || c.designacao || c.nome || '';
    const sub = [c.marca, c.ref].filter(Boolean).join(' · ');
    const preco = catalogPrice(c);
    const badge = c.tipo === 'cabo'
      ? '<span class="badge" style="background:var(--accent-soft);color:var(--accent);font-size:9px;">Cabo</span>'
      : '<span class="badge badge-blue" style="font-size:9px;">Material</span>';
    return `<div onmousedown="pickOrcItem(${idx},'${c.id}')" style="padding:10px 14px;cursor:pointer;border-bottom:1px solid var(--line-soft);" onmouseover="this.style.background='var(--line-soft)'" onmouseout="this.style.background=''">
      <div style="display:flex;align-items:center;gap:8px;justify-content:space-between;"><span><strong>${escapeHtml(nome)}</strong> ${badge}</span><strong style="color:var(--accent);">${preco?fmt(preco):''}</strong></div>
      <div style="font-size:12px;color:var(--muted);">${escapeHtml(sub)}${sub && preco?' · ':''}${preco?escapeHtml(catalogUnit(c)):''}</div>
    </div>`;
  }).join('');
  box.style.display = 'block';
}
function hideOrcSuggest(idx){
  const box = document.getElementById('orc-suggest-' + idx);
  if(box) box.style.display = 'none';
}
function pickOrcItem(idx, catId){
  const c = state.catalog.find(x=>x.id===catId);
  if(!c) return;
  const it = window._editingOrc.itens[idx];
  it.descricao = catalogDesc(c);
  it.catalogId = catId;
  it.unidade = catalogUnit(c);
  it.precoUnit = catalogPrice(c);
  if(it.desconto === undefined) it.desconto = 0;
  hideOrcSuggest(idx);
  const inp = document.getElementById('orc-item-desc-' + idx);
  if(inp) inp.value = it.descricao;
  _renderOrcModal();
}


function openOrcCatalogPicker(){
  _syncOrcFromForm();
  const items = (state.catalog||[]).slice().sort((a,b) => (catalogDesc(a)||'').localeCompare(catalogDesc(b)||''));
  const rows = items.length === 0
    ? '<div class="empty"><div class="empty-icon">📖</div>Catálogo vazio. Adicione artigos no separador Catálogo primeiro.</div>'
    : items.map(c => {
        const nome = c.tecnologia || c.designacao || c.nome || 'Artigo sem nome';
        const sub = [c.marca, c.ref, c.classe].filter(Boolean).join(' · ');
        const preco = catalogPrice(c);
        const badge = c.tipo === 'cabo'
          ? '<span class="badge" style="background:var(--accent-soft);color:var(--accent);font-size:9px;">Cabo</span>'
          : '<span class="badge badge-blue" style="font-size:9px;">Material</span>';
        return `<div class="card p-3 mb-2 orc-cat-row" data-search="${escapeAttr((nome+' '+sub+' '+catalogUnit(c)).toLowerCase())}" style="cursor:pointer;" onclick="addCatalogItemToOrc('${c.id}')">
          <div class="flex items-center justify-between gap-3 flex-wrap">
            <div>
              <div class="font-semibold">${escapeHtml(nome)} ${badge}</div>
              <div class="text-xs mt-1" style="color:var(--muted);">${escapeHtml(sub || 'sem marca/ref.')} · ${escapeHtml(catalogUnit(c))}</div>
            </div>
            <div class="font-semibold" style="color:var(--accent);">${preco ? fmt(preco) : 'sem preço'}</div>
          </div>
        </div>`;
      }).join('');
  openModal(`
    <div class="p-6">
      <div class="flex items-center justify-between mb-4 gap-2">
        <div>
          <h2 class="text-2xl font-bold">Adicionar do Catálogo</h2>
          <p class="text-sm" style="color:var(--muted);">Escolha um artigo para entrar no orçamento com unidade e preço automático.</p>
        </div>
        <button class="icon-btn text-xl" onclick="_renderOrcModal()">✕</button>
      </div>
      <input class="input mb-4" placeholder="Pesquisar artigo, marca ou referência..." oninput="filterOrcCatalogPicker(this.value)">
      <div id="orc-cat-picker-list" style="max-height:60vh;overflow-y:auto;">${rows}</div>
      <div class="flex justify-end mt-4"><button class="btn btn-ghost" onclick="_renderOrcModal()">Voltar ao orçamento</button></div>
    </div>
  `);
}
function filterOrcCatalogPicker(q){
  q = (q||'').trim().toLowerCase();
  document.querySelectorAll('#orc-cat-picker-list .orc-cat-row').forEach(el => {
    el.style.display = !q || (el.dataset.search||'').includes(q) ? '' : 'none';
  });
}
function addCatalogItemToOrc(catId){
  const c = state.catalog.find(x=>x.id===catId);
  if(!c) return;
  window._editingOrc.itens.push({
    descricao: catalogDesc(c),
    unidade: catalogUnit(c),
    quantidade: 1,
    precoUnit: catalogPrice(c),
    desconto: 0,
    catalogId: catId
  });
  _renderOrcModal();
}

function _syncOrcFromForm(){
  const o = window._editingOrc;
  const val = id => { const el=document.getElementById(id); return el?el.value:''; };
  o.numero = parseInt(val('orc-numero'))||o.numero;
  o.ano = parseInt(val('orc-ano'))||o.ano||currentYear();
  o.data = val('orc-data');
  o.validade = parseInt(val('orc-validade'))||30;
  o.estado = val('orc-estado') || o.estado || 'rascunho';
  o.clienteId = val('orc-cliente');
  o.clienteNome = val('orc-cl-nome');
  o.clienteNif = val('orc-cl-nif');
  o.clienteMorada = val('orc-cl-morada');
  o.clienteContacto = val('orc-cl-contacto');
  o.descricao = val('orc-desc');
  o.iva = parseInt(val('orc-iva'))||23;
  o.condicoes = val('orc-condicoes');
  o.notas = val('orc-notas');
}

async function saveOrcamento(){
  if(window._saving) return; window._saving = true;
  try {
    _syncOrcFromForm();
    const data = window._editingOrc;
    normalizeOrcItems(data);
    data.itens = data.itens.filter(it => (it.descricao||'').trim() || Number(it.precoUnit) > 0 || Number(it.quantidade) > 0);
    const id = window._editingOrcId;
    if(!data.itens || data.itens.length === 0){ alert('Adicione pelo menos 1 item.'); return; }
    let finalId = id;
    if(id){
      const i = state.orcamentos.findIndex(o=>o.id===id);
      if(i >= 0) state.orcamentos[i] = {...data, id};
      else state.orcamentos.push({...data, id});
    } else {
      finalId = uid();
      // Recalcular número para evitar duplicados
      data.numero = nextOrcNumForYear(data.ano);
      state.orcamentos.push({...data, id:finalId});
    }
    await save('orcamentos');
    clearDirty();
    closeModal(true);
    renderView();
  } catch(e){
    alert('Erro ao guardar: ' + e.message);
  } finally { window._saving = false; }
}

function deleteOrcamento(id){
  confirmAction('Eliminar este orçamento? Esta ação não pode ser revertida.', async () => {
    state.orcamentos = state.orcamentos.filter(o=>o.id!==id);
    await save('orcamentos');
    closeModal(true);
    renderView();
  }, {okLabel:'Eliminar'});
}

async function duplicarOrcamento(id){
  if(window._saving) return; window._saving = true;
  _ensureOrcStorage();
  const prevOrcamentos = JSON.parse(JSON.stringify(state.orcamentos || []));
  try {
    const orig = state.orcamentos.find(x=>x.id===id);
    if(!orig) return;
    const novo = JSON.parse(JSON.stringify(orig));
    novo.id = uid();
    novo.numero = nextOrcNumForYear(novo.ano);
    novo.data = today();
    novo.estado = 'rascunho';
    delete novo.dataEnvio; delete novo.dataAceite; delete novo.dataRecusa; delete novo.dataExpirado; delete novo.dataConvertido;
    novo.obraId = '';
    novo.descricao = 'CÓPIA — ' + (novo.descricao||'');
    state.orcamentos.push(novo);
    await save('orcamentos');
    closeModal(true);
    editOrcamento(novo.id);
  } catch(e){
    state.orcamentos = prevOrcamentos;
    console.error('duplicarOrcamento failed:', e);
    alert('Erro ao duplicar orçamento: ' + e.message);
  } finally {
    window._saving = false;
  }
}

  const clNif = o.clienteNif || (cl ? cl.nif : '') || '';

  const sub = orcSubtotal(o);
  const ivaVal = sub * (o.iva||23)/100;

  const validadeDate = (() => {
    try {
      const d = new Date(o.data);
      d.setDate(d.getDate() + (o.validade||30));

  p.push('</sty' + 'le>');

  p.push('</table><br>');
  p.push(condRow);
  p.push(notasRow);
  // Assinaturas
  p.push('<table width="100%" style="margin-top:30px;"><tr>');
  p.push('<td style="text-align:center;padding-top:40px;border-top:1px solid #999;width:40%;"><div style="font-weight:bold;color:#555;font-size:9pt;">O Cliente</div><div style="margin-top:4px;">' + escapeHtml(clNome) + '</div></td>');
  p.push('<td></td>');
  p.push('<td style="text-align:center;padding-top:40px;border-top:1px solid #999;width:40%;"><div style="font-weight:bold;color:#555;font-size:9pt;">TRITED</div><div style="margin-top:4px;">_______________</div></td>');
  p.push('</tr></table>');
  p.push('<div style="text-align:center;color:#999;font-size:8pt;margin-top:30px;">Documento gerado por TRITED Gestão \u00b7 ' + fmtDate(today()) + '</div>');
  p.push('</bo' + 'dy>');
  p.push('</htm' + 'l>');

  var xlsContent = p.join('\n');
  var BOM = '\uFEFF';
  var blob = new Blob([BOM + xlsContent], {type: 'application/vnd.ms-excel;charset=utf-8;'});
  var a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'TRITED_' + orcLabel(o) + '.xls';
  a.click();
}

  return `
  <div class="flex items-center justify-between mb-6 flex-wrap gap-3">
    <div>
      <h2 class="text-2xl font-bold">👤 Utilizadores</h2>
      <p class="text-sm" style="color:var(--muted);">${totalAtivos} ativo(s) · perfis de acesso à app</p>
    </div>
    <button class="btn btn-accent" onclick="editUtilizador()">+ Novo Utilizador</button>
  </div>
  <div class="card">
    <table>
      <thead><tr><th>Nome</th><th>Utilizador</th><th>Perfil</th><th>Estado</th><th>Criado em</th><th></th></tr></thead>

        ${state.users.map(u => `
          <tr>

            <td>${escapeHtml(ROLE_LABELS[u.role] || u.role || '—')}</td>

            <td>${fmtDate(u.criadoEm)}</td>
            <td style="text-align:right;white-space:nowrap;">
              <button class="btn btn-ghost" onclick="editUtilizador('${u.id}')" style="padding:5px 10px;font-size:12px;">Editar</button>
              <button class="btn btn-danger" onclick="deleteUtilizador('${u.id}')" style="padding:5px 10px;font-size:12px;" ${currentUser && currentUser.id===u.id?'disabled title="Não pode eliminar a sessão atual"':''}>🗑</button>
            </td>

    </table>
  </div>
  <div class="card p-4 mt-5" style="background:var(--bg-alt);">
    <div class="font-semibold mb-1">Perfis nesta versão</div>
    <div class="text-sm" style="color:var(--ink-soft);line-height:1.6;">
      <strong>Administrador / Escritório</strong>: acesso total à app, incluindo utilizadores.<br>
      <strong>Trabalhador</strong>: acesso limitado a Dashboard, Obras e Trabalhadores/Presenças.
    </div>
  </div>`;
}
function editUtilizador(id){
  if(!canManageUsers()) return;
  const u = id ? state.users.find(x=>x.id===id) : {nome:'',username:'',role:'trabalhador',ativo:true};
  if(!u) return;
  openModal(`
    <div class="p-6">
      <h2 class="text-2xl font-bold mb-5">${id?'Editar':'Novo'} Utilizador</h2>
      <div class="grid-2">
        <div><label class="label">Nome *</label><input class="input" id="u-nome" value="${escapeAttr(u.nome||'')}"></div>
        <div><label class="label">Utilizador *</label><input class="input" id="u-username" value="${escapeAttr(u.username||'')}" autocomplete="username"></div>
        <div><label class="label">Perfil</label><select class="select" id="u-role">
          <option value="admin_escritorio" ${u.role==='admin_escritorio'?'selected':''}>Administrador / Escritório</option>
          <option value="trabalhador" ${u.role==='trabalhador'?'selected':''}>Trabalhador</option>
        </select></div>
        <div><label class="label">Estado</label><select class="select" id="u-ativo">
          <option value="1" ${u.ativo!==false?'selected':''}>Ativo</option>
          <option value="0" ${u.ativo===false?'selected':''}>Inativo</option>
        </select></div>
      </div>
      <div class="mt-3"><label class="label">${id?'Nova palavra-passe':'Palavra-passe *'}</label><input class="input" id="u-pass" type="password" autocomplete="new-password" placeholder="${id?'Deixar vazio para manter':'Obrigatória'}"></div>
      <div class="text-xs mt-2" style="color:var(--muted);">A palavra-passe é guardada em hash no armazenamento local desta app.</div>
      <div class="flex justify-end gap-2 mt-6">
        <button class="btn btn-ghost" onclick="closeModal(true)">Cancelar</button>
        <button class="btn btn-primary" onclick="saveUtilizador('${id||''}')">Guardar</button>
      </div>
    </div>`);
}
async function saveUtilizador(id){
  if(window._saving) return; window._saving = true;
  const prev = JSON.parse(JSON.stringify(state.users));
  try {
    if(!canManageUsers()) return;
    const nome = document.getElementById('u-nome').value.trim();
    const username = normalizeUsername(document.getElementById('u-username').value);
    const role = document.getElementById('u-role').value;
    const ativo = document.getElementById('u-ativo').value === '1';
    const pass = document.getElementById('u-pass').value;
    if(!nome){ alert('Nome é obrigatório.'); return; }
    if(!username){ alert('Utilizador é obrigatório.'); return; }
    if(!id && !pass){ alert('Palavra-passe é obrigatória para novo utilizador.'); return; }
    if(state.users.some(u => u.id !== id && normalizeUsername(u.username) === username)){
      alert('Já existe um utilizador com esse nome de acesso.'); return;
    }
    if(id){
      const i = state.users.findIndex(u=>u.id===id);
      if(i < 0){ alert('Utilizador não encontrado.'); return; }
      state.users[i] = {...state.users[i], nome, username, role, ativo};
      if(pass) state.users[i].passwordHash = await hashPassword(pass);
      if(currentUser && currentUser.id === id){
        currentUser = safeUser(state.users[i]);
        if(!ativo){ await logout(); return; }
        await saveSession(currentUser);
      }
    } else {
      state.users.push({id:uid(), nome, username, role, ativo, passwordHash:await hashPassword(pass), criadoEm:today()});
    }
    await save('users');
    closeModal(true);
    renderTabs();
    renderView();
  } catch(e){
    state.users = prev;
    alert('Erro ao guardar utilizador: ' + e.message);
    console.error('saveUtilizador failed:', e);
  } finally { window._saving = false; }
}
function deleteUtilizador(id){
  if(!canManageUsers()) return;
  if(currentUser && currentUser.id === id){ alert('Não pode eliminar o utilizador da sessão atual.'); return; }
  const u = state.users.find(x=>x.id===id);
  if(!u) return;
  confirmAction('Eliminar o utilizador "' + (u.nome||u.username) + '"?', async () => {
    const prev = JSON.parse(JSON.stringify(state.users));
    try {
      state.users = state.users.filter(x=>x.id!==id);
      await save('users');
      closeModal(true);
      renderView();
    } catch(e){
      state.users = prev;
      alert('Erro ao eliminar utilizador: ' + e.message);
    }
  });
}

(async function init(){
  await loadAll();
  currentUser = await loadSession();
  renderAuthGate();
})();
